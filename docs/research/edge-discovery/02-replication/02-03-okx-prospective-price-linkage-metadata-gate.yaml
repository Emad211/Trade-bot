      - high24h
      - open24h
      - low24h
    provider_timestamp_field: ts

required_clocks:
  - request_started_at
  - response_received_at
  - provider_timestamp
  - research_available_at
  - registry_committed_at
clock_rules:
  request_response_order_required: true
  provider_timestamp_source_specific: true
  provider_timestamp_may_be_nonmonotonic_across_requests: true
  provider_timestamp_inference: false
  source_unavailability_is_market_null: false

safe_evidence_contract:
  retain:
