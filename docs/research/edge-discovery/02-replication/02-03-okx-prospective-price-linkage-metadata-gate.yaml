objective: >-
  Freeze exact prospective public source identities, schemas, timestamp semantics,
  and safe-retention boundaries for the BTC-USDT spot ticker, BTC-USDT-SWAP
  ticker, BTC-USDT-SWAP mark price, and BTC-USDT index ticker without retaining
  market values or computing basis, PnL, costs, or returns.

official_documentation:
  api_guide: https://www.okx.com/docs-v5/en/
  api_agreement: https://www.okx.com/en-us/help/okx-api-agreement
  market_data_authentication_required: false
  public_rest_rate_limit_rule: IP
  regional_domain_requirement_present: true
  continued_use_accepts_current_api_agreement: true
  service_schema_and_endpoint_changes_permitted: true

market_data_cache_contract:
  multiple_independent_cache_services_documented: true
  random_service_per_request_documented: true
  later_request_may_return_earlier_provider_timestamp: true
  cross_source_timestamp_monotonicity_required: false
  request_order_is_not_provider_time_order: true
  provider_timestamps_preserved_per_source: true
  provider_timestamp_rewriting: false

candidate_sources:
  - source_id: OKX_SPOT_BTC_USDT_TICKER
    source_kind: SPOT_TICKER
    method: GET
    endpoint_path: /api/v5/market/ticker
    query:
      instId: BTC-USDT
    expected_identity:
      instType: SPOT
      instId: BTC-USDT
    values_validated_but_not_retained:
      - last
      - lastSz
      - askPx
      - askSz
      - bidPx
      - bidSz
      - open24h
      - high24h
      - low24h
      - volCcy24h
      - vol24h
