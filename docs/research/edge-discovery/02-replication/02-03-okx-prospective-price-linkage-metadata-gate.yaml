    - source_kind
    - official_host
    - endpoint_path
    - query_parameter_names
    - request_fingerprint_sha256
    - http_status
    - application_code
    - content_type
    - response_byte_count
    - response_sha256
    - exact_schema_fields
    - schema_sha256
    - row_count
    - identity_fields
    - provider_timestamp_ms
    - provider_timestamp_utc
    - request_response_research_clocks
    - timestamp_age_diagnostics
    - source_health
  prohibit:
