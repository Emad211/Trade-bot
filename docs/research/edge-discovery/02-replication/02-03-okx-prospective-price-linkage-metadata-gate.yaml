    endpoint_path: /api/v5/market/ticker
    query:
      instId: BTC-USDT-SWAP
    expected_identity:
      instType: SWAP
      instId: BTC-USDT-SWAP
    values_validated_but_not_retained:
      - last
      - lastSz
      - askPx
      - askSz
      - bidPx
      - bidSz
      - open24h
      - high24h
      - low24h
      - volCcy24h
