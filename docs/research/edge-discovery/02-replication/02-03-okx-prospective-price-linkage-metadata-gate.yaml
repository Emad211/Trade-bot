      instType: SWAP
      instId: BTC-USDT-SWAP
    expected_identity:
      instType: SWAP
      instId: BTC-USDT-SWAP
    values_validated_but_not_retained:
      - markPx
    provider_timestamp_field: ts

  - source_id: OKX_BTC_USDT_INDEX_TICKER
    source_kind: INDEX_TICKER
    method: GET
    endpoint_path: /api/v5/market/index-tickers
    query:
      instId: BTC-USDT
    expected_identity:
      instId: BTC-USDT
    values_validated_but_not_retained:
