  real_private_request_allowed: false
  owner_credentials_allowed: false
  synthetic_credentials_in_process_only: true
  actual_checkout_preflight_required: true
  scoped_tests_expected_minimum: 28
  safe_artifact_only: true

hard_non_authorizations:
  real_owner_observation: false
  order_or_cancel: false
  trade_or_withdraw_permission: false
  balance_fill_bill_position_or_pnl_query: false
  basis_computation: false
