objective: >-
  Prepare a disabled-by-default, owner-local package that binds two exact read-only
  OKX fee snapshots to one four-source public observation, applies source-health
  admission before retention, and emits safe hash-only receipts without sending an order.

predecessor_gates:
  - issue_number: 54
    outcome: GO_OWNER_CONTROLLED_PRIVATE_OKX_SAMPLING_CONTRACT
  - issue_number: 55
    outcome: GO_OWNER_SIDE_OKX_ONE_BATCH_RUNNER_READY
  - issue_number: 56
    outcome: GO_OKX_FEE_AND_FUNDING_ACCOUNTING_CONTRACT
  - issue_number: 57
    outcome: GO_OKX_EXECUTABLE_PRICE_AND_COST_SEMANTICS_CONTRACT
  - issue_number: 58
    outcome: GO_OKX_SOURCE_HEALTH_AND_SAMPLING_ABORT_CONTRACT

implemented_files:
  module: src/hybrid_trader/replication/okx_no_trade_observation.py
  owner_cli: scripts/run_okx_no_trade_observation.py
  synthetic_validator: scripts/validate_okx_no_trade_observation_contract.py
  tests: tests/test_okx_no_trade_observation.py
  policy: configs/okx_no_trade_observation_policy_v1.yaml
  workflow: .github/workflows/okx-no-trade-observation-contract.yml

credential_contract:
  environment_variables:
    - OKX_API_KEY
    - OKX_SECRET_KEY
    - OKX_PASSPHRASE
  command_line_credential_values_allowed: false
  repository_credentials_allowed: false
  ci_credentials_allowed: false
  log_or_artifact_credentials_allowed: false
  permission_attestations:
    read_permission_enabled: true
    trade_permission_disabled: true
    withdraw_permission_disabled: true
    ip_allowlist_enabled: true
  allowed_private_methods:
    - GET
  private_redirect_following_allowed: false
  allowed_private_endpoints:
    - /api/v5/account/trade-fee
  allowed_fee_queries:
    - instType=SPOT&instId=BTC-USDT
    - instType=SWAP&instFamily=BTC-USDT

public_observation_contract:
  required_sources:
    - OKX_BTC_USDT_INDEX_TICKER
    - OKX_SPOT_BTC_USDT_TICKER
    - OKX_SWAP_BTC_USDT_SWAP_MARK_PRICE
    - OKX_SWAP_BTC_USDT_SWAP_TICKER
  exact_source_set_required: true
  health_evaluation_before_retention: true
  batch_admission_before_retention: true
  duplicate_source: REJECT
  partial_source_set: REJECT
  stale_or_future_provider_time: REJECT
  research_delay_exceeded: REJECT
  schema_or_identity_drift: QUARANTINE
  cross_source_skew_exceeded: REJECT
  carry_forward: false
  interpolation: false

private_retention_contract:
  private_root_outside_repository: true
  private_fee_snapshot_mode: "0600"
  public_raw_artifact_mode: "0600"
  private_directory_mode: "0700"
  maximum_retention_days: 7
  rollback_on_fee_or_receipt_failure: true
  deletion_receipt_required: true
  secure_erase_claimed: false

safe_receipt_contract:
  retain_hashes_and_states_only: true
  fee_values: false
  market_values: false
  credentials: false
  account_id_or_balance: false
  orders_or_fills: false
  pnl_or_returns: false
  explicit_flags:
    orders_sent: false
    trade_permission_used: false
    withdraw_permission_used: false

synthetic_ci_contract:
  real_public_request_allowed: false
  real_private_fee_request_allowed: false
  owner_credentials_allowed: false
  synthetic_hmac_signing_allowed: true
  authenticated_redirect_rejection_tested: true
  synthetic_fee_and_market_values_allowed_only_in_memory_and_private_temp_storage: true
  safe_artifact_only: true

hard_prohibitions:
  orders_or_cancels: false
  transfers_or_withdrawals: false
  account_setting_changes: false
  balance_fills_bills_positions_retrieval: false
  basis_computation: false
  funding_pnl_computation: false
  returns_computation: false
  transaction_cost_estimation: false
  empirical_fitting: false
  strategy_testing: false
  report_2_4_authorized: false
  paper_or_live_trading: false
  leverage_or_capital_deployment: false

allowed_outcomes:
  - GO_OWNER_CONTROLLED_OKX_NO_TRADE_OBSERVATION_PACKAGE_READY
  - BLOCKED_READ_ONLY_CREDENTIAL_CONTRACT
  - BLOCKED_HEALTH_AND_ADMISSION_INTEGRATION
  - BLOCKED_SAFE_RECEIPT_OR_ROLLBACK_CONTRACT
  - BLOCKED_TERMS_OR_OPERATIONAL_BOUNDARY

real_execution_status:
  owner_credentials_supplied: false
  real_fee_snapshot_executed: false
  real_public_batch_executed: false
  order_sent: false

paper_replication_pass: false
economic_edge_verdict: INCONCLUSIVE
report_2_4_authorized: false
