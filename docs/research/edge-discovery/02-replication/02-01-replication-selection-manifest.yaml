  - "OPPOSING_EVIDENCE"
  - "MODERN_UPDATE"
  - "IMPLEMENTATION_REFERENCE"
  - "DATA_SOURCE"

queue:
  - order: 1
    hypothesis_id: "EDGE-FUT-TREND-001"
    first_decisive_question: >
      Is trend profitability evidence of own-return predictability, or mostly a
      volatility-scaled historical-mean and allocation effect?
  - order: 2
    hypothesis_id: "EDGE-RISK-POLICY-001"
    first_decisive_question: >
      Does a frozen volatility and no-trade overlay add out-of-sample utility
      after matched risk, leverage constraints, turnover, and costs?
  - order: 3
    hypothesis_id: "EDGE-FUT-CARRY-001"
    first_decisive_question: >
      Do implementable same-contract curve and carry returns survive roll,
      factor, margin, and transaction-cost corrections?
  - order: 4
    hypothesis_id: "EDGE-FUT-POSITION-001"
    first_decisive_question: >
      Does public positioning add information beyond carry, trend, and market
      risk after the actual publication delay?
  - order: 5
    hypothesis_id: "EDGE-CRYPTO-BASIS-001"
    first_decisive_question: >
      Does derivatives state generalize beyond one licensed OKX sample and one
      exceptional market regime?
  - order: 6
    hypothesis_id: "EDGE-CRYPTO-RV-001"
    first_decisive_question: >
      Does two-leg carry remain positive after the full capital, funding,
      execution, collateral, stablecoin, and venue-risk path?

hypotheses:
  - id: "EDGE-FUT-TREND-001"
    replication_classes:
      - "NEAR_EXACT_PUBLIC"
      - "EXACT_LICENSED"
    selected_evidence:
      - role: "ANCHOR_MECHANISM"
        citation: "Moskowitz, Ooi, and Pedersen (2012), Time Series Momentum"
        doi: "10.1016/j.jfineco.2011.11.003"
      - role: "OPPOSING_EVIDENCE"
        citation: "Huang, Li, Wang, and Zhou (2020), Time Series Momentum: Is It There?"
        doi: "10.1016/j.jfineco.2019.08.004"
      - role: "OPPOSING_EVIDENCE"
        citation: "Shang, Serra, and Garcia (2022), Ride the Trend"
        doi: "10.1111/1477-9552.12485"
      - role: "MODERN_UPDATE"
        citation: "Uhl (2025), Speculators and Time Series Momentum"
        doi: "10.1002/rfe.1228"
    public_data:
      - "AQR Time Series Momentum Factors"
    licensed_requirements:
      - "raw contract-level futures and forwards used by the anchor"
    required_tests:
      - "asset_level_predictability"
      - "pooled_fixed_effects_predictability"
      - "wild_and_pairs_bootstrap"
      - "historical_mean_benchmark"
      - "same_contract_return_audit"
      - "volatility_scaling_decomposition"
      - "post_publication_factor_extension"
      - "crowding_interaction"
    hard_kills:
      - "unrealizable_roll_yield"
      - "failure_against_historical_mean_benchmark"
      - "bootstrap_invalidates_predictability_without_asset_level_support"
      - "post_publication_economic_null"

  - id: "EDGE-RISK-POLICY-001"
