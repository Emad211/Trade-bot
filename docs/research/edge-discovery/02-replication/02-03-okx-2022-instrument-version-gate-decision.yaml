instrument_version_findings:
  verified:
    - Original BTCUSDT perpetual public launch was announced for 2019-12-16T06:00:00Z.
    - Original launch specification recorded USDT settlement, 0.0001 BTC face value, and 0.1 tick size.
    - An official March 2020 notice changed face value from 0.0001 BTC to 0.01 BTC.
    - An official October 2020 notice recorded zero interest and BTC funding clamps of -0.375% and +0.375%.
    - The verified March 2022 funding artifact has 93 unique timestamps on an exact eight-hour grid.
  unresolved:
    - The proposed May 2021 change from 0.01 BTC to 0.001 BTC was postponed, and no official completion, cancellation, or replacement notice was located.
    - No frozen March 2022 instrument specification closes contract value, tick size, lot size, minimum size, linear/inverse status, and all related effective intervals.
    - No complete March 2022 funding-formula lineage closes the interest, premium-index averaging, cap/floor, mark/index, and rule-version dependencies.
  rejected_inferences:
    - Absence of a located change notice is not continuity proof.
    - The currently revised June 2022 guide is not a frozen March 2022 vintage.
    - Current instrument API values are not projected backward.
    - Current API listTime and contTdSwTime are not reinterpreted as the dated public launch time.
