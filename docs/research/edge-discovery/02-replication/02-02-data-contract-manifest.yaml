binding_principles:
- availability time governs usability
- report date is not release time
- raw artifacts are append-only
- provider replacements create revisions
- continuous futures cannot create executable PnL
- same-contract return is mandatory
- every roll has a roll ledger
- instrument metadata is effective-dated
- universe membership is point-in-time
- funding interval and formula are data
- mark, index, and last prices are distinct
- license terms and redistribution rights are versioned
- public constructive replication cannot inherit an exact verdict
- no empirical fitting before acquisition and quality gates pass
