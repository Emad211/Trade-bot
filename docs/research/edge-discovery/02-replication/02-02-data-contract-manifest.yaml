hypothesis_decisions:
- hypothesis_id: EDGE-FUT-TREND-001
  public_track: GO_PUBLIC_FACTOR_AUDIT
  exact_track: EXACT_PENDING_LICENSE
  first_data_work:
  - download and hash AQR original and maintained factor vintages
  - extract exact 58-instrument appendix and vendor IDs
  - prepare traditional futures license field matrix
  hard_data_kills:
  - raw exact universe cannot be identified
  - licensed data lacks expired contracts
  - same-contract returns cannot be reconstructed
- hypothesis_id: EDGE-RISK-POLICY-001
  public_track: GO_PUBLIC_FACTOR_AUDIT
  exact_commodity_track: EXACT_PENDING_LICENSE
  dependency: frozen upstream return series
  hard_data_kills:
  - full-sample scaler required for OOS result
  - upstream series not immutable
  - cost and turnover unavailable
- hypothesis_id: EDGE-FUT-CARRY-001
  public_track: FORMULA_AND_FIELD_FEASIBILITY_ONLY
  exact_track: EXACT_PENDING_LICENSE
  hard_data_kills:
  - no maturity-specific histories
  - second/third nearby unavailable
  - roll and contract PnL cannot be separated
- hypothesis_id: EDGE-FUT-POSITION-001
  public_track: GO_CFTC_TIMING_PIPELINE
  exact_price_track: EXACT_PENDING_LICENSE
  hard_data_kills:
  - actual or conservative release time unavailable
  - report categories cannot be mapped
  - price instruments cannot be linked to CFTC markets
- hypothesis_id: EDGE-CRYPTO-BASIS-001
  exact_track: INCONCLUSIVE_PENDING_AUTHOR_OR_LICENSE_ACCESS
  constructive_track: GO_DATA_ONLY_NEW_EXPERIMENT
  hard_data_kills:
  - current universe projected backward
  - instrument/funding rule history missing
  - single venue result presented as general
- hypothesis_id: EDGE-CRYPTO-RV-001
  historical_track: GO_DATA_AND_ACCOUNTING_ONLY
  paper_execution: NOT_AUTHORIZED
  hard_data_kills:
  - two-leg capital path incomplete
  - funding formula or interval missing
  - mark/index/last semantics unresolved
  - margin and collateral unavailable
return_contract:
  same_contract_required: true
  cross_contract_gap_as_pnl: false
  continuous_adjusted_series:
    allowed:
    - visualization
    - predeclared signals
    - diagnostic comparison
    forbidden:
    - executable PnL
    - roll profit
    - margin
    - fill simulation
    - cash-and-carry verdict
  separate_outputs:
  - currency_pnl
  - simple_return
  - log_return
  - return_on_notional
  - return_on_committed_capital
cftc_contract:
  report_date_equals_release_time: false
  regular_schedule_is_default_not_proof: true
  actual_release_preferred: true
  conservative_inferred_release_allowed: true
  families_separate:
  - legacy_futures_only
  - legacy_futures_and_options
  - supplemental_cit
  - disaggregated
  - traders_in_financial_futures
  revisions_append_only: true
crypto_contract:
  venues_separate: true
  contract_forms_separate:
  - LINEAR
  - INVERSE
  - QUANTO
  prices_separate:
  - LAST
  - MARK
  - INDEX
  - PREMIUM_INDEX
  funding_interval_fixed: false
  rule_versions_required: true
  finalized_candles_only: true
  timestamp_unit_effective_dated: true
  stablecoin_equals_one_assumption: false
