schema_version: "1.0"
document:
  id: "EDGE-MAP-SYNTHESIS-1.5"
  title: "Edge Map Synthesis and Replication Admissions"
  date: "2026-07-18"
  status: "COMPLETE"
  branch: "agent/edge-research-reports"
  human_report: "01-05-edge-map-synthesis.md"
  purpose: >
    Freeze the Section 1 decisions and provide machine-readable inputs for
    literature replication, dataset design, strategy evaluation, and runtime architecture.

program_thesis: >
  Research a multi-asset event-driven portfolio of slow structural futures premia
  and diversified trend; test positioning and cryptocurrency derivatives state as
  separate incremental hypotheses; apply simple cost-aware abstention and risk
  policies only after upstream signals are frozen; preserve value through execution,
  reconciliation, and operational risk control.

authorization:
  historical_research: true
  paper_trading: false
  live_trading: false
  leverage: false
  automatic_promotion: false
  capital_deployment: false

operator_profile:
  colocation: false
  privileged_order_flow: false
  exclusive_news_feed: false
  infrastructure: "ordinary_cloud_or_dedicated_servers"
  capital: "small_to_moderate"
  prospective_collection_required: true

admission_rubric:
  economic_mechanism_clarity: 15
  independent_supporting_and_opposing_evidence: 15
  falsifiability_and_benchmark_quality: 10
  point_in_time_data_feasibility: 15
  execution_and_cost_observability: 15
  cross_market_or_cross_venue_replication: 10
  independent_operator_speed_fit: 10
  capacity_and_operational_fit: 10
  total: 100
  bands:
    primary_replication: [85, 100]
    constrained_replication: [75, 84]
    conditional_secondary: [65, 74]
    watchlist: [50, 64]
    reject: [0, 49]

