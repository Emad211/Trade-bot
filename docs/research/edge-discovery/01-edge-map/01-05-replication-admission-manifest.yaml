rejected:
  - id: "REJECT-GENERIC-SINGLE-ASSET-ML"
    reason: "weak economic payer, high trial freedom, limited diversification"
  - id: "REJECT-SUBSECOND-HFT"
    reason: "requires unavailable physical latency and queue infrastructure"
  - id: "REJECT-ILLIQUID-ALTCOINS"
    reason: "survivorship, manipulation, spread, depth, and capacity failures"
  - id: "REJECT-SAME-BLOCK-MEV"
    reason: "specialized adversarial infrastructure outside operator profile"
  - id: "REJECT-NAKED-SHORT-VOL"
    reason: "unbounded or inadequately observed tail risk for initial system"

universal_prohibitions:
  - "selecting only high-performance papers"
  - "omitting opposing evidence"
  - "tuning after opening the sealed test"
  - "using continuous futures jumps as realizable returns"
  - "using current universe membership historically"
  - "using observation dates before publication availability"
  - "treating funding as risk-free yield"
  - "ignoring margin liquidation or auto-deleveraging"
  - "combining primitive signals before separate reporting"
  - "using complexity without matched simple benchmarks"
  - "reusing sealed tests for selection"
  - "deleting negative results"
  - "calling risk premium alpha without risk analysis"
  - "automatic paper or live promotion"
  - "live deployment based only on historical evidence"

replication_sequence:
  - "Report 2.1 selects anchor, opposing, modern-update, implementation, and code assets."
  - "Replicate EDGE-FUT-CARRY-001 primitives."
  - "Replicate EDGE-FUT-TREND-001 primitives and decompositions."
  - "Build shared futures contract and roll data model."
  - "Replicate EDGE-CRYPTO-BASIS-001 primitives."
  - "Add EDGE-FUT-POSITION-001 after publication-time data support."
  - "Evaluate EDGE-RISK-POLICY-001 only on frozen upstream outputs."
  - "Attempt EDGE-CRYPTO-RV-001 only after two-leg paper execution exists."

