schema_version: "1.0"
extractor: keyword_baseline
timeout_seconds: 30
minimum_successful_sources: 1

sources:
  - source_id: bitcoin-core-releases
    feed_url: https://github.com/bitcoin/bitcoin/releases.atom
    allowed_domains: [github.com]
    source_quality: 0.95
    asset_tags: [BTC]
    required: true
    max_items: 50

  - source_id: geth-releases
    feed_url: https://github.com/ethereum/go-ethereum/releases.atom
    allowed_domains: [github.com]
    source_quality: 0.90
    asset_tags: [ETH]
    required: false
    max_items: 50
