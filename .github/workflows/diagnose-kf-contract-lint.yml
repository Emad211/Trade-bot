name: Diagnose Kenneth French Contract Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-kf-contract-lint.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install "ruff==0.15.22"
      - name: Capture exact Ruff diagnostics
        shell: bash
        run: |
          set +e
          python -m ruff check \
            src/hybrid_trader/replication/kenneth_french_daily.py \
            scripts/audit_kenneth_french_daily_sources.py \
            tests/test_kenneth_french_daily.py \
            > ruff.txt 2>&1
          status=$?
          cat ruff.txt
          echo "$status" > ruff-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: kenneth-french-contract-ruff-diagnostics-${{ github.sha }}
          path: |
            ruff.txt
            ruff-exit-code.txt
          if-no-files-found: error
          retention-days: 14
