name: avalai-docs-inspect

on:
  push:
    branches: ["agent/phase-3c-avalai-provider"]
    paths:
      - ".github/workflows/avalai-docs-inspect.yml"
  pull_request:
    branches: ["agent/phase-3b-prospective-events"]
    paths:
      - ".github/workflows/avalai-docs-inspect.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch official AvalAI documentation
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import urllib.request
          from pathlib import Path

          root = Path("artifacts/avalai-docs")
          root.mkdir(parents=True, exist_ok=True)
          pages = {
              "llms.txt": "https://docs.avalai.ir/llms.txt",
              "quickstart-fa.md": "https://docs.avalai.ir/fa/quickstart.md",
              "models-fa.md": "https://docs.avalai.ir/fa/api-reference/models.md",
              "responses-fa.md": "https://docs.avalai.ir/fa/api-reference/responses.md",
              "chat-fa.md": "https://docs.avalai.ir/fa/api-reference/chat.md",
              "authentication-fa.md": "https://docs.avalai.ir/fa/api-reference/authentication.md",
              "response-headers-fa.md": "https://docs.avalai.ir/fa/api-reference/response-headers.md",
              "structured-outputs-fa.md": "https://docs.avalai.ir/fa/guides/structured-outputs.md",
              "error-handling-fa.md": "https://docs.avalai.ir/fa/guides/error-handling.md",
              "production-fa.md": "https://docs.avalai.ir/fa/guides/production-best-practices.md",
              "responses-vs-chat-fa.md": "https://docs.avalai.ir/fa/guides/responses-vs-chat-completions.md",
              "content-policy-fa.md": "https://docs.avalai.ir/fa/safety/content-policy.md",
              "user-api-fa.md": "https://docs.avalai.ir/fa/api-reference/user.md",
          }
          fetched: dict[str, dict[str, object]] = {}
          for name, url in pages.items():
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "Accept": "text/markdown,text/plain,text/html;q=0.8,*/*;q=0.5",
                          "User-Agent": "HybridTrader-AvalAI-Docs-Inspection/1.0",
                      },
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = response.read(10_000_001)
                      if len(payload) > 10_000_000:
                          raise RuntimeError(f"Documentation response too large: {url}")
                      final_url = response.geturl()
                      content_type = response.headers.get_content_type()
                  (root / name).write_bytes(payload)
                  fetched[url] = {
                      "status": "success",
                      "final_url": final_url,
                      "content_type": content_type,
                      "path": (root / name).as_posix(),
                      "size": len(payload),
                      "sha256": hashlib.sha256(payload).hexdigest(),
                  }
              except Exception as exc:
                  fetched[url] = {
                      "status": "failed",
                      "error_type": type(exc).__name__,
                      "error_message": str(exc),
                  }
          (root / "manifest.json").write_text(
              json.dumps(fetched, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          required = (
              "https://docs.avalai.ir/fa/quickstart.md",
              "https://docs.avalai.ir/fa/api-reference/chat.md",
              "https://docs.avalai.ir/fa/guides/structured-outputs.md",
              "https://docs.avalai.ir/fa/guides/error-handling.md",
          )
          if any(fetched[url]["status"] != "success" for url in required):
              raise RuntimeError("Required official AvalAI documentation was not fetched")
          PY
      - name: Upload official documentation snapshot
        uses: actions/upload-artifact@v4
        with:
          name: avalai-official-docs-${{ github.sha }}
          path: artifacts/avalai-docs/
          if-no-files-found: error
          retention-days: 14
