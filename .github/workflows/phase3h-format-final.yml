name: phase3h-format-final

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase-3h-source-diversity"]
    paths:
      - ".github/workflows/phase3h-format-final.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3h-source-diversity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Format and validate Phase 3H
        run: |
          ruff format \
            scripts/probe_phase3h_feeds.py \
            scripts/verify_phase3b_events.py \
            src/hybrid_trader/event_capture.py \
            src/hybrid_trader/event_capture_models.py \
            src/hybrid_trader/event_capture_state.py \
            src/hybrid_trader/event_relevance.py \
            src/hybrid_trader/event_source_spec.py \
            tests/test_phase3h_relevance.py
          ruff check --fix \
            scripts/probe_phase3h_feeds.py \
            scripts/verify_phase3b_events.py \
            src/hybrid_trader/event_capture.py \
            src/hybrid_trader/event_capture_models.py \
            src/hybrid_trader/event_capture_state.py \
            src/hybrid_trader/event_relevance.py \
            src/hybrid_trader/event_source_spec.py \
            tests/test_phase3h_relevance.py
          mypy --python-version 3.12 src
          pytest tests/test_phase3h_relevance.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time formatter and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/phase3h-format-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "format and validate Phase 3H relevance filtering"
          git push origin HEAD:agent/phase-3h-source-diversity
