name: phase2c-real-benchmark-strict

on:
  workflow_dispatch:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - "scripts/verify_phase2c_artifacts_strict.py"
      - ".github/workflows/phase2c-real-benchmark-strict.yml"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install public-data and ML dependencies
        run: python -m pip install -e '.[exchange,ml]'
      - name: Execute the fixed-cutoff public-data experiment
        run: |
          python -m hybrid_trader.phase2c \
            --spec configs/phase2c_sources_runtime.yaml \
            --config configs/phase2c_btc_4h.yaml \
            --output artifacts/phase2c
      - name: Verify artifact integrity and non-activation
        run: python scripts/verify_phase2c_artifacts.py artifacts/phase2c
      - name: Verify full-window and cross-venue coverage
        run: |
          python scripts/verify_phase2c_artifacts_strict.py \
            artifacts/phase2c \
            --spec configs/phase2c_sources_runtime.yaml
      - name: Build deterministic archive and checksum inventory
        if: always()
        run: |
          mkdir -p artifacts/distribution
          if [ -d artifacts/phase2c ]; then
            tar --sort=name --mtime='UTC 1970-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf artifacts/distribution/phase2c-strict-${GITHUB_SHA}.tar.gz \
              -C artifacts phase2c
          fi
          find artifacts -type f -not -path 'artifacts/distribution/SHA256SUMS' -print0 \
            | sort -z | xargs -0 sha256sum > artifacts/distribution/SHA256SUMS || true
      - name: Upload strict real-data evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2c-real-benchmark-strict-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 90
