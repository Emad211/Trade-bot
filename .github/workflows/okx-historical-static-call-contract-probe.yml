name: OKX Historical Static Call Contract Probe

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/okx-historical-static-call-contract-probe.yml

permissions:
  contents: read

jobs:
  inspect-call-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Extract bounded call-site contexts from the official bundle
        run: |
          mkdir -p build/okx-static-call-contract
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import re
          import urllib.request
          from pathlib import Path
          from urllib.parse import urlsplit

          SOURCE_URL = 'https://www.okx.com/cdn/assets/okfe/broker-center/brokerHistory/index.06c0c768.js'
          EXPECTED_SHA256 = 'b995569bf282872ac741be30725e48ca110d4c67acf942143d6974f21b027b7a'
          MAX_BYTES = 100_000
          NEEDLES = (
              '/priapi/v5/broker/public/trade-data/download-link',
              'getDownloadLink',
              'downloadHistory',
              'uploadCloudPlatform',
              'instrument_family',
              'date_grouping',
              'start_date',
              'end_date',
              'FUNDING_RATES',
          )
          request = urllib.request.Request(SOURCE_URL, headers={
              'Accept': 'application/javascript,text/javascript,*/*;q=0.1',
              'Referer': 'https://www.okx.com/en-gb/historical-data',
              'User-Agent': 'Emad211-Trade-bot-replication/1.0',
          })
          with urllib.request.urlopen(request, timeout=45) as response:
              raw = response.read(MAX_BYTES + 1)
              status = int(response.status)
              final_url = response.geturl()
              content_type = response.headers.get('Content-Type', '')
          if status != 200 or len(raw) > MAX_BYTES:
              raise SystemExit('Official bundle violated transport bounds')
          final = urlsplit(final_url)
          if final.scheme != 'https' or final.hostname != 'www.okx.com':
              raise SystemExit(f'Bundle redirected off official host: {final_url}')
          actual_sha256 = hashlib.sha256(raw).hexdigest()
          if actual_sha256 != EXPECTED_SHA256:
              raise SystemExit(f'Official bundle identity changed: {actual_sha256}')
          text = raw.decode('utf-8', errors='strict')

          def bounded_context(position: int, radius: int = 2200) -> str:
              start = max(0, position - radius)
              end = min(len(text), position + radius)
              value = text[start:end]
              # Add line boundaries only for readability; retain exact characters otherwise.
              return re.sub(r'([;{}])', r'\1\n', value)

          occurrences: list[dict[str, object]] = []
          for needle in NEEDLES:
              positions = [match.start() for match in re.finditer(re.escape(needle), text)]
              occurrences.append({
                  'needle': needle,
                  'count': len(positions),
                  'positions': positions,
                  'contexts': [
                      {
                          'position': position,
                          'context_sha256': hashlib.sha256(
                              bounded_context(position).encode('utf-8')
                          ).hexdigest(),
                          'context': bounded_context(position),
                      }
                      for position in positions[:5]
                  ],
              })

          endpoint_item = next(
              item for item in occurrences
              if item['needle'] == '/priapi/v5/broker/public/trade-data/download-link'
          )
          if endpoint_item['count'] < 1:
              raise SystemExit('Download-link call site was not found')

          evidence = {
              'schema_version': '1.0',
              'purpose': 'OKX_HISTORICAL_STATIC_CALL_CONTRACT_METADATA_ONLY',
              'source_url': SOURCE_URL,
              'final_url': final_url,
              'http_status': status,
              'content_type': content_type,
              'bundle_byte_count': len(raw),
              'bundle_sha256': actual_sha256,
              'occurrences': occurrences,
              'raw_bundle_retained': False,
              'bounded_source_contexts_retained': True,
              'market_data_requested': False,
              'market_data_retained': False,
              'export_request_transmitted': False,
              'gate_verdict': 'UNRESOLVED_STATIC_CALL_CONTRACT_ONLY',
          }
          Path('build/okx-static-call-contract/evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          print(json.dumps({
              'bundle_sha256': actual_sha256,
              'occurrence_counts': {
                  item['needle']: item['count'] for item in occurrences
              },
          }, indent=2, sort_keys=True))
          PY
      - name: Verify static-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          evidence = json.loads(
              Path('build/okx-static-call-contract/evidence.json').read_text()
          )
          assert evidence['raw_bundle_retained'] is False
          assert evidence['market_data_requested'] is False
          assert evidence['market_data_retained'] is False
          assert evidence['export_request_transmitted'] is False
          assert evidence['gate_verdict'] == 'UNRESOLVED_STATIC_CALL_CONTRACT_ONLY'
          assert any(
              item['needle'].endswith('/download-link') and item['count'] > 0
              for item in evidence['occurrences']
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: okx-historical-static-call-contract-${{ github.sha }}
          path: build/okx-static-call-contract/evidence.json
          if-no-files-found: error
          retention-days: 30
