name: capture-phase3g-errors

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-phase3g-errors.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture Phase 3G failures
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29587787714 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/phase3g-format.log
          gh run view 29587612070 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/phase3g-monitor.log
          {
            echo '=== formatter ==='
            grep -nE 'Would reformat|error:|Error|FAILED|AssertionError|Traceback|Found [0-9]+ error' /tmp/phase3g-format.log || true
            tail -n 180 /tmp/phase3g-format.log
            echo '=== monitor ==='
            grep -nE 'Usage:|No such option|error:|Error|FAILED|Traceback|RuntimeError' /tmp/phase3g-monitor.log || true
            tail -n 160 /tmp/phase3g-monitor.log
          } > .status/phase3g-errors.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3g-errors.txt
          git commit -m "capture Phase 3G failures" || true
          git push origin HEAD:agent/phase3c-hardening-runner
