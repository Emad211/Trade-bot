name: capture-phase3f-c1248-runs

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-phase3f-c1248-runs.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: c1248daadb0313261c565c88291a77bb5b1926d6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture exact-head workflows and artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3f-semantic-dataset&per_page=100")
          selected=$(jq --arg sha "$TARGET_SHA" '[.workflow_runs[] | select(.head_sha == $sha) | {id,name,status,conclusion,html_url,head_sha,created_at,updated_at}]' <<<"$runs")
          output=$(jq -n --argjson runs "$selected" '{runs:$runs,artifacts:[]}')
          for run_id in $(jq -r '.[].id' <<<"$selected"); do
            artifacts=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100")
            output=$(jq --argjson artifacts "$(jq '[.artifacts[] | {id,name,size_in_bytes,digest,expired}]' <<<"$artifacts")" --arg run_id "$run_id" '.artifacts += ($artifacts | map(. + {run_id:($run_id|tonumber)}))' <<<"$output")
          done
          jq --arg captured_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '. + {captured_at:$captured_at}' <<<"$output" > .status/phase3f-c1248-runs.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3f-c1248-runs.json
          git commit -m "capture Phase 3F exact-head runs" || true
          git push origin HEAD:agent/phase3c-hardening-runner
