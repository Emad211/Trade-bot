name: Replication Integrity

on:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - "src/hybrid_trader/replication/**"
      - "tests/**"
      - "docs/research/edge-discovery/02-replication/**"
      - "pyproject.toml"
      - ".github/workflows/replication-integrity.yml"
  pull_request:
    paths:
      - "src/hybrid_trader/replication/**"
      - "tests/**"
      - "docs/research/edge-discovery/02-replication/**"
      - "pyproject.toml"
      - ".github/workflows/replication-integrity.yml"

permissions:
  contents: read

jobs:
  replication-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and verification dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,replication]"

      - name: Ruff
        run: python -m ruff check src/hybrid_trader/replication tests scripts

      - name: Mypy
        run: python -m mypy src/hybrid_trader/replication

      - name: Complete non-optional test suite and replication coverage
        shell: bash
        run: |
          set -o pipefail
          # The old test_replication_*.py glob covered only the original framework
          # tests and excluded the source-specific CFTC, OKX, Binance, Cboe,
          # Kenneth-French and Moreira-Muir suites. Run the complete non-optional
          # suite so the coverage result represents the current replication package.
          python -m pytest -q -m "not optional_ml" \
            --cov=hybrid_trader.replication \
            --cov-report=term-missing \
            --cov-report=xml:replication-coverage.xml \
            --cov-report=json:replication-coverage.json \
            --cov-fail-under=70 \
            2>&1 | tee replication-pytest.log

      - name: Upload replication coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replication-coverage-${{ github.sha }}
          path: |
            replication-coverage.xml
            replication-coverage.json
            replication-pytest.log
          if-no-files-found: warn
          retention-days: 30
