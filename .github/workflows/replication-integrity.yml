name: Replication Integrity

on:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - "src/hybrid_trader/replication/**"
      - "tests/**"
      - "docs/research/edge-discovery/02-replication/**"
      - "pyproject.toml"
      - ".github/workflows/replication-integrity.yml"
  pull_request:
    paths:
      - "src/hybrid_trader/replication/**"
      - "tests/**"
      - "docs/research/edge-discovery/02-replication/**"
      - "pyproject.toml"
      - ".github/workflows/replication-integrity.yml"

permissions:
  contents: read

jobs:
  replication-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create isolated replication environment
        run: |
          python -m venv /tmp/hybrid-trader-replication-integrity
          /tmp/hybrid-trader-replication-integrity/bin/python -m pip install --upgrade pip
          /tmp/hybrid-trader-replication-integrity/bin/python -m pip install -e ".[dev,replication]"
          /tmp/hybrid-trader-replication-integrity/bin/python - <<'PY'
          import json
          import sys
          import numpy
          print(json.dumps({
              "executable": sys.executable,
              "prefix": sys.prefix,
              "numpy_file": numpy.__file__,
              "numpy_version": numpy.__version__,
          }, indent=2, sort_keys=True))
          PY

      - name: Ruff
        run: >-
          /tmp/hybrid-trader-replication-integrity/bin/python -m ruff check
          src/hybrid_trader/replication tests scripts

      - name: Mypy
        run: >-
          /tmp/hybrid-trader-replication-integrity/bin/python -m mypy
          src/hybrid_trader/replication

      - name: Complete non-optional test suite and replication coverage
        shell: bash
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          set -o pipefail
          COVERAGE=/tmp/hybrid-trader-replication-integrity/bin/coverage
          PYTHON=/tmp/hybrid-trader-replication-integrity/bin/python

          "$COVERAGE" erase
          "$COVERAGE" run \
            --branch \
            --source=src/hybrid_trader/replication \
            -m pytest \
            -q -m "not optional_ml" \
            2>&1 | tee replication-pytest.log

          "$COVERAGE" report --show-missing --fail-under=70 \
            2>&1 | tee -a replication-pytest.log
          "$COVERAGE" xml -o replication-coverage.xml
          "$COVERAGE" json -o replication-coverage.json
          "$PYTHON" - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("replication-coverage.json").read_text())
          print(json.dumps(report["totals"], indent=2, sort_keys=True))
          PY

      - name: Upload replication coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replication-coverage-${{ github.sha }}
          path: |
            replication-coverage.xml
            replication-coverage.json
            replication-pytest.log
          if-no-files-found: warn
          retention-days: 30
