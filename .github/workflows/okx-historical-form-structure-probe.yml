name: OKX Historical Form Structure Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/okx-historical-form-structure-probe.yml

permissions:
  contents: read

concurrency:
  group: okx-historical-form-structure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  inspect-form-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install isolated Playwright runtime
        run: |
          mkdir -p build/okx-historical-form-structure/runtime
          cd build/okx-historical-form-structure/runtime
          npm init -y >/dev/null
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Inspect modal structure without submitting data
        run: |
          mkdir -p build/okx-historical-form-structure/output
          cat > build/okx-historical-form-structure/runtime/probe.mjs <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import path from 'node:path';
          import { chromium } from 'playwright';

          const workspace = process.env.GITHUB_WORKSPACE;
          if (!workspace) throw new Error('GITHUB_WORKSPACE is unavailable');
          const outputPath = path.join(
            workspace,
            'build/okx-historical-form-structure/output/evidence.json'
          );
          fs.mkdirSync(path.dirname(outputPath), { recursive: true });

          const landingUrl = 'https://www.okx.com/en-gb/historical-data';
          const evidence = {
            schema_version: '1.0',
            purpose: 'OKX_HISTORICAL_FUNDING_FORM_STRUCTURE_METADATA_ONLY',
            landing_url: landingUrl,
            navigation: {},
            click_result: {},
            dialogs: [],
            requests: [],
            errors: [],
            form_submitted: false,
            market_data_requested: false,
            market_data_retained: false,
            response_bodies_retained: false,
            screenshots_retained: false,
            gate_verdict: 'UNRESOLVED_FORM_METADATA_ONLY'
          };

          function sha256(value) {
            return crypto.createHash('sha256').update(value).digest('hex');
          }

          function safeUrl(raw) {
            try {
              const url = new URL(raw);
              for (const key of [...url.searchParams.keys()]) {
                url.searchParams.set(key, '[REDACTED]');
              }
              url.hash = '';
              return url.toString();
            } catch {
              return raw.slice(0, 500);
            }
          }

          let browser = null;
          try {
            browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              acceptDownloads: false,
              locale: 'en-GB',
              timezoneId: 'UTC'
            });
            const page = await context.newPage();

            await page.route('**/*', async route => {
              const request = route.request();
              const host = (() => {
                try { return new URL(request.url()).hostname.toLowerCase(); }
                catch { return ''; }
              })();
              if (host && host !== 'okx.com' && host !== 'www.okx.com' && !host.endsWith('.okx.com')) {
                await route.abort('blockedbyclient');
                return;
              }
              await route.continue();
            });

            page.on('request', request => {
              const url = request.url();
              if (!url.includes('okx.com')) return;
              evidence.requests.push({
                method: request.method(),
                resource_type: request.resourceType(),
                url: safeUrl(url)
              });
            });

            const response = await page.goto(landingUrl, {
              waitUntil: 'domcontentloaded',
              timeout: 90000
            });
            await page.waitForTimeout(7000);
            const beforeText = await page.locator('body').innerText();
            evidence.navigation = {
              final_url: safeUrl(page.url()),
              title: await page.title(),
              status: response?.status() ?? null,
              body_text_sha256: sha256(beforeText)
            };

            evidence.click_result = await page.evaluate(() => {
              const normalize = value => (value || '').replace(/\s+/g, ' ').trim();
              const heading = [...document.querySelectorAll('*')]
                .find(element => normalize(element.textContent) === 'Funding rate');
              if (!heading) return { clicked: false, reason: 'funding_heading_not_found' };
              let container = heading;
              for (let depth = 0; depth < 10 && container; depth += 1, container = container.parentElement) {
                const target = [...container.querySelectorAll('button,a,[role="button"]')]
                  .find(element => /download/i.test(
                    normalize(element.textContent) || element.getAttribute('aria-label') || ''
                  ));
                if (!target) continue;
                target.click();
                return {
                  clicked: true,
                  tag: target.tagName,
                  text: normalize(target.textContent),
                  depth
                };
              }
              return { clicked: false, reason: 'funding_download_control_not_found' };
            });
            await page.waitForTimeout(5000);

            evidence.dialogs = await page.evaluate(() => {
              const compact = value => (value || '').replace(/\s+/g, ' ').trim().slice(0, 500);
              const safeAttributes = element => {
                const names = [
                  'role', 'type', 'name', 'placeholder', 'aria-label', 'aria-labelledby',
                  'aria-describedby', 'aria-expanded', 'aria-haspopup', 'aria-controls',
                  'data-testid', 'data-cy', 'tabindex', 'autocomplete', 'readonly', 'disabled'
                ];
                const attributes = {};
                for (const name of names) {
                  const value = element.getAttribute(name);
                  if (value !== null) attributes[name] = compact(value);
                }
                return attributes;
              };
              const roots = [...document.querySelectorAll('[role="dialog"],dialog,[aria-modal="true"]')];
              return roots.map((root, dialogIndex) => ({
                dialog_index: dialogIndex,
                tag: root.tagName,
                text: compact(root.innerText),
                class_tokens: String(root.className || '').split(/\s+/).filter(Boolean).slice(0, 20),
                attributes: safeAttributes(root),
                elements: [root, ...root.querySelectorAll('*')]
                  .map((element, index) => ({
                    index,
                    tag: element.tagName,
                    text: compact(element.textContent),
                    direct_text: compact(
                      [...element.childNodes]
                        .filter(node => node.nodeType === Node.TEXT_NODE)
                        .map(node => node.textContent)
                        .join(' ')
                    ),
                    class_tokens: String(element.className || '')
                      .split(/\s+/).filter(Boolean).slice(0, 20),
                    attributes: safeAttributes(element),
                    value: 'value' in element ? compact(String(element.value || '')) : '',
                    checked: 'checked' in element ? Boolean(element.checked) : null,
                    selected: 'selected' in element ? Boolean(element.selected) : null
                  }))
                  .filter(item =>
                    item.text || item.direct_text || item.value ||
                    Object.keys(item.attributes).length > 0 ||
                    ['INPUT', 'BUTTON', 'SELECT', 'OPTION', 'A'].includes(item.tag)
                  )
                  .slice(0, 500)
              }));
            });
          } catch (error) {
            evidence.errors.push({
              stage: 'form_structure_probe',
              message: String(error?.stack || error)
            });
          } finally {
            if (browser) await browser.close().catch(() => {});
            evidence.requests = evidence.requests.slice(-300);
            fs.writeFileSync(outputPath, JSON.stringify(evidence, null, 2) + '\n');
          }
          NODE

          cd build/okx-historical-form-structure/runtime
          node probe.mjs
          cd "$GITHUB_WORKSPACE"

      - name: Verify safe form evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = json.loads(
              Path('build/okx-historical-form-structure/output/evidence.json')
              .read_text(encoding='utf-8')
          )
          if evidence['form_submitted'] is not False:
              raise SystemExit('Form was submitted')
          if evidence['market_data_requested'] is not False:
              raise SystemExit('Market data was requested')
          if evidence['market_data_retained'] is not False:
              raise SystemExit('Market data was retained')
          if evidence['response_bodies_retained'] is not False:
              raise SystemExit('Response bodies were retained')
          if evidence['gate_verdict'] != 'UNRESOLVED_FORM_METADATA_ONLY':
              raise SystemExit('Form probe self-promoted to a gate verdict')
          print(json.dumps({
              'navigation': evidence['navigation'],
              'click_result': evidence['click_result'],
              'dialog_count': len(evidence['dialogs']),
              'errors': evidence['errors'],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload form-structure metadata
        uses: actions/upload-artifact@v7
        with:
          name: okx-historical-form-structure-${{ github.sha }}
          path: build/okx-historical-form-structure/output/evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Record non-promotional summary
        run: |
          {
            echo "## OKX historical form structure probe"
            echo
            echo "- Form submitted: no"
            echo "- Market data requested or retained: no"
            echo "- Response bodies retained: no"
            echo "- Gate verdict: unresolved form metadata only"
          } >> "$GITHUB_STEP_SUMMARY"
