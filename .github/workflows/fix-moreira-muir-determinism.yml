name: Fix Moreira Muir Evidence Determinism

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-moreira-muir-determinism.yml

permissions:
  contents: write

jobs:
  fix-verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out research branch
        uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Apply exact deterministic metric normalization
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path('src/hybrid_trader/replication/moreira_muir.py')
          text = module.read_text(encoding='utf-8')
          old = 'VOLATILITY_MATCH_RELATIVE_TOLERANCE = 0.025\n'
          new = old + 'SAFE_METRIC_DECIMAL_PLACES = 12\n'
          if text.count(old) != 1 or 'SAFE_METRIC_DECIMAL_PLACES' in text:
              raise SystemExit('Unexpected tolerance constant state')
          text = text.replace(old, new)
          replacements = {
              'managed_standard_deviation_percent=managed_std,': (
                  'managed_standard_deviation_percent=round(\n'
                  '                    managed_std, SAFE_METRIC_DECIMAL_PLACES\n'
                  '                ),'
              ),
              'unmanaged_standard_deviation_percent=unmanaged_std,': (
                  'unmanaged_standard_deviation_percent=round(\n'
                  '                    unmanaged_std, SAFE_METRIC_DECIMAL_PLACES\n'
                  '                ),'
              ),
              'standard_deviation_ratio=ratio,': (
                  'standard_deviation_ratio=round(ratio, SAFE_METRIC_DECIMAL_PLACES),'
              ),
              'relative_standard_deviation_error=relative_error,': (
                  'relative_standard_deviation_error=round(\n'
                  '                    relative_error, SAFE_METRIC_DECIMAL_PLACES\n'
                  '                ),'
              ),
              'correlation=correlation,': (
                  'correlation=round(correlation, SAFE_METRIC_DECIMAL_PLACES),'
              ),
          }
          for source, target in replacements.items():
              if text.count(source) != 1:
                  raise SystemExit(f'Unexpected source occurrence: {source}')
              text = text.replace(source, target)
          module.write_text(text, encoding='utf-8')

          test = Path('tests/test_moreira_muir.py')
          text = test.read_text(encoding='utf-8')
          old_import = '    EXPECTED_HEADER,\n'
          new_import = '    EXPECTED_HEADER,\n    SAFE_METRIC_DECIMAL_PLACES,\n'
          if text.count(old_import) != 1 or 'SAFE_METRIC_DECIMAL_PLACES' in text:
              raise SystemExit('Unexpected test import state')
          text = text.replace(old_import, new_import)
          marker = '\n\ndef test_author_page_requires_unit_and_scaling_description() -> None:\n'
          addition = '''\n\ndef test_safe_metrics_are_canonicalized() -> None:\n    frame = parse_official_factor_bytes(make_csv(), require_exact_snapshot=False)\n    for audit in factor_pair_audits(frame):\n        assert audit.managed_standard_deviation_percent == round(\n            audit.managed_standard_deviation_percent, SAFE_METRIC_DECIMAL_PLACES\n        )\n        assert audit.unmanaged_standard_deviation_percent == round(\n            audit.unmanaged_standard_deviation_percent, SAFE_METRIC_DECIMAL_PLACES\n        )\n        assert audit.standard_deviation_ratio == round(\n            audit.standard_deviation_ratio, SAFE_METRIC_DECIMAL_PLACES\n        )\n        assert audit.relative_standard_deviation_error == round(\n            audit.relative_standard_deviation_error, SAFE_METRIC_DECIMAL_PLACES\n        )\n        assert audit.correlation == round(audit.correlation, SAFE_METRIC_DECIMAL_PLACES)\n'''
          if text.count(marker) != 1:
              raise SystemExit('Could not place deterministic metric test')
          text = text.replace(marker, addition + marker)
          test.write_text(text, encoding='utf-8')
          PY

      - name: Install project and verification tools
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e ".[dev,replication]"

      - name: Verify source and tests
        run: |
          python -m ruff check \
            src/hybrid_trader/replication/moreira_muir.py \
            scripts/audit_moreira_muir_official_factors.py \
            tests/test_moreira_muir.py
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/moreira_muir.py
          python -m pytest -q tests/test_moreira_muir.py

      - name: Verify independent process output determinism
        run: |
          set -euo pipefail
          mkdir -p /tmp/mm/raw /tmp/mm/run1 /tmp/mm/run2
          curl --fail-with-body --location --retry 5 --retry-all-errors \
            --output /tmp/mm/raw/data.html 'https://tylersmuir.com/data.html'
          curl --fail-with-body --location --retry 5 --retry-all-errors \
            --output /tmp/mm/raw/VolManagedFactors.csv \
            'https://tylersmuir.com/data/VolManagedFactors.csv'
          python scripts/audit_moreira_muir_official_factors.py \
            --csv /tmp/mm/raw/VolManagedFactors.csv \
            --author-page /tmp/mm/raw/data.html \
            --output-dir /tmp/mm/run1 >/dev/null
          python scripts/audit_moreira_muir_official_factors.py \
            --csv /tmp/mm/raw/VolManagedFactors.csv \
            --author-page /tmp/mm/raw/data.html \
            --output-dir /tmp/mm/run2 >/dev/null
          cmp /tmp/mm/run1/safe-factor-contract-evidence.json \
              /tmp/mm/run2/safe-factor-contract-evidence.json
          cmp /tmp/mm/run1/safe-factor-contract-summary.json \
              /tmp/mm/run2/safe-factor-contract-summary.json
          sha256sum /tmp/mm/run1/*.json /tmp/mm/run2/*.json

      - name: Commit deterministic evidence fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/hybrid_trader/replication/moreira_muir.py \
            tests/test_moreira_muir.py
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "Canonicalize Moreira Muir evidence metrics"
          git push origin HEAD:agent/edge-research-reports
