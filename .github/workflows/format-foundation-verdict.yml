name: format-foundation-verdict

on:
  push:
    branches: ["agent/foundation-screening-verdict"]
    paths:
      - ".github/workflows/format-foundation-verdict.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/foundation-screening-verdict
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install formatter
        run: python -m pip install -e '.[dev]'
      - name: Apply canonical formatting
        run: ruff format scripts/assess_phase2c_foundation.py tests/test_foundation_assessment.py
      - name: Commit formatted files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/assess_phase2c_foundation.py tests/test_foundation_assessment.py
          if git diff --cached --quiet; then
            echo 'Files already formatted.'
          else
            git commit -m "format foundation verdict assessment"
            git push origin HEAD:agent/foundation-screening-verdict
          fi
