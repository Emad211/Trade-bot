name: phase3f-format

# Generation 2: normalize the in-memory dataset index, then format and validate.
on:
  push:
    branches: ["agent/phase-3f-semantic-dataset"]
    paths:
      - ".github/workflows/phase3f-format.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3f-semantic-dataset
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Normalize the semantic dataset index contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/hybrid_trader/semantic_dataset.py")
          text = path.read_text(encoding="utf-8")
          before = '''    matured = matured.loc[:, ordered_columns]
    if not matured.empty:
'''
          after = '''    matured = matured.loc[:, ordered_columns]
    matured.index.name = "timestamp"
    if not matured.empty:
'''
          if text.count(before) != 1:
              raise RuntimeError("Phase 3F index-normalization anchor is not unique")
          path.write_text(text.replace(before, after, 1), encoding="utf-8")
          PY
      - name: Install development dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Format and validate Phase 3F
        run: |
          ruff format src/hybrid_trader/semantic_features.py src/hybrid_trader/semantic_dataset.py scripts/build_phase3f_semantic_dataset.py tests/test_phase3f_semantic_dataset.py
          ruff check --fix src/hybrid_trader/semantic_features.py src/hybrid_trader/semantic_dataset.py scripts/build_phase3f_semantic_dataset.py tests/test_phase3f_semantic_dataset.py
          mypy --python-version 3.12 src
          pytest tests/test_phase3f_semantic_dataset.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time formatter and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/phase3f-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "normalize and validate Phase 3F semantic dataset"
          git push origin HEAD:agent/phase-3f-semantic-dataset
