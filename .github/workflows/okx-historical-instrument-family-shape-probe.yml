name: OKX Historical Instrument Family Shape Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/okx-historical-instrument-family-shape-probe.yml

permissions:
  contents: read

jobs:
  inspect-shape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inspect JSON shape and bounded BTC-USDT scalar matches
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import urllib.request
          from collections import Counter
          from collections.abc import Mapping, Sequence
          from pathlib import Path
          from typing import Any
          from urllib.parse import urlsplit

          url = (
              "https://www.okx.com/priapi/v5/broker/public/"
              "trade-data/instruments?instType=SWAP"
          )
          out = Path("build/okx-instrument-shape/evidence.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/json",
                  "Referer": "https://www.okx.com/en-gb/historical-data",
                  "User-Agent": "Emad211-Trade-bot-replication/1.0",
              },
          )
          with urllib.request.urlopen(request, timeout=45) as response:
              status = int(response.status)
              content_type = response.headers.get("Content-Type", "")
              final_url = response.geturl()
              raw = response.read(5_000_001)
          if status != 200 or len(raw) > 5_000_000:
              raise SystemExit("Instrument metadata acquisition failed closed")
          if "json" not in content_type.lower():
              raise SystemExit(f"Unexpected content type: {content_type!r}")
          final = urlsplit(final_url)
          if final.scheme != "https" or final.hostname != "www.okx.com":
              raise SystemExit("Instrument metadata redirected off official host")
          payload: Any = json.loads(raw)

          shape: list[dict[str, Any]] = []
          matches: list[dict[str, str]] = []
          scalar_types: Counter[str] = Counter()

          def walk(value: Any, path: str, depth: int = 0) -> None:
              if depth > 8:
                  return
              if isinstance(value, Mapping):
                  shape.append({
                      "path": path,
                      "type": "object",
                      "key_count": len(value),
                      "keys": sorted(str(key) for key in value)[:100],
                  })
                  for key, item in value.items():
                      walk(item, f"{path}.{key}", depth + 1)
                  return
              if isinstance(value, list):
                  type_counts = Counter(type(item).__name__ for item in value)
                  shape.append({
                      "path": path,
                      "type": "array",
                      "length": len(value),
                      "item_type_counts": dict(sorted(type_counts.items())),
                  })
                  for index, item in enumerate(value[:2000]):
                      walk(item, f"{path}[{index}]", depth + 1)
                  return
              scalar_types[type(value).__name__] += 1
              if isinstance(value, str):
                  upper = value.upper()
                  if "BTC" in upper and "USDT" in upper and len(matches) < 100:
                      matches.append({"path": path, "value": value[:300]})

          walk(payload, "$", 0)
          evidence = {
              "schema_version": "1.0",
              "purpose": "OKX_UI_INSTRUMENT_JSON_SHAPE_METADATA_ONLY",
              "source_url": url,
              "final_url": final_url,
              "http_status": status,
              "content_type": content_type,
              "response_byte_count": len(raw),
              "response_sha256": hashlib.sha256(raw).hexdigest(),
              "shape": shape[:500],
              "scalar_type_counts": dict(sorted(scalar_types.items())),
              "btc_usdt_match_count": len(matches),
              "btc_usdt_matches": matches,
              "raw_response_retained": False,
              "market_values_retained": False,
              "gate_verdict": "UNRESOLVED_JSON_SHAPE_ONLY",
          }
          out.write_text(json.dumps(evidence, indent=2, sort_keys=True) + "\n")
          print(json.dumps(evidence, indent=2, sort_keys=True))
          PY

      - name: Verify metadata-only output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          evidence = json.loads(Path("build/okx-instrument-shape/evidence.json").read_text())
          assert evidence["raw_response_retained"] is False
          assert evidence["market_values_retained"] is False
          assert evidence["gate_verdict"] == "UNRESOLVED_JSON_SHAPE_ONLY"
          print(json.dumps({
              "shape": evidence["shape"],
              "btc_usdt_matches": evidence["btc_usdt_matches"],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload shape evidence
        uses: actions/upload-artifact@v7
        with:
          name: okx-historical-instrument-shape-${{ github.sha }}
          path: build/okx-instrument-shape/evidence.json
          if-no-files-found: error
          retention-days: 30
