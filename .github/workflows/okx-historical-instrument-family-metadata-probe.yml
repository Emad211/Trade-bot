name: OKX Historical Instrument Family Metadata Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/okx-historical-instrument-family-metadata-probe.yml

permissions:
  contents: read

concurrency:
  group: okx-historical-instrument-family-${{ github.ref }}
  cancel-in-progress: false

jobs:
  inspect-instrument-family:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out triggering commit
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inspect official UI instrument metadata ephemerally
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import urllib.request
          from collections.abc import Mapping, Sequence
          from pathlib import Path
          from typing import Any
          from urllib.parse import urlsplit

          SOURCE_URL = (
              "https://www.okx.com/priapi/v5/broker/public/"
              "trade-data/instruments?instType=SWAP"
          )
          MAX_BYTES = 5_000_000
          SAFE_FIELDS = {
              "instId",
              "instFamily",
              "uly",
              "instType",
              "settleCcy",
              "baseCcy",
              "quoteCcy",
              "state",
              "symbol",
              "label",
              "value",
              "name",
              "displayName",
              "instName",
          }
          TARGET_TERMS = ("BTC-USDT", "BTC-USDT-SWAP")
          output = Path(
              "build/okx-historical-instrument-family/evidence.json"
          )
          output.parent.mkdir(parents=True, exist_ok=True)

          def sha256(data: bytes) -> str:
              return hashlib.sha256(data).hexdigest()

          request = urllib.request.Request(
              SOURCE_URL,
              headers={
                  "Accept": "application/json",
                  "User-Agent": (
                      "Emad211-Trade-bot-replication/1.0 "
                      "(+https://github.com/Emad211/Trade-bot)"
                  ),
                  "Referer": "https://www.okx.com/en-gb/historical-data",
              },
          )
          with urllib.request.urlopen(request, timeout=45) as response:
              status = int(response.status)
              content_type = response.headers.get("Content-Type", "")
              final_url = response.geturl()
              raw = response.read(MAX_BYTES + 1)
          if status != 200:
              raise SystemExit(f"Official UI endpoint returned HTTP {status}")
          if len(raw) > MAX_BYTES:
              raise SystemExit("Instrument response exceeded the byte-size guard")
          if "json" not in content_type.lower():
              raise SystemExit(f"Unexpected content type: {content_type!r}")
          parsed_final = urlsplit(final_url)
          if parsed_final.scheme != "https" or parsed_final.hostname != "www.okx.com":
              raise SystemExit(f"Instrument endpoint redirected off official host: {final_url}")

          payload: Any = json.loads(raw)
          top_level_type = type(payload).__name__
          top_level_fields = sorted(payload) if isinstance(payload, Mapping) else []

          lists: list[Sequence[Any]] = []

          def collect_lists(value: Any) -> None:
              if isinstance(value, list):
                  lists.append(value)
                  for item in value:
                      collect_lists(item)
              elif isinstance(value, Mapping):
                  for item in value.values():
                      collect_lists(item)

          collect_lists(payload)
          object_lists = [
              value
              for value in lists
              if value and all(isinstance(item, Mapping) for item in value)
          ]
          candidate_rows = max(object_lists, key=len) if object_lists else []
          row_schema = sorted(
              {
                  str(key)
                  for row in candidate_rows
                  if isinstance(row, Mapping)
                  for key in row
              }
          )

          target_records: list[dict[str, Any]] = []
          for row in candidate_rows:
              assert isinstance(row, Mapping)
              searchable = " ".join(str(value) for value in row.values()).upper()
              if not any(term in searchable for term in TARGET_TERMS):
                  continue
              safe = {
                  str(key): value
                  for key, value in row.items()
                  if str(key) in SAFE_FIELDS and isinstance(value, (str, int, float, bool))
              }
              if safe and safe not in target_records:
                  target_records.append(safe)
              if len(target_records) >= 20:
                  break

          evidence = {
              "schema_version": "1.0",
              "purpose": "OKX_HISTORICAL_UI_INSTRUMENT_FAMILY_METADATA_ONLY",
              "source_url": SOURCE_URL,
              "final_url": final_url,
              "http_status": status,
              "content_type": content_type,
              "response_byte_count": len(raw),
              "response_sha256": sha256(raw),
              "top_level_type": top_level_type,
              "top_level_fields": top_level_fields,
              "candidate_row_count": len(candidate_rows),
              "candidate_row_schema": row_schema,
              "target_terms": list(TARGET_TERMS),
              "target_record_count": len(target_records),
              "target_records": target_records,
              "raw_response_retained": False,
              "market_prices_retained": False,
              "funding_rates_retained": False,
              "gate_verdict": "UNRESOLVED_INSTRUMENT_METADATA_ONLY",
          }
          output.write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(evidence, indent=2, sort_keys=True))
          PY

      - name: Verify metadata-only evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = json.loads(
              Path("build/okx-historical-instrument-family/evidence.json")
              .read_text(encoding="utf-8")
          )
          assert evidence["raw_response_retained"] is False
          assert evidence["market_prices_retained"] is False
          assert evidence["funding_rates_retained"] is False
          assert evidence["gate_verdict"] == "UNRESOLVED_INSTRUMENT_METADATA_ONLY"
          forbidden = {"last", "bidPx", "askPx", "fundingRate", "realizedRate"}
          if forbidden.intersection(evidence["candidate_row_schema"]):
              raise SystemExit("Unexpected market-value fields appeared in instrument metadata")
          print(json.dumps({
              "candidate_row_count": evidence["candidate_row_count"],
              "candidate_row_schema": evidence["candidate_row_schema"],
              "target_records": evidence["target_records"],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload safe instrument-family evidence
        uses: actions/upload-artifact@v7
        with:
          name: okx-historical-instrument-family-${{ github.sha }}
          path: build/okx-historical-instrument-family/evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Record non-promotional summary
        run: |
          {
            echo "## OKX historical instrument-family metadata"
            echo
            echo "- Official UI endpoint queried: yes"
            echo "- Raw response retained: no"
            echo "- Prices or funding rates retained: no"
            echo "- Gate verdict: unresolved instrument metadata only"
          } >> "$GITHUB_STEP_SUMMARY"
