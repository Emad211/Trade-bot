name: phase3e-materialize

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase-3e-longitudinal-events"]
    paths:
      - "scripts/materialize_phase3e_budget.py"
      - "tests/test_phase3e_semantic_budget.py"
      - ".github/workflows/phase3e-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3e-longitudinal-events
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply hard pre-call budget
        run: python scripts/materialize_phase3e_budget.py
      - name: Install and validate
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format src/hybrid_trader/event_capture.py src/hybrid_trader/avalai_capture.py scripts/capture_phase3c_avalai_events.py tests/test_phase3e_semantic_budget.py
          ruff check --fix src/hybrid_trader/event_capture.py src/hybrid_trader/avalai_capture.py scripts/capture_phase3c_avalai_events.py tests/test_phase3e_semantic_budget.py
          mypy --python-version 3.12 src
          pytest tests/test_phase3e_semantic_budget.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/materialize_phase3e_budget.py .github/workflows/phase3e-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add hard pre-call semantic budget"
          git push origin HEAD:agent/phase-3e-longitudinal-events
