name: capture-phase3g-push-error

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-phase3g-push-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture Phase 3G push failure
        run: |
          mkdir -p .status
          gh run view 29588097688 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/phase3g-push.log
          {
            grep -nE 'rejected|non-fast-forward|GH0|remote:|fatal:|failed to push|nothing to commit|pathspec' /tmp/phase3g-push.log || true
            echo '=== tail ==='
            tail -n 100 /tmp/phase3g-push.log
          } > .status/phase3g-push-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3g-push-error.txt
          git commit -m "capture Phase 3G push failure" || true
          git push origin HEAD:agent/phase3c-hardening-runner
