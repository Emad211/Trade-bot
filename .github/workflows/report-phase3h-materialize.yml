name: report-phase3h-materialize

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/report-phase3h-materialize.yml"

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for Phase 3H materializer and report
        shell: bash
        run: |
          set -euo pipefail
          run=""
          for attempt in $(seq 1 240); do
            run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3h-source-diversity&per_page=100" --jq '[.workflow_runs[] | select(.name == "phase3h-materialize")][0]')
            if [ "$(jq -r '.status // empty' <<<"$run")" = "completed" ]; then
              break
            fi
            sleep 10
          done
          test -n "$run"
          run_id=$(jq -r .id <<<"$run")
          jobs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")
          {
            echo '## Phase 3H relevance materializer status'
            echo
            echo "- run: $(jq -r .html_url <<<"$run")"
            echo "- conclusion: $(jq -r .conclusion <<<"$run")"
            echo "- head: \`$(jq -r .head_sha <<<"$run")\`"
            jq -r '.jobs[] as $job | $job.steps[]? | "- \($job.name) / \(.name): \(.status) / \(.conclusion)"' <<<"$jobs"
          } > /tmp/phase3h-materialize.md
          gh pr comment 37 --repo "$GITHUB_REPOSITORY" --body-file /tmp/phase3h-materialize.md
