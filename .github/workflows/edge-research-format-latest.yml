name: edge-research-format-latest

on:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/edge-research-format-latest.yml

permissions:
  contents: write

jobs:
  format-verify-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e '.[dev,replication]'
      - name: Apply exact repository formatting
        run: |
          ruff format .
          ruff check --fix src tests scripts
      - name: Remove temporary workflow
        run: rm .github/workflows/edge-research-format-latest.yml
      - name: Verify formatted research tree
        run: |
          ruff format --check .
          ruff check src tests scripts
          mypy src/hybrid_trader/replication
          python -m compileall -q src tests scripts
          pytest -q -m 'not optional_ml'
      - name: Commit exact formatter output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests scripts .github/workflows/edge-research-format-latest.yml
          if git diff --cached --quiet; then
            echo 'No formatting changes were required.'
            exit 0
          fi
          git commit -m 'Normalize the current replication implementation'
          git push origin HEAD:agent/edge-research-reports
