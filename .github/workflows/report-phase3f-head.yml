name: report-phase3f-head

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/report-phase3f-head.yml"

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 521ff5b967ac88aeb12274b4ce59ecf863e25971
    steps:
      - name: Wait for formatter on exact Phase 3F head
        shell: bash
        run: |
          set -euo pipefail
          run=""
          for attempt in $(seq 1 240); do
            run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3f-semantic-dataset&per_page=100" \
              --jq --arg sha "$TARGET_SHA" '[.workflow_runs[] | select(.name == "phase3f-format" and .head_sha == $sha)][0]')
            if [ "$(jq -r '.status // empty' <<<"$run")" = "completed" ]; then
              break
            fi
            sleep 10
          done
          test -n "$run"
          run_id=$(jq -r .id <<<"$run")
          jobs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")
          {
            echo '## Phase 3F exact-head formatter status'
            echo
            echo "- run: $(jq -r .html_url <<<"$run")"
            echo "- conclusion: $(jq -r .conclusion <<<"$run")"
            echo "- head: \`$(jq -r .head_sha <<<"$run")\`"
            jq -r '.jobs[] as $job | $job.steps[]? | "- \($job.name) / \(.name): \(.status) / \(.conclusion)"' <<<"$jobs"
          } > /tmp/phase3f-head.md
          gh pr comment 29 --repo "$GITHUB_REPOSITORY" --body-file /tmp/phase3f-head.md
