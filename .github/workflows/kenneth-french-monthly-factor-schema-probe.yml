name: Kenneth French Monthly Factor Schema Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/kenneth-french-monthly-factor-schema-probe.yml
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/kenneth-french-monthly-factor-schema-probe.yml

permissions:
  contents: read

concurrency:
  group: kenneth-french-monthly-factor-schema-probe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acquire-profile-and-stage-safe-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - name: Acquire official Dartmouth monthly files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/kf-monthly-probe/raw
          base='https://mba.tuck.dartmouth.edu/pages/faculty/ken.french'
          curl --fail-with-body --location --retry 8 --retry-all-errors \
            --connect-timeout 20 --max-time 180 \
            --output build/kf-monthly-probe/raw/data_library.html \
            "$base/data_library.html"
          for name in \
            F-F_Research_Data_Factors_CSV.zip \
            F-F_Research_Data_5_Factors_2x3_CSV.zip \
            F-F_Momentum_Factor_CSV.zip; do
            curl --fail-with-body --location --retry 8 --retry-all-errors \
              --connect-timeout 20 --max-time 180 \
              --output "build/kf-monthly-probe/raw/$name" \
              "$base/ftp/$name"
          done

      - name: Verify ZIPs and profile monthly and annual blocks
        run: |
          python - <<'PY'
          import csv
          import hashlib
          import io
          import json
          import math
          import re
          import zipfile
          from datetime import datetime
          from pathlib import Path, PurePosixPath

          root = Path('build/kf-monthly-probe')
          raw_root = root / 'raw'
          sources = {
              'ff3_monthly': {
                  'zip': 'F-F_Research_Data_Factors_CSV.zip',
                  'expected': ['Mkt-RF', 'SMB', 'HML', 'RF'],
                  'roles': ['Mkt-RF', 'SMB', 'HML', 'RF'],
              },
              'ff5_monthly': {
                  'zip': 'F-F_Research_Data_5_Factors_2x3_CSV.zip',
                  'expected': ['Mkt-RF', 'SMB', 'HML', 'RMW', 'CMA', 'RF'],
                  'roles': ['RMW', 'CMA'],
              },
              'momentum_monthly': {
                  'zip': 'F-F_Momentum_Factor_CSV.zip',
                  'expected': ['Mom'],
                  'roles': ['Mom'],
              },
          }
          monthly_pattern = re.compile(r'^\d{6}$')
          annual_pattern = re.compile(r'^\d{4}$')
          sentinel_values = ('-99.99', '-999')

          def trim_one_trailing_empty(cells):
              result = [cell.strip() for cell in cells]
              if result and result[-1] == '':
                  result.pop()
              return result

          profiles = []
          for source_key, contract in sources.items():
              zip_path = raw_root / contract['zip']
              zip_bytes = zip_path.read_bytes()
              if not zip_bytes or len(zip_bytes) > 100_000_000:
                  raise SystemExit(f'Invalid ZIP size for {source_key}')
              if not zipfile.is_zipfile(io.BytesIO(zip_bytes)):
                  raise SystemExit(f'Invalid ZIP for {source_key}')
              with zipfile.ZipFile(io.BytesIO(zip_bytes)) as archive:
                  members = [item for item in archive.infolist() if not item.is_dir()]
                  if len(members) != 1:
                      raise SystemExit(f'Expected one member for {source_key}')
                  member = members[0]
                  posix = PurePosixPath(member.filename)
                  if posix.is_absolute() or '..' in posix.parts or len(posix.parts) != 1:
                      raise SystemExit(f'Unsafe ZIP path: {member.filename}')
                  if member.flag_bits & 1:
                      raise SystemExit(f'Encrypted ZIP member: {member.filename}')
                  if member.file_size <= 0 or member.file_size > 100_000_000:
                      raise SystemExit(f'Unsafe member size: {member.filename}')
                  payload = archive.read(member)
                  if archive.testzip() is not None:
                      raise SystemExit(f'ZIP CRC failure for {source_key}')
              try:
                  text = payload.decode('utf-8-sig')
                  encoding = 'utf-8-sig'
              except UnicodeDecodeError:
                  text = payload.decode('latin-1')
                  encoding = 'latin-1'
              lines = text.splitlines()
              expected_header = ['', *contract['expected']]
              header_index = None
              header = None
              for index, line in enumerate(lines):
                  candidate = trim_one_trailing_empty(next(csv.reader([line])))
                  if candidate == expected_header:
                      header_index = index
                      header = candidate
                      break
              if header_index is None or header is None:
                  raise SystemExit(f'Expected monthly header not found for {source_key}')

              monthly_rows = []
              annual_rows = []
              footer_lines = []
              section = 'monthly'
              trailing_delimiter_lines = 0
              for line in lines[header_index + 1:]:
                  raw_cells = next(csv.reader([line]))
                  if raw_cells and raw_cells[-1].strip() == '':
                      trailing_delimiter_lines += 1
                  row = trim_one_trailing_empty(raw_cells)
                  if not row or all(cell == '' for cell in row):
                      if monthly_rows:
                          section = 'between'
                      continue
                  if monthly_pattern.fullmatch(row[0]):
                      if section not in ('monthly', 'between') or annual_rows:
                          raise SystemExit(f'Monthly row after annual block for {source_key}')
                      section = 'monthly'
                      if len(row) != len(header):
                          raise SystemExit(f'Monthly width mismatch for {source_key} {row[0]}')
                      if any(cell == '' for cell in row):
                          raise SystemExit(f'Internal blank monthly field for {source_key} {row[0]}')
                      monthly_rows.append(row)
                      continue
                  if annual_pattern.fullmatch(row[0]):
                      section = 'annual'
                      if len(row) != len(header):
                          raise SystemExit(f'Annual width mismatch for {source_key} {row[0]}')
                      if any(cell == '' for cell in row):
                          raise SystemExit(f'Internal blank annual field for {source_key} {row[0]}')
                      annual_rows.append(row)
                      continue
                  if monthly_rows:
                      footer_lines.append(line)
              if not monthly_rows:
                  raise SystemExit(f'No monthly rows for {source_key}')

              months = [datetime.strptime(row[0], '%Y%m') for row in monthly_rows]
              if months != sorted(months) or len(months) != len(set(months)):
                  raise SystemExit(f'Month ordering/uniqueness failure for {source_key}')
              expected_months = []
              cursor = months[0]
              while cursor <= months[-1]:
                  expected_months.append(cursor)
                  year = cursor.year + (1 if cursor.month == 12 else 0)
                  month = 1 if cursor.month == 12 else cursor.month + 1
                  cursor = cursor.replace(year=year, month=month)
              if months != expected_months:
                  raise SystemExit(f'Monthly calendar gap for {source_key}')

              years = [int(row[0]) for row in annual_rows]
              if annual_rows and (years != sorted(years) or len(years) != len(set(years))):
                  raise SystemExit(f'Annual ordering/uniqueness failure for {source_key}')

              sentinel_counts = {value: 0 for value in sentinel_values}
              columns = []
              for column_index, name in enumerate(contract['expected'], start=1):
                  values = []
                  for row in monthly_rows:
                      cell = row[column_index]
                      if cell in sentinel_counts:
                          sentinel_counts[cell] += 1
                          continue
                      try:
                          value = float(cell)
                      except ValueError as exc:
                          raise SystemExit(
                              f'Non-numeric monthly {source_key}.{name} on {row[0]}'
                          ) from exc
                      if not math.isfinite(value):
                          raise SystemExit(
                              f'Non-finite monthly {source_key}.{name} on {row[0]}'
                          )
                      values.append(value)
                  columns.append({
                      'name': name,
                      'valid_numeric_count': len(values),
                      'minimum_percent': min(values) if values else None,
                      'maximum_percent': max(values) if values else None,
                  })

              profiles.append({
                  'source_key': source_key,
                  'source_url': (
                      'https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/ftp/'
                      + contract['zip']
                  ),
                  'zip_filename': contract['zip'],
                  'zip_byte_count': len(zip_bytes),
                  'zip_sha256': hashlib.sha256(zip_bytes).hexdigest(),
                  'member_filename': member.filename,
                  'member_byte_count': len(payload),
                  'member_sha256': hashlib.sha256(payload).hexdigest(),
                  'member_crc32': f'{member.CRC:08x}',
                  'encoding': encoding,
                  'header_index_zero_based': header_index,
                  'header': header,
                  'factor_roles': contract['roles'],
                  'monthly_row_count': len(monthly_rows),
                  'first_month': months[0].strftime('%Y-%m'),
                  'last_month': months[-1].strftime('%Y-%m'),
                  'annual_row_count': len(annual_rows),
                  'first_annual_year': years[0] if years else None,
                  'last_annual_year': years[-1] if years else None,
                  'trailing_delimiter_line_count': trailing_delimiter_lines,
                  'sentinel_counts': sentinel_counts,
                  'column_profiles': columns,
                  'preamble_sha256': hashlib.sha256(
                      ('\n'.join(lines[:header_index]) + '\n').encode('utf-8')
                  ).hexdigest(),
                  'non_data_line_count_after_header': len(footer_lines),
                  'non_data_lines_sha256': hashlib.sha256(
                      ('\n'.join(footer_lines) + ('\n' if footer_lines else '')).encode('utf-8')
                  ).hexdigest(),
              })

          library = (raw_root / 'data_library.html').read_bytes()
          library_text = library.decode('utf-8', errors='replace')
          required_phrases = (
              'Legacy Format (FIZ)',
              'Flat File Format 2.0 (CIZ)',
              'reconstruct the full history of returns each month',
              'Historical returns can change',
          )
          phrase_presence = {phrase: phrase in library_text for phrase in required_phrases}
          if not all(phrase_presence.values()):
              raise SystemExit(f'Revision-warning contract changed: {phrase_presence}')

          evidence = {
              'schema_version': '1.0',
              'evidence_id': 'KENNETH_FRENCH_CURRENT_MONTHLY_FACTOR_SCHEMA_PROBE_V1',
              'source_authority': 'Kenneth French Data Library, Dartmouth College',
              'data_library_url': (
                  'https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html'
              ),
              'data_library_byte_count': len(library),
              'data_library_sha256': hashlib.sha256(library).hexdigest(),
              'revision_warning_phrase_presence': phrase_presence,
              'declared_return_unit': 'PERCENT',
              'data_state': 'CURRENT_REVISED_PUBLIC_RECONSTRUCTION_SOURCE',
              'monthly_source_is_separate_from_daily': True,
              'daily_compounding_used_as_monthly_substitute': False,
              'sources': profiles,
              'raw_uploaded': False,
              'row_level_data_uploaded': False,
              'performance_calculated': False,
              'paper_replication_pass': False,
              'economic_edge_verdict': 'INCONCLUSIVE',
          }
          evidence_bytes = (json.dumps(evidence, indent=2, sort_keys=True) + '\n').encode()
          (root / 'safe-monthly-schema-evidence.json').write_bytes(evidence_bytes)
          summary = {
              'evidence_id': evidence['evidence_id'],
              'source_count': len(profiles),
              'sources': [
                  {
                      key: profile[key]
                      for key in (
                          'source_key', 'zip_sha256', 'member_sha256', 'header',
                          'monthly_row_count', 'first_month', 'last_month',
                          'annual_row_count', 'first_annual_year', 'last_annual_year',
                          'trailing_delimiter_line_count', 'sentinel_counts'
                      )
                  }
                  for profile in profiles
              ],
              'safe_evidence_sha256': hashlib.sha256(evidence_bytes).hexdigest(),
              'performance_calculated': False,
              'paper_replication_pass': False,
          }
          (root / 'safe-monthly-schema-summary.json').write_text(
              json.dumps(summary, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Remove official raw content
        run: rm -rf build/kf-monthly-probe/raw

      - name: Upload safe monthly schema evidence
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: kenneth-french-current-monthly-safe-schema-${{ github.sha }}
          path: |
            build/kf-monthly-probe/safe-monthly-schema-evidence.json
            build/kf-monthly-probe/safe-monthly-schema-summary.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Create receipt
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          receipt = {
              'schema_version': '1.0',
              'repository': os.environ['GITHUB_REPOSITORY'],
              'commit_sha': os.environ['GITHUB_SHA'],
              'workflow': os.environ['GITHUB_WORKFLOW'],
              'run_id': os.environ['GITHUB_RUN_ID'],
              'created_at': datetime.now(UTC).isoformat(),
              'artifact_id': os.environ['ARTIFACT_ID'],
              'artifact_url': os.environ['ARTIFACT_URL'],
              'artifact_digest': os.environ['ARTIFACT_DIGEST'],
              'storage_state': 'ACTIONS_SAFE_EVIDENCE_ONLY_RETENTION_90_DAYS',
              'source_count': 3,
              'raw_uploaded': False,
              'performance_calculated': False,
              'paper_replication_pass': False,
              'economic_edge_verdict': 'INCONCLUSIVE',
          }
          Path('build/kf-monthly-probe-receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - uses: actions/upload-artifact@v7
        with:
          name: kenneth-french-current-monthly-safe-schema-receipt-${{ github.sha }}
          path: build/kf-monthly-probe-receipt.json
          if-no-files-found: error
          retention-days: 90
