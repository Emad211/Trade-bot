name: diagnose-phase3-publisher

# Generation 3: persist exact payload hashes for audit and repair.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/diagnose-phase3-publisher.yml"

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_RUN_ID: "29480551988"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-classical-robustness
          fetch-depth: 0
      - name: Inspect payload and persist diagnostics
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=.bootstrap/phase3-classical-robustness.patch.gz.b64
          actual_payload_hash=$(sha256sum "$PAYLOAD" | cut -d' ' -f1)
          actual_payload_size=$(wc -c < "$PAYLOAD")
          base64 --decode "$PAYLOAD" > /tmp/phase3.patch.gz
          actual_gzip_hash=$(sha256sum /tmp/phase3.patch.gz | cut -d' ' -f1)
          actual_gzip_size=$(wc -c < /tmp/phase3.patch.gz)
          gzip --decompress --stdout /tmp/phase3.patch.gz > /tmp/phase3.patch
          actual_patch_hash=$(sha256sum /tmp/phase3.patch | cut -d' ' -f1)
          actual_patch_size=$(wc -c < /tmp/phase3.patch)
          gh run view "$FAILED_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/failed.log
          jq -n \
            --arg payload_sha256 "$actual_payload_hash" \
            --argjson payload_bytes "$actual_payload_size" \
            --arg gzip_sha256 "$actual_gzip_hash" \
            --argjson gzip_bytes "$actual_gzip_size" \
            --arg patch_sha256 "$actual_patch_hash" \
            --argjson patch_bytes "$actual_patch_size" \
            --argjson failed_run_id "$FAILED_RUN_ID" \
            '{payload_sha256:$payload_sha256,payload_bytes:$payload_bytes,gzip_sha256:$gzip_sha256,gzip_bytes:$gzip_bytes,patch_sha256:$patch_sha256,patch_bytes:$patch_bytes,failed_run_id:$failed_run_id}' \
            > /tmp/phase3-payload.json
          {
            echo '## Phase 3 payload diagnostics'
            echo
            echo '```text'
            cat /tmp/phase3-payload.json
            echo
            grep -nE 'FAILED|WARNING|sha256|patch|error:|Error|fatal:|No such file|does not apply|corrupt' /tmp/failed.log | tail -n 80 || true
            echo '```'
          } > /tmp/diagnostics.md
          gh pr comment 14 --repo "$GITHUB_REPOSITORY" --body-file /tmp/diagnostics.md
          git fetch origin agent/phase-2c-real-data-benchmark
          git switch -C agent/phase-2c-real-data-benchmark origin/agent/phase-2c-real-data-benchmark
          mkdir -p .status
          cp /tmp/phase3-payload.json .status/phase3-payload.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3-payload.json
          git commit -m "capture exact Phase 3 payload hashes" || true
          git push origin HEAD:agent/phase-2c-real-data-benchmark
