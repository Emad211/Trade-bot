name: diagnose-phase3-publisher

# Generation 2: inspect the exact payload stored on the target branch.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/diagnose-phase3-publisher.yml"

permissions:
  actions: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_RUN_ID: "29480551988"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-classical-robustness
      - name: Inspect payload and failed run
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=.bootstrap/phase3-classical-robustness.patch.gz.b64
          actual_payload_hash=$(sha256sum "$PAYLOAD" | cut -d' ' -f1)
          actual_payload_size=$(wc -c < "$PAYLOAD")
          base64 --decode "$PAYLOAD" > /tmp/phase3.patch.gz
          actual_gzip_hash=$(sha256sum /tmp/phase3.patch.gz | cut -d' ' -f1)
          actual_gzip_size=$(wc -c < /tmp/phase3.patch.gz)
          gzip --decompress --stdout /tmp/phase3.patch.gz > /tmp/phase3.patch
          actual_patch_hash=$(sha256sum /tmp/phase3.patch | cut -d' ' -f1)
          actual_patch_size=$(wc -c < /tmp/phase3.patch)
          gh run view "$FAILED_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/failed.log
          {
            echo '## Phase 3 payload diagnostics'
            echo
            echo '```text'
            echo "payload_sha256=$actual_payload_hash"
            echo "payload_bytes=$actual_payload_size"
            echo "gzip_sha256=$actual_gzip_hash"
            echo "gzip_bytes=$actual_gzip_size"
            echo "patch_sha256=$actual_patch_hash"
            echo "patch_bytes=$actual_patch_size"
            echo
            grep -nE 'FAILED|WARNING|sha256|patch|error:|Error|fatal:|No such file|does not apply|corrupt' /tmp/failed.log | tail -n 80 || true
            echo '```'
          } > /tmp/diagnostics.md
          gh pr comment 14 --repo "$GITHUB_REPOSITORY" --body-file /tmp/diagnostics.md
