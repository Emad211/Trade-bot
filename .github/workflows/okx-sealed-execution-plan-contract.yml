name: OKX Sealed One-Time Execution Plan Contract

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/okx-sealed-execution-plan-contract.yml
      - src/hybrid_trader/replication/okx_no_trade_execution_plan.py
      - scripts/run_okx_no_trade_observation.py
      - scripts/validate_okx_no_trade_execution_plan_contract.py
      - tests/test_okx_no_trade_execution_plan.py
      - tests/test_okx_no_trade_observation.py
      - docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-gate.yaml
      - docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-runbook.md
  push:
    branches: [agent/edge-research-reports]
    paths:
      - .github/workflows/okx-sealed-execution-plan-contract.yml
      - src/hybrid_trader/replication/okx_no_trade_execution_plan.py
      - scripts/run_okx_no_trade_observation.py
      - scripts/validate_okx_no_trade_execution_plan_contract.py
      - tests/test_okx_no_trade_execution_plan.py
      - tests/test_okx_no_trade_observation.py
      - docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-gate.yaml
      - docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-runbook.md

permissions:
  contents: read

concurrency:
  group: okx-sealed-execution-plan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-synthetic-sealed-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out exact source head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and verification tools
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e ".[dev]"

      - name: Prove owner credentials are absent from CI
        shell: bash
        run: |
          set -euo pipefail
          for name in OKX_API_KEY OKX_SECRET_KEY OKX_PASSPHRASE; do
            if [[ -n "${!name:-}" ]]; then
              echo "Unexpected owner credential variable: $name" >&2
              exit 1
            fi
          done

      - name: Run exact-head preflight without network access
        shell: bash
        env:
          OKX_API_KEY: gate63-ci-synthetic-api-key
          OKX_SECRET_KEY: gate63-ci-synthetic-secret-key
          OKX_PASSPHRASE: gate63-ci-synthetic-passphrase
        run: |
          set -euo pipefail
          actual_head="$(git rev-parse HEAD)"
          if [[ "$actual_head" != "$SOURCE_HEAD_SHA" ]]; then
            echo "Checkout head $actual_head does not match source head $SOURCE_HEAD_SHA" >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain=v1 --untracked-files=normal)" ]]; then
            echo 'Checkout is not clean before sealed preflight' >&2
            git status --short
            exit 1
          fi
          root="${RUNNER_TEMP}/gate63-owner-local"
          mkdir -p "$root/private" "$root/safe"
          python scripts/run_okx_no_trade_observation.py preflight \
            --private-root "$root/private" \
            --repository-root "$(git rev-parse --show-toplevel)" \
            --private-fee-snapshot-output "$root/private/fee-snapshot.json" \
            --safe-batch-manifest-output "$root/safe/batch-manifest.json" \
            --safe-observation-receipt-output "$root/safe/observation-receipt.json" \
            --policy configs/okx_no_trade_observation_policy_v1.yaml \
            --code-head-sha "$SOURCE_HEAD_SHA" \
            --api-domain www.okx.com \
            --retention-days 2 \
            --confirm I_CONFIRM_OWNER_CONTROLLED_OKX_NO_TRADE_OBSERVATION \
            --enable-public-network-fetch \
            --enable-private-network-fetch \
            --attest-terms-reviewed \
            --attest-personal-noncommercial-use \
            --attest-reasonable-rate-and-scale \
            --attest-redistribution-disabled \
            --attest-encryption-at-rest \
            --attest-owner-only-access \
            --attest-backup-and-sync-excluded \
            --attest-public-artifact-upload-disabled \
            --attest-owner-controlled-private-storage \
            --attest-owner-controlled-encryption-keys \
            --attest-real-execution-owner-confirmed \
            --attest-read-permission-enabled \
            --attest-trade-permission-disabled \
            --attest-withdraw-permission-disabled \
            --attest-ip-allowlist-enabled \
            --attest-credentials-outside-repository \
            --attest-credentials-outside-ci \
            --attest-credentials-not-logged \
            --sealed-execution-plan-output "$root/safe/sealed-plan.json" \
            --plan-claim-output "$root/safe/plan-claim.json" \
            --safe-deletion-receipt-output "$root/safe/deletion-receipt.json" \
            --plan-ttl-seconds 600 \
            > "$root/preflight-summary.json"
          ROOT="$root" python - <<'PY'
          import json
          import os
          import stat
          from pathlib import Path

          root = Path(os.environ['ROOT'])
          plan_path = root / 'safe/sealed-plan.json'
          summary = json.loads((root / 'preflight-summary.json').read_text(encoding='utf-8'))
          plan_text = plan_path.read_text(encoding='utf-8')
          if stat.S_IMODE(plan_path.stat().st_mode) != 0o600:
              raise SystemExit('Sealed plan mode is not 0600')
          if summary['network_request_performed'] is not False:
              raise SystemExit('Preflight unexpectedly performed network access')
          if summary['actual_git_head_sha'] != os.environ['SOURCE_HEAD_SHA']:
              raise SystemExit('Preflight did not bind the exact source head')
          for forbidden in (
              os.environ['OKX_API_KEY'],
              os.environ['OKX_SECRET_KEY'],
              os.environ['OKX_PASSPHRASE'],
              str(root),
          ):
              if forbidden in plan_text:
                  raise SystemExit('Sealed plan leaked a credential or owner path value')
          PY

      - name: Verify code quality and sealed-plan contracts
        run: |
          python -m ruff format --check \
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_execution_plan_contract.py \
            tests/test_okx_no_trade_execution_plan.py
          python -m ruff check \
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_execution_plan_contract.py \
            tests/test_okx_no_trade_execution_plan.py
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_execution_plan_contract.py
          python -m pytest -q -p no:cacheprovider \
            tests/test_okx_no_trade_observation.py \
            tests/test_okx_no_trade_execution_plan.py

      - name: Generate synthetic safe evidence
        run: |
          rm -rf build/gate63-safe
          PYTHONPATH=src python scripts/validate_okx_no_trade_execution_plan_contract.py \
            --output-dir build/gate63-safe \
            --code-head-sha "${SOURCE_HEAD_SHA}"

      - name: Independently verify safe evidence and closed gates
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('build/gate63-safe')
          files = [path for path in root.rglob('*') if path.is_file()]
          expected = root / 'okx-sealed-execution-plan-safe-evidence.json'
          if files != [expected]:
              raise SystemExit(f'Unexpected Gate 63 evidence files: {files}')
          evidence = json.loads(expected.read_text(encoding='utf-8'))
          if evidence['code_head_sha'] != os.environ['SOURCE_HEAD_SHA']:
              raise SystemExit('Safe evidence is not bound to the exact source head')
          required_true = (
              'actual_head_bound',
              'clean_worktree_required',
              'plan_mode_0600',
              'claim_mode_0600',
              'credential_binding_hmac_present',
              'plan_authenticator_hmac_present',
              'claim_created_before_executor',
              'successful_claim_finalized',
              'replay_rejected',
              'failure_raised_after_claim',
              'failed_plan_consumed',
              'failed_plan_replay_rejected',
              'configuration_change_rejected',
              'credential_change_rejected',
              'expired_plan_rejected',
              'dirty_worktree_rejected',
              'head_mismatch_rejected',
              'durable_file_and_parent_directory_fsync_verified',
              'invalid_receipt_sha_rejected',
              'invalid_receipt_plan_consumed',
              'tampered_claim_rejected',
              'safe_local_plan_and_claim_exclude_values',
          )
          if any(evidence[name] is not True for name in required_true):
              raise SystemExit('A required Gate 63 proof is not true')
          closed = (
              'credentials_present_in_safe_evidence',
              'owner_path_values_present_in_safe_evidence',
              'real_public_request_performed',
              'real_private_fee_request_performed',
              'credentials_supplied_to_ci',
              'orders_sent',
              'trade_permission_used',
              'withdraw_permission_used',
              'basis_computation_authorized',
              'funding_pnl_computation_authorized',
              'returns_computation_authorized',
              'transaction_cost_estimation_authorized',
              'strategy_testing_authorized',
              'paper_or_live_trading_authorized',
              'report_2_4_authorized',
          )
          if any(evidence[name] is not False for name in closed):
              raise SystemExit('A closed Gate 63 field was opened')
          text = expected.read_text(encoding='utf-8').casefold()
          for token in ('api_key', 'secret_key', 'passphrase', 'fee-snapshot.json', 'private-raw'):
              if token in text:
                  raise SystemExit(f'Forbidden safe-evidence token: {token}')
          PY

      - name: Upload safe synthetic evidence
        uses: actions/upload-artifact@v7
        with:
          name: okx-sealed-execution-plan-safe-evidence-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/gate63-safe/okx-sealed-execution-plan-safe-evidence.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
