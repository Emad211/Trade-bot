name: OKX 2022 Funding HEAD Probe

on:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/okx-2022-funding-head-probe.yml

permissions:
  contents: write

jobs:
  head-only:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Inspect official file delivery with HEAD only
        run: |
          mkdir -p build/okx-2022-funding-head
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import urllib.error
          import urllib.request
          from pathlib import Path
          from urllib.parse import urlsplit

          SOURCE_URL = (
              'https://static.okx.com/cdn/okex/traderecords/swaprates/'
              'monthly/202203/BTC-USDT-SWAP-fundingrates-2022-03.zip'
          )
          ALLOWED_HOSTS = {'static.okx.com', 'www.okx.com', 'okx.com'}
          redirect_chain: list[dict[str, object]] = []

          class RecordingRedirectHandler(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  target = urlsplit(newurl)
                  redirect_chain.append({
                      'status': int(code),
                      'from_host': urlsplit(req.full_url).hostname or '',
                      'to_scheme': target.scheme,
                      'to_host': target.hostname or '',
                      'to_path': target.path,
                      'to_query_key_names': sorted(
                          part.split('=', 1)[0]
                          for part in target.query.split('&') if part
                      ),
                      'to_url_sha256': hashlib.sha256(newurl.encode()).hexdigest(),
                  })
                  return super().redirect_request(req, fp, code, msg, headers, newurl)

          opener = urllib.request.build_opener(RecordingRedirectHandler())
          request = urllib.request.Request(
              SOURCE_URL,
              method='HEAD',
              headers={
                  'Accept': '*/*',
                  'Referer': 'https://www.okx.com/en-gb/historical-data',
                  'User-Agent': 'Emad211-Trade-bot-replication/1.0',
              },
          )
          status = None
          final_url = SOURCE_URL
          headers: dict[str, str] = {}
          error_class = None
          error_message_sha256 = None
          try:
              with opener.open(request, timeout=60) as response:
                  status = int(response.status)
                  final_url = response.geturl()
                  headers = {key.lower(): value for key, value in response.headers.items()}
                  # A HEAD response must not be read; no body is requested or retained.
          except urllib.error.HTTPError as exc:
              status = int(exc.code)
              final_url = exc.geturl()
              headers = {key.lower(): value for key, value in exc.headers.items()}
              error_class = type(exc).__name__
              error_message_sha256 = hashlib.sha256(str(exc).encode()).hexdigest()
          except urllib.error.URLError as exc:
              error_class = type(exc.reason).__name__
              error_message_sha256 = hashlib.sha256(str(exc.reason).encode()).hexdigest()

          final = urlsplit(final_url)
          if final.scheme != 'https' or (final.hostname or '') not in ALLOWED_HOSTS:
              raise SystemExit(f'HEAD resolved outside the official host allow-list: {final_url}')
          for item in redirect_chain:
              if item['to_scheme'] != 'https' or item['to_host'] not in ALLOWED_HOSTS:
                  raise SystemExit(f'Unsafe redirect: {item}')

          selected_headers = {
              key: headers.get(key)
              for key in (
                  'content-type', 'content-length', 'etag', 'last-modified',
                  'accept-ranges', 'content-disposition', 'cache-control',
                  'x-amz-version-id', 'x-oss-object-type', 'x-oss-hash-crc64ecma',
              )
              if headers.get(key) is not None
          }
          delivery_class = (
              'HEAD_FILE_AVAILABLE'
              if status in {200, 206}
              else 'HEAD_METHOD_UNSUPPORTED'
              if status in {405, 501}
              else 'BLOCKED_ACCESS_OR_DELIVERY'
          )
          evidence = {
              'schema_version': '1.0',
              'purpose': 'OKX_MARCH_2022_FUNDING_FILE_HEAD_ONLY',
              'source_url': SOURCE_URL,
              'source_url_sha256': hashlib.sha256(SOURCE_URL.encode()).hexdigest(),
              'request_method': 'HEAD',
              'status': status,
              'final_scheme': final.scheme,
              'final_host': final.hostname or '',
              'final_path': final.path,
              'final_query_key_names': sorted(
                  part.split('=', 1)[0]
                  for part in final.query.split('&') if part
              ),
              'final_url_sha256': hashlib.sha256(final_url.encode()).hexdigest(),
              'redirect_chain': redirect_chain,
              'selected_headers': selected_headers,
              'error_class': error_class,
              'error_message_sha256': error_message_sha256,
              'delivery_class': delivery_class,
              'response_body_requested': False,
              'response_body_retained': False,
              'market_file_downloaded': False,
              'market_rows_retained': False,
              'basis_computed': False,
              'funding_pnl_computed': False,
              'returns_computed': False,
              'gate_verdict': 'UNRESOLVED_HEAD_ONLY',
          }
          Path('build/okx-2022-funding-head/evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          print(json.dumps(evidence, indent=2, sort_keys=True))
          PY
      - name: Verify no-body boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          evidence = json.loads(
              Path('build/okx-2022-funding-head/evidence.json').read_text()
          )
          assert evidence['request_method'] == 'HEAD'
          assert evidence['response_body_requested'] is False
          assert evidence['response_body_retained'] is False
          assert evidence['market_file_downloaded'] is False
          assert evidence['market_rows_retained'] is False
          assert evidence['basis_computed'] is False
          assert evidence['funding_pnl_computed'] is False
          assert evidence['returns_computed'] is False
          assert evidence['gate_verdict'] == 'UNRESOLVED_HEAD_ONLY'
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: okx-2022-funding-head-${{ github.sha }}
          path: build/okx-2022-funding-head/evidence.json
          if-no-files-found: error
          retention-days: 30
      - name: Retire one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/okx-2022-funding-head-probe.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/okx-2022-funding-head-probe.yml
          git commit -m 'Retire one-shot OKX funding HEAD probe'
          git push origin HEAD:agent/edge-research-reports
