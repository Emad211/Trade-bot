name: snapshot-phase3h-status

# Generation 3: snapshot the self-reporting live-probe head.
on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/snapshot-phase3h-status.yml"

permissions:
  actions: read
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 3e86d0218a5b61d7bd56aa6a1c2c0185dfef8846
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Snapshot exact Phase 3H branch runs
        run: |
          mkdir -p .status
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3h-source-admission&per_page=100" \
            --jq --arg sha "$TARGET_SHA" '{runs: [.workflow_runs[] | select(.head_sha == $sha) | {id,name,event,status,conclusion,head_sha,html_url,created_at,updated_at}]}' \
            > .status/phase3h-exact-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3h-exact-status.json
          git commit -m "snapshot self-reporting Phase 3H status" || true
          git push origin HEAD:agent/phase3c-hardening-runner
