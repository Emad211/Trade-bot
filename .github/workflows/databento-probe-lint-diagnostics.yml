name: Databento Probe Lint Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/databento-probe-lint-diagnostics.yml
      - src/hybrid_trader/replication/databento_metadata_probe.py
      - scripts/run_databento_zero_purchase_probe.py
      - tests/test_databento_metadata_probe.py

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tool
        run: python -m pip install --upgrade pip && python -m pip install "ruff>=0.8,<1"
      - name: Capture Ruff output
        shell: bash
        run: |
          mkdir -p build/diagnostics
          set +e
          python -m ruff check \
            src/hybrid_trader/replication/databento_metadata_probe.py \
            scripts/run_databento_zero_purchase_probe.py \
            tests/test_databento_metadata_probe.py \
            > build/diagnostics/ruff.txt 2>&1
          code=$?
          cat build/diagnostics/ruff.txt
          echo "$code" > build/diagnostics/ruff-exit-code.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: databento-probe-ruff-diagnostics-${{ github.sha }}
          path: build/diagnostics/
          if-no-files-found: error
          retention-days: 14
