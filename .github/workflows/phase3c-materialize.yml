name: phase3c-materialize

on:
  pull_request:
    branches: ["agent/phase-3b-prospective-events"]
    paths:
      - "src/hybrid_trader/avalai.py"
      - "src/hybrid_trader/avalai_capture.py"
      - "tests/test_avalai_provider.py"
      - "tests/test_phase3c_avalai_capture.py"
      - "scripts/materialize_avalai_audit_hardening.py"
      - "scripts/fix_avalai_identity.py"
      - ".github/workflows/phase3c-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ github.head_ref == 'agent/phase-3c-avalai-provider' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3c-avalai-provider
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply audit hardening and identity fixes
        run: |
          python scripts/materialize_avalai_audit_hardening.py
          python scripts/fix_avalai_identity.py
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Format and validate provider integration
        run: |
          ruff format .
          ruff check --fix .
          ruff format --check .
          ruff check .
          python -m compileall -q src scripts tests
          pytest -q tests/test_avalai_provider.py tests/test_phase3c_avalai_capture.py
      - name: Remove one-time files
        run: |
          rm -f \
            scripts/materialize_avalai_audit_hardening.py \
            scripts/fix_avalai_identity.py \
            .github/workflows/phase3c-materialize.yml \
            .github/workflows/avalai-docs-inspect.yml
      - name: Commit materialized provider
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "harden and format AvalAI provider integration"
          git push origin HEAD:agent/phase-3c-avalai-provider
