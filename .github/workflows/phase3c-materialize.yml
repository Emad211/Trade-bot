name: phase3c-materialize

on:
  push:
    branches: ["agent/phase-3c-avalai-provider"]
    paths:
      - "scripts/materialize_avalai_audit_hardening.py"
      - ".github/workflows/phase3c-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3c-avalai-provider
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply audit hardening
        run: python scripts/materialize_avalai_audit_hardening.py
      - name: Install formatting tools
        run: python -m pip install -e '.[dev]'
      - name: Format and apply safe lint fixes
        run: |
          ruff format .
          ruff check --fix .
          python -m compileall -q src scripts tests
      - name: Remove one-time materializer
        run: rm -f scripts/materialize_avalai_audit_hardening.py .github/workflows/phase3c-materialize.yml
      - name: Commit materialized provider
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "harden and format AvalAI provider integration"
          git push origin HEAD:agent/phase-3c-avalai-provider
