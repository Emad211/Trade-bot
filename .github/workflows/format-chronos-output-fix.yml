name: format-chronos-output-fix

on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/format-chronos-output-fix.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-chronos-batch-output
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Format and validate
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Commit formatter output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hybrid_trader/forecasting/chronos_adapter.py \
                  src/hybrid_trader/forecasting/batched.py \
                  tests/test_chronos_output_shapes.py
          git commit -m "format Chronos output normalization" || true
          git push origin HEAD:agent/fix-chronos-batch-output
