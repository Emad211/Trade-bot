name: diagnose-pr13-ci-v2

# Trigger revision after workflow registration.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/diagnose-pr13-ci-v2.yml"

permissions:
  actions: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_RUN_ID: "29477231030"
    steps:
      - name: Post exact failed lines
        shell: bash
        run: |
          set -euo pipefail
          gh run view "$FAILED_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/failed.log
          {
            echo '## Latest PR 13 CI diagnostics'
            echo
            echo '```text'
            grep -nE 'Would reformat|error:|ERROR|FAILED|FAILURES|Traceback|ModuleNotFoundError|ImportError|AssertionError' /tmp/failed.log | tail -n 200 || true
            echo '```'
          } > /tmp/diagnostics.md
          gh pr comment 13 --repo "$GITHUB_REPOSITORY" --body-file /tmp/diagnostics.md
