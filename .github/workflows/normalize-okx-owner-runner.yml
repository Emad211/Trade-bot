name: normalize-okx-owner-runner

on:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/normalize-okx-owner-runner.yml

permissions:
  contents: write

jobs:
  normalize-verify-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install verification dependencies
        run: python -m pip install -e '.[dev,replication]'
      - name: Apply verified clock fix and exact Ruff output
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/hybrid_trader/replication/okx_owner_sampling_runner.py')
          text = path.read_text(encoding='utf-8')
          old = 'research_available_at = datetime.now(UTC)\n'
          new = 'research_available_at = max(datetime.now(UTC), timed.response_received_at)\n'
          if old not in text:
              raise SystemExit('Expected clock line was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          files=(
            src/hybrid_trader/replication/okx_owner_sampling_runner.py
            scripts/run_okx_owner_private_sampling.py
            scripts/validate_okx_owner_sampling_runner.py
            tests/test_okx_owner_sampling_runner.py
          )
          ruff format "${files[@]}"
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
      - name: Verify normalized runner
        run: |
          files=(
            src/hybrid_trader/replication/okx_owner_sampling_runner.py
            scripts/run_okx_owner_private_sampling.py
            scripts/validate_okx_owner_sampling_runner.py
            tests/test_okx_owner_sampling_runner.py
          )
          ruff format --check "${files[@]}"
          ruff check "${files[@]}"
          mypy \
            src/hybrid_trader/replication/okx_owner_sampling_runner.py \
            scripts/run_okx_owner_private_sampling.py \
            scripts/validate_okx_owner_sampling_runner.py
          pytest -q \
            tests/test_okx_owner_sampling_runner.py \
            tests/test_okx_private_sampling.py \
            tests/test_revocable_retention.py
          python -m compileall -q \
            src/hybrid_trader/replication/okx_owner_sampling_runner.py \
            scripts/run_okx_owner_private_sampling.py \
            scripts/validate_okx_owner_sampling_runner.py \
            tests/test_okx_owner_sampling_runner.py
      - name: Retire workflow and publish exact output
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/normalize-okx-owner-runner.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/hybrid_trader/replication/okx_owner_sampling_runner.py \
            scripts/run_okx_owner_private_sampling.py \
            scripts/validate_okx_owner_sampling_runner.py \
            tests/test_okx_owner_sampling_runner.py \
            .github/workflows/normalize-okx-owner-runner.yml
          git commit -m 'Normalize owner-side OKX sampling runner'
          git push origin HEAD:agent/edge-research-reports
