name: capture-phase3-publisher-status

# Trigger revision after workflow registration.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/capture-phase3-publisher-status.yml"

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - name: Wait for and capture Phase 3 publisher
        shell: bash
        run: |
          set -euo pipefail
          run=""
          for attempt in $(seq 1 320); do
            run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-2c-real-data-benchmark&per_page=100" \
              --jq '[.workflow_runs[] | select(.name == "publish-phase3-classical-robustness")][0]')
            if [ "$(jq -r '.status // empty' <<<"$run")" = "completed" ]; then
              break
            fi
            sleep 15
          done
          test -n "$run"
          run_id=$(jq -r .id <<<"$run")
          jobs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")
          artifacts=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100")
          mkdir -p .status
          jq -n --argjson run "$run" --argjson jobs "$jobs" --argjson artifacts "$artifacts" \
            '{run:$run,jobs:$jobs.jobs,artifacts:$artifacts.artifacts}' \
            > .status/phase3-publisher.json
          {
            echo '## Phase 3 publisher status'
            echo
            echo "- run: $(jq -r .html_url <<<"$run")"
            echo "- conclusion: **$(jq -r .conclusion <<<"$run")**"
            echo
            jq -r '.jobs[] as $job | $job.steps[]? | "- \($job.name) / \(.name): \(.status) / \(.conclusion)"' <<<"$jobs"
          } > /tmp/phase3-publisher.md
          gh pr comment 14 --repo "$GITHUB_REPOSITORY" --body-file /tmp/phase3-publisher.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3-publisher.json
          git commit -m "capture Phase 3 publisher status" || true
          git push origin HEAD:agent/phase-2c-real-data-benchmark
