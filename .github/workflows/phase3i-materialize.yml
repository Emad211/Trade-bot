name: phase3i-materialize

# Publish validated source/test changes only; workflow changes use the connector.
on:
  push:
    branches: ["agent/phase-3i-state-lineage"]
    paths:
      - "scripts/materialize_phase3i_schedule.py"
      - ".github/workflows/phase3i-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3i-state-lineage
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply Phase 3I scheduling transition
        run: python scripts/materialize_phase3i_schedule.py
      - name: Install development dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Format and validate Phase 3I
        run: |
          ruff format \
            scripts/select_phase3i_semantic_state.py \
            scripts/assess_phase3i_state.py \
            src/hybrid_trader/phase3i_lineage.py \
            src/hybrid_trader/phase3i_health.py \
            src/hybrid_trader/phase3i_trajectory.py \
            tests/test_phase3i_lineage.py \
            tests/test_phase3i_health.py \
            tests/test_phase3i_trajectory.py
          ruff check --fix \
            scripts/select_phase3i_semantic_state.py \
            scripts/assess_phase3i_state.py \
            src/hybrid_trader/phase3i_lineage.py \
            src/hybrid_trader/phase3i_health.py \
            src/hybrid_trader/phase3i_trajectory.py \
            tests/test_phase3i_lineage.py \
            tests/test_phase3i_health.py \
            tests/test_phase3i_trajectory.py
          mypy --python-version 3.12 src
          pytest \
            tests/test_phase3i_lineage.py \
            tests/test_phase3i_health.py \
            tests/test_phase3i_trajectory.py \
            -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Commit validated source and tests
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .github/workflows/phase3g-prospective-overlap.yml
          rm -f scripts/materialize_phase3i_schedule.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/select_phase3i_semantic_state.py \
            scripts/assess_phase3i_state.py \
            src/hybrid_trader/phase3i_lineage.py \
            src/hybrid_trader/phase3i_health.py \
            src/hybrid_trader/phase3i_trajectory.py \
            tests/test_phase3i_lineage.py \
            tests/test_phase3i_health.py \
            tests/test_phase3i_trajectory.py
          git add -A scripts/materialize_phase3i_schedule.py
          git commit -m "add Phase 3I semantic state lineage and source health"
          git push origin HEAD:agent/phase-3i-state-lineage
