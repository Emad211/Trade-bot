name: Fix Moreira Muir Reconciliation Imports

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-mm-reconciliation-imports.yml
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/fix-mm-reconciliation-imports.yml

permissions:
  contents: write

jobs:
  fix-verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Apply exact import normalization
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/hybrid_trader/replication/moreira_muir_reconciliation.py')
          text = path.read_text(encoding='utf-8')
          old = '''import numpy as np
          import pandas as pd

          from .kenneth_french_monthly import (
              SNAPSHOT_ID as MONTHLY_SNAPSHOT_ID,
          )
          from .kenneth_french_monthly import (
              SOURCE_CONTRACTS as MONTHLY_SOURCE_CONTRACTS,
          )
          from .kenneth_french_monthly import (
              build_selected_monthly_panel,
              parse_monthly_zip,
              validate_data_library_page,
          )
          from .moreira_muir import (
              EXPECTED_SHA256 as AUTHOR_SOURCE_SHA256,
          )
          from .moreira_muir import (
              SNAPSHOT_ID as AUTHOR_SNAPSHOT_ID,
          )
          from .moreira_muir import parse_official_factor_bytes, validate_author_page
          '''
          old = '\n'.join(line[10:] if line.startswith('          ') else line for line in old.splitlines()) + '\n'
          new = '''import pandas as pd

          from .kenneth_french_monthly import (
              SNAPSHOT_ID as MONTHLY_SNAPSHOT_ID,
              SOURCE_CONTRACTS as MONTHLY_SOURCE_CONTRACTS,
              build_selected_monthly_panel,
              parse_monthly_zip,
              validate_data_library_page,
          )
          from .moreira_muir import (
              EXPECTED_SHA256 as AUTHOR_SOURCE_SHA256,
              SNAPSHOT_ID as AUTHOR_SNAPSHOT_ID,
              parse_official_factor_bytes,
              validate_author_page,
          )
          '''
          new = '\n'.join(line[10:] if line.startswith('          ') else line for line in new.splitlines()) + '\n'
          if text.count(old) != 1:
              raise SystemExit('Unexpected reconciliation import block')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e ".[dev,replication]"
      - name: Verify exact files
        run: |
          python -m ruff check \
            src/hybrid_trader/replication/moreira_muir_reconciliation.py \
            scripts/reconcile_moreira_muir_current_sources.py \
            tests/test_moreira_muir_reconciliation.py
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/moreira_muir_reconciliation.py \
            scripts/reconcile_moreira_muir_current_sources.py
          python -m pytest -q tests/test_moreira_muir_reconciliation.py
      - name: Commit import normalization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hybrid_trader/replication/moreira_muir_reconciliation.py
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "Normalize Moreira Muir reconciliation imports"
          git push origin HEAD:agent/edge-research-reports
