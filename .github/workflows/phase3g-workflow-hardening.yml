name: phase3g-workflow-hardening

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase-3g-prospective-overlap"]
    paths:
      - "scripts/materialize_phase3g_workflow.py"
      - ".github/workflows/phase3g-workflow-hardening.yml"

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3g-prospective-overlap
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply workflow fixes
        run: python scripts/materialize_phase3g_workflow.py
      - name: Validate code and workflow syntax
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format scripts/run_phase3g_overlap.py src/hybrid_trader/phase3g_market.py src/hybrid_trader/phase3g_trajectory.py src/hybrid_trader/phase3g_overlap.py tests/test_phase3g_market.py tests/test_phase3g_trajectory.py tests/test_phase3g_overlap.py
          ruff check --fix scripts/run_phase3g_overlap.py src/hybrid_trader/phase3g_market.py src/hybrid_trader/phase3g_trajectory.py src/hybrid_trader/phase3g_overlap.py tests/test_phase3g_market.py tests/test_phase3g_trajectory.py tests/test_phase3g_overlap.py
          python - <<'PY'
          from pathlib import Path
          import yaml
          payload = yaml.safe_load(
              Path(".github/workflows/phase3g-prospective-overlap.yml").read_text()
          )
          if not isinstance(payload, dict) or "jobs" not in payload:
              raise RuntimeError("Phase 3G workflow YAML is invalid")
          PY
          mypy --python-version 3.12 src
          pytest tests/test_phase3g_market.py tests/test_phase3g_trajectory.py tests/test_phase3g_overlap.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/materialize_phase3g_workflow.py .github/workflows/phase3g-workflow-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add validated Phase 3G overlap workflow"
          git push origin HEAD:agent/phase-3g-prospective-overlap
