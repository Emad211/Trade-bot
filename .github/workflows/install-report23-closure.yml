name: install-report23-closure

on:
  pull_request:
    branches: [main]
    paths:
      - .report23-closure-payload.b64
      - .github/workflows/install-report23-closure.yml

permissions:
  contents: write

concurrency:
  group: install-report23-closure
  cancel-in-progress: false

jobs:
  verify-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decode content-addressed closure payload
        run: |
          set -euo pipefail
          base64 -d .report23-closure-payload.b64 > /tmp/report23-closure.tar.gz
          echo '118681afe8f492f90df54c5d02ee94b03ad699211b789ba46445259ed79d723b  /tmp/report23-closure.tar.gz' | sha256sum -c -
          tar -xzf /tmp/report23-closure.tar.gz

      - name: Verify closure matrix and authoritative documents
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          root = Path('docs/research/edge-discovery')
          rep = root / '02-replication'
          matrix = yaml.safe_load((rep / '02-03-report-closure-matrix.yaml').read_text(encoding='utf-8'))
          assert matrix['status'] == 'COMPLETE_WITH_EXPLICIT_BLOCKERS'
          assert matrix['target_outcome'] == 'COMPLETE_WITH_EXPLICIT_BLOCKERS'
          assert matrix['all_six_hypothesis_verdicts'] == 'INCONCLUSIVE'
          assert matrix['report_2_4_authorized'] is False
          assert matrix['paper_replication_pass'] is False
          assert matrix['economic_edge_established'] is False
          assert len(matrix['rows']) == 27
          assert all(item['status'] for item in matrix['rows'])
          assert all(item['reentry'] for item in matrix['rows'])
          assert all(value is False for value in matrix['hard_non_authorizations'].values())

          report = (rep / '02-03-report-closure.md').read_text(encoding='utf-8')
          controlling = (rep / '02-03-current-controlling-status.md').read_text(encoding='utf-8')
          readme = (root / 'README.md').read_text(encoding='utf-8')
          for text in (report, controlling, readme):
              assert 'COMPLETE_WITH_EXPLICIT_BLOCKERS' in text
              assert 'INCONCLUSIVE' in text
              assert 'Report 2.4' in text
          assert 'Complete closure matrix' in report
          assert 'Issue #60' in report
          assert '02-03-report-closure-matrix.yaml' in controlling
          assert 'Final Report 2.3 closure report' in readme
          print({'closure_rows': len(matrix['rows']), 'status': matrix['status']})
          PY

      - name: Publish closure documents and retire installer through Git Data API
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: agent/edge-research-reports
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ['REPOSITORY']
          branch = os.environ['BRANCH']
          token = os.environ['GH_TOKEN']
          api = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
          }

          def call(method, url, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read().decode())

          ref = call('GET', f'{api}/git/ref/heads/{branch}')
          parent = ref['object']['sha']
          commit = call('GET', f'{api}/git/commits/{parent}')
          base_tree = commit['tree']['sha']

          paths = [
              'docs/research/edge-discovery/02-replication/02-03-report-closure-matrix.yaml',
              'docs/research/edge-discovery/02-replication/02-03-report-closure.md',
              'docs/research/edge-discovery/02-replication/02-03-current-controlling-status.md',
              'docs/research/edge-discovery/README.md',
          ]
          entries = []
          for path in paths:
              raw = Path(path).read_bytes()
              blob = call('POST', f'{api}/git/blobs', {
                  'content': base64.b64encode(raw).decode(),
                  'encoding': 'base64',
              })
              entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': blob['sha']})

          entries.extend([
              {'path': '.report23-closure-payload.b64', 'mode': '100644', 'type': 'blob', 'sha': None},
              {'path': '.github/workflows/install-report23-closure.yml', 'mode': '100644', 'type': 'blob', 'sha': None},
          ])
          tree = call('POST', f'{api}/git/trees', {'base_tree': base_tree, 'tree': entries})
          new_commit = call('POST', f'{api}/git/commits', {
              'message': 'Finalize Report 2.3 closure matrix',
              'tree': tree['sha'],
              'parents': [parent],
          })
          call('PATCH', f'{api}/git/refs/heads/{branch}', {'sha': new_commit['sha'], 'force': False})
          print({'parent': parent, 'commit': new_commit['sha']})
          PY
