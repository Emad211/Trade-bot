name: publish-foundation-timing-clean-source

on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/publish-foundation-timing-clean-source.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build clean source branch from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/fix-foundation-forecast-timing
          git switch -c agent/fix-foundation-timing-clean origin/main
          git checkout origin/agent/fix-foundation-forecast-timing -- \
            src/hybrid_trader/cli.py \
            src/hybrid_trader/data/artifact.py \
            src/hybrid_trader/forecasting/batched.py \
            src/hybrid_trader/forecasting/rolling.py \
            tests/test_batched_forecasting.py \
            tests/test_forecasting.py \
            tests/test_tabular_artifact.py
      - name: Validate clean source branch
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and clean-install wheel
        run: |
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/foundation-timing-clean
          /tmp/foundation-timing-clean/bin/python -m pip install dist/*.whl
          /tmp/foundation-timing-clean/bin/hybrid-trader --help >/dev/null
          /tmp/foundation-timing-clean/bin/python - <<'PY'
          import hybrid_trader.data.artifact
          import hybrid_trader.forecasting.batched
          import hybrid_trader.forecasting.rolling
          PY
          /tmp/foundation-timing-clean/bin/python -m pip check
      - name: Publish clean source commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "fix foundation forecast-origin timing semantics"
          git push origin HEAD:agent/fix-foundation-timing-clean
