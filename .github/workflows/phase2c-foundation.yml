name: phase2c-foundation

on:
  workflow_dispatch:
    inputs:
      baseline_run_id:
        description: "Successful phase2c-historical run ID"
        required: true
        type: string
  workflow_run:
    workflows: ["phase2c-historical"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  foundation:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Resolve historical run
        id: baseline
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
          else
            RUN_ID="${{ inputs.baseline_run_id }}"
          fi
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Download historical evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p baseline-download
          gh run download "${{ steps.baseline.outputs.run_id }}" --dir baseline-download
          REGISTRY=$(find baseline-download -type f -name source_registry.json -print -quit)
          test -n "$REGISTRY"
          echo "BASELINE_ROOT=$(dirname "$REGISTRY")" >> "$GITHUB_ENV"
      - name: Install baseline verification dependencies
        run: python -m pip install -e .
      - name: Re-verify historical gates
        run: |
          python scripts/verify_phase2c_artifacts.py "$BASELINE_ROOT"
          python scripts/verify_phase2c_artifacts_strict.py \
            "$BASELINE_ROOT" \
            --spec configs/phase2c_sources_authoritative.yaml
          python scripts/verify_phase2c_macro_gate.py \
            "$BASELINE_ROOT" \
            --spec configs/phase2c_sources_authoritative.yaml
      - name: Resolve immutable model revisions
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          models = {
              "TIMESFM_REVISION": "google/timesfm-2.5-200m-pytorch",
              "CHRONOS_REVISION": "amazon/chronos-2",
          }
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              for variable, model in models.items():
                  request = urllib.request.Request(
                      f"https://huggingface.co/api/models/{model}",
                      headers={"User-Agent": "hybrid-trader-phase2c/1.0"},
                  )
                  with urllib.request.urlopen(request, timeout=60) as response:
                      revision = json.load(response).get("sha")
                  if not revision or len(revision) != 40:
                      raise RuntimeError(f"Unresolved model revision: {model}")
                  output.write(f"{variable}={revision}\n")
          PY
      - name: Install foundation runtimes
        run: python -m pip install -e '.[forecast,ml]'
      - name: Execute pinned challenger matrix
        run: |
          python scripts/run_phase2c_foundation.py \
            --baseline-root "$BASELINE_ROOT" \
            --config configs/phase2c_btc_4h.yaml \
            --output artifacts/phase2c-foundation \
            --timesfm-revision "$TIMESFM_REVISION" \
            --chronos-revision "$CHRONOS_REVISION" \
            --device cpu \
            --context 256 \
            --horizon 6 \
            --stride 6 \
            --batch-size 16 \
            --inference-latency-seconds 120
      - name: Verify foundation evidence
        run: |
          python scripts/verify_phase2c_foundation.py \
            artifacts/phase2c-foundation \
            --baseline-root "$BASELINE_ROOT"
      - name: Produce non-activating assessment
        run: python scripts/assess_phase2c_foundation.py artifacts/phase2c-foundation
      - name: Enforce human-review-only status
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("artifacts/phase2c-foundation")
          assessment = json.loads((root / "foundation_assessment.json").read_text())
          if assessment["status"] != "human_review_required":
              raise RuntimeError("Foundation assessment attempted automatic promotion")
          if (root / "prospective_decisions.jsonl").read_text().strip():
              raise RuntimeError("Historical run contains prospective decisions")
          PY
      - name: Record upstream identity
        run: |
          printf '%s\n' "${{ steps.baseline.outputs.run_id }}" \
            > artifacts/phase2c-foundation/historical_run_id.txt
      - name: Build deterministic archive and checksums
        if: always()
        run: |
          mkdir -p artifacts/distribution
          if [ -d artifacts/phase2c-foundation ]; then
            tar --sort=name --mtime='UTC 1970-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf artifacts/distribution/phase2c-foundation-${GITHUB_SHA}.tar.gz \
              -C artifacts phase2c-foundation
          fi
          find artifacts -type f -not -path 'artifacts/distribution/SHA256SUMS' -print0 \
            | sort -z | xargs -0 sha256sum > artifacts/distribution/SHA256SUMS || true
      - name: Upload foundation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2c-foundation-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 90
