name: OKX Historical Confirm Contract Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/okx-historical-confirm-contract-probe.yml

permissions:
  contents: read

concurrency:
  group: okx-historical-confirm-contract-${{ github.ref }}
  cancel-in-progress: false

jobs:
  intercept-confirm-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install isolated Playwright runtime
        run: |
          mkdir -p build/okx-historical-confirm-contract/runtime
          cd build/okx-historical-confirm-contract/runtime
          npm init -y >/dev/null
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Select one symbol and intercept Confirm before transmission
        run: |
          mkdir -p build/okx-historical-confirm-contract/output
          cat > build/okx-historical-confirm-contract/runtime/probe.mjs <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import path from 'node:path';
          import { chromium } from 'playwright';

          const workspace = process.env.GITHUB_WORKSPACE;
          if (!workspace) throw new Error('GITHUB_WORKSPACE is unavailable');
          const outputPath = path.join(
            workspace,
            'build/okx-historical-confirm-contract/output/evidence.json'
          );
          fs.mkdirSync(path.dirname(outputPath), { recursive: true });

          const landingUrl = 'https://www.okx.com/en-gb/historical-data';
          const prohibitedExtensions = /\.(zip|csv|gz|gzip|parquet|tar|7z|bz2|xz)(?:$|[?#])/i;
          const evidence = {
            schema_version: '1.0',
            purpose: 'OKX_HISTORICAL_FUNDING_CONFIRM_REQUEST_CONTRACT_ONLY',
            landing_url: landingUrl,
            requested_symbol: 'BTC-USDT-SWAP',
            navigation: {},
            modal_opened: false,
            symbol_selection: {},
            form_state_before_confirm: {},
            intercepted_confirm_requests: [],
            download_events_cancelled: 0,
            errors: [],
            confirm_clicked: false,
            confirm_request_transmitted: false,
            export_job_created: false,
            raw_market_data_retained: false,
            response_bodies_retained: false,
            gate_verdict: 'UNRESOLVED_CONFIRM_CONTRACT_ONLY'
          };

          function sha256(value) {
            return crypto.createHash('sha256').update(value).digest('hex');
          }

          function safeUrl(raw) {
            try {
              const url = new URL(raw);
              for (const key of [...url.searchParams.keys()]) {
                const value = url.searchParams.get(key) || '';
                url.searchParams.set(
                  key,
                  value ? `sha256:${sha256(value).slice(0, 16)}` : ''
                );
              }
              url.hash = '';
              return url.toString();
            } catch {
              return raw.slice(0, 500);
            }
          }

          function safePostData(raw) {
            if (!raw) return { kind: 'empty', value: '' };
            try {
              const parsed = JSON.parse(raw);
              const sensitive = /token|signature|credential|secret|password|cookie|authorization/i;
              const cleanse = value => {
                if (Array.isArray(value)) return value.map(cleanse);
                if (value && typeof value === 'object') {
                  return Object.fromEntries(
                    Object.entries(value).map(([key, item]) => [
                      key,
                      sensitive.test(key) ? '[REDACTED]' : cleanse(item)
                    ])
                  );
                }
                return value;
              };
              return { kind: 'json', value: cleanse(parsed) };
            } catch {
              return {
                kind: 'non_json',
                byte_count: Buffer.byteLength(raw),
                sha256: sha256(raw)
              };
            }
          }

          let browser = null;
          let armConfirmInterception = false;

          try {
            browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              acceptDownloads: false,
              locale: 'en-GB',
              timezoneId: 'UTC'
            });
            const page = await context.newPage();

            page.on('download', async download => {
              evidence.download_events_cancelled += 1;
              evidence.errors.push({
                stage: 'download_event',
                message: 'Unexpected browser download was cancelled',
                suggested_filename: download.suggestedFilename()
              });
              await download.cancel().catch(() => {});
            });

            await page.route('**/*', async route => {
              const request = route.request();
              const url = request.url();
              const host = (() => {
                try { return new URL(url).hostname.toLowerCase(); }
                catch { return ''; }
              })();
              const resourceType = request.resourceType();

              if (prohibitedExtensions.test(url)) {
                evidence.errors.push({
                  stage: 'file_request_blocked',
                  method: request.method(),
                  resource_type: resourceType,
                  url: safeUrl(url)
                });
                await route.abort('blockedbyclient');
                return;
              }

              if (host && host !== 'okx.com' && host !== 'www.okx.com' && !host.endsWith('.okx.com')) {
                await route.abort('blockedbyclient');
                return;
              }

              if (
                armConfirmInterception &&
                ['fetch', 'xhr'].includes(resourceType) &&
                host.endsWith('okx.com') &&
                !url.includes('/apmfe/') &&
                !url.includes('/et/priapi/')
              ) {
                evidence.intercepted_confirm_requests.push({
                  method: request.method(),
                  resource_type: resourceType,
                  url: safeUrl(url),
                  post_data: safePostData(request.postData()),
                  headers: Object.fromEntries(
                    Object.entries(request.headers())
                      .filter(([key]) =>
                        ['content-type', 'accept', 'origin', 'referer'].includes(key.toLowerCase())
                      )
                  )
                });
                await route.abort('blockedbyclient');
                return;
              }

              await route.continue();
            });

            const response = await page.goto(landingUrl, {
              waitUntil: 'domcontentloaded',
              timeout: 90000
            });
            await page.waitForTimeout(7000);
            evidence.navigation = {
              final_url: safeUrl(page.url()),
              title: await page.title(),
              status: response?.status() ?? null
            };

            const opened = await page.evaluate(() => {
              const normalize = value => (value || '').replace(/\s+/g, ' ').trim();
              const heading = [...document.querySelectorAll('*')]
                .find(element => normalize(element.textContent) === 'Funding rate');
              if (!heading) return false;
              let container = heading;
              for (let depth = 0; depth < 10 && container; depth += 1, container = container.parentElement) {
                const target = [...container.querySelectorAll('button,a,[role="button"]')]
                  .find(element => /download/i.test(
                    normalize(element.textContent) || element.getAttribute('aria-label') || ''
                  ));
                if (target) {
                  target.click();
                  return true;
                }
              }
              return false;
            });
            evidence.modal_opened = opened;
            await page.waitForTimeout(5000);
            const dialog = page.getByRole('dialog');
            if (await dialog.count() !== 1) {
              throw new Error(`Expected one funding dialog, found ${await dialog.count()}`);
            }

            const symbolCombobox = dialog.getByRole('combobox').nth(1);
            await symbolCombobox.click();
            await page.waitForTimeout(1500);
            let option = page.getByRole('option', { name: 'BTC-USDT-SWAP', exact: true });
            if (await option.count() === 0) {
              const searchInput = page.locator('input[type="text"]:visible').last();
              if (await searchInput.count()) {
                await searchInput.fill('BTC-USDT-SWAP').catch(async () => {
                  await page.keyboard.type('BTC-USDT-SWAP');
                });
                await page.waitForTimeout(1500);
              }
              option = page.getByText('BTC-USDT-SWAP', { exact: true });
            }
            if (await option.count() === 0) {
              throw new Error('BTC-USDT-SWAP option was not found in the official symbol selector');
            }
            await option.first().click();
            await page.waitForTimeout(1000);

            evidence.symbol_selection = {
              combobox_text: (await symbolCombobox.innerText()).replace(/\s+/g, ' ').trim(),
              btc_usdt_swap_visible_in_dialog: await dialog
                .getByText('BTC-USDT-SWAP', { exact: true })
                .count() > 0
            };

            const confirm = dialog.getByRole('button', { name: 'Confirm', exact: true });
            evidence.form_state_before_confirm = {
              instrument_type: await dialog.locator('input[value="Perpetual"]').inputValue(),
              date_grouping: await dialog.locator('input[value="Daily"]').inputValue(),
              start_date: await dialog.locator('input[placeholder="Start date"]').inputValue(),
              end_date: await dialog.locator('input[placeholder="End date"]').inputValue(),
              confirm_disabled: await confirm.isDisabled()
            };
            if (evidence.form_state_before_confirm.confirm_disabled) {
              throw new Error('Confirm remained disabled after selecting BTC-USDT-SWAP');
            }

            armConfirmInterception = true;
            evidence.confirm_clicked = true;
            await confirm.click();
            await page.waitForTimeout(5000);
            armConfirmInterception = false;
            evidence.confirm_request_transmitted = false;
            evidence.export_job_created = false;
          } catch (error) {
            evidence.errors.push({
              stage: 'confirm_contract_probe',
              message: String(error?.stack || error)
            });
          } finally {
            if (browser) await browser.close().catch(() => {});
            evidence.raw_market_data_retained = false;
            evidence.response_bodies_retained = false;
            evidence.gate_verdict = 'UNRESOLVED_CONFIRM_CONTRACT_ONLY';
            fs.writeFileSync(outputPath, JSON.stringify(evidence, null, 2) + '\n');
          }
          NODE

          cd build/okx-historical-confirm-contract/runtime
          node probe.mjs
          cd "$GITHUB_WORKSPACE"

      - name: Verify the Confirm request never left the browser
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = json.loads(
              Path('build/okx-historical-confirm-contract/output/evidence.json')
              .read_text(encoding='utf-8')
          )
          if evidence['confirm_request_transmitted'] is not False:
              raise SystemExit('Confirm request was transmitted')
          if evidence['export_job_created'] is not False:
              raise SystemExit('An export job was created')
          if evidence['raw_market_data_retained'] is not False:
              raise SystemExit('Raw market data was retained')
          if evidence['response_bodies_retained'] is not False:
              raise SystemExit('Response bodies were retained')
          if evidence['gate_verdict'] != 'UNRESOLVED_CONFIRM_CONTRACT_ONLY':
              raise SystemExit('Probe self-promoted to a gate verdict')
          print(json.dumps({
              'symbol_selection': evidence['symbol_selection'],
              'form_state_before_confirm': evidence['form_state_before_confirm'],
              'intercepted_confirm_requests': evidence['intercepted_confirm_requests'],
              'errors': evidence['errors'],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload intercepted request-contract evidence
        uses: actions/upload-artifact@v7
        with:
          name: okx-historical-confirm-contract-${{ github.sha }}
          path: build/okx-historical-confirm-contract/output/evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Record non-promotional summary
        run: |
          {
            echo "## OKX historical Confirm request contract probe"
            echo
            echo "- Symbol selected: BTC-USDT-SWAP"
            echo "- Confirm request transmitted: no"
            echo "- Export job created: no"
            echo "- Response bodies or market data retained: no"
            echo "- Gate verdict: unresolved request contract only"
          } >> "$GITHUB_STEP_SUMMARY"
