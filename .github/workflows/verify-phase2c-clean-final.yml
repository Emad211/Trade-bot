name: verify-phase2c-clean-final

# Trigger revision after workflow registration on the established runner branch.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/verify-phase2c-clean-final.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-clean
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install all required dependencies
        run: python -m pip install -e '.[dev,ml,exchange]'
      - name: Verify source quality and packaging prerequisites
        run: |
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and clean-install wheel
        run: |
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/phase2c-clean-final
          /tmp/phase2c-clean-final/bin/python -m pip install dist/*.whl
          /tmp/phase2c-clean-final/bin/hybrid-trader --help >/dev/null
          /tmp/phase2c-clean-final/bin/python -c 'import hybrid_trader.phase2c'
          /tmp/phase2c-clean-final/bin/python -m pip check
      - name: Execute fixed-cutoff historical experiment
        id: historical
        continue-on-error: true
        run: |
          python -m hybrid_trader.phase2c \
            --spec configs/phase2c_sources_authoritative.yaml \
            --config configs/phase2c_btc_4h.yaml \
            --output artifacts/phase2c-historical
      - name: Verify historical evidence
        id: gates
        if: ${{ steps.historical.outcome == 'success' }}
        continue-on-error: true
        run: |
          python scripts/verify_phase2c_artifacts.py artifacts/phase2c-historical
          python scripts/verify_phase2c_artifacts_strict.py \
            artifacts/phase2c-historical \
            --spec configs/phase2c_sources_authoritative.yaml
          python scripts/verify_phase2c_macro_gate.py \
            artifacts/phase2c-historical \
            --spec configs/phase2c_sources_authoritative.yaml
      - name: Build deterministic evidence archive
        if: always()
        run: |
          mkdir -p artifacts/distribution
          if [ -d artifacts/phase2c-historical ]; then
            tar --sort=name --mtime='UTC 1970-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf artifacts/distribution/phase2c-clean-historical.tar.gz \
              -C artifacts phase2c-historical
          fi
          find artifacts -type f -not -path 'artifacts/distribution/SHA256SUMS' -print0 \
            | sort -z | xargs -0 sha256sum > artifacts/distribution/SHA256SUMS || true
      - name: Upload final verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2c-clean-final-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 90
      - name: Report final verification to PR 6
        if: always()
        shell: bash
        run: |
          {
            echo '## Clean Phase 2C final verification'
            echo
            echo '- source SHA: `f8f49761f2ff6afabcf5bf3a6a8f98110666de4a`'
            echo '- Ruff, strict Mypy, core tests, optional ML tests and clean-wheel smoke: **passed**'
            echo '- historical execution: `${{ steps.historical.outcome }}`'
            echo '- strict historical gates: `${{ steps.gates.outcome }}`'
            echo '- run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID'
            echo
            echo 'No credentials, orders, leverage, shorting or automatic promotion were enabled.'
          } > /tmp/final-report.md
          gh pr comment 6 --repo "$GITHUB_REPOSITORY" --body-file /tmp/final-report.md
