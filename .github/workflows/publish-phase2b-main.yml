name: publish-phase2b-main

on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/publish-phase2b-main.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Rebuild Phase 2B tree on current main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/phase-2-point-in-time-benchmarks
          git switch -C agent/phase-2b-main origin/main
          git rm -r --ignore-unmatch .
          git checkout origin/agent/phase-2-point-in-time-benchmarks -- .
      - name: Validate reconstructed Phase 2B
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and clean-install wheel
        run: |
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/phase2b-main-wheel
          /tmp/phase2b-main-wheel/bin/python -m pip install dist/*.whl
          /tmp/phase2b-main-wheel/bin/hybrid-trader --help >/dev/null
          /tmp/phase2b-main-wheel/bin/python -c 'import hybrid_trader.models'
          /tmp/phase2b-main-wheel/bin/python -m pip check
      - name: Publish reconstructed branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo 'No Phase 2B changes relative to main.'
          else
            git commit -m "add point-in-time datasets and sealed hybrid-model benchmarks"
          fi
          git push --force-with-lease origin HEAD:agent/phase-2b-main
      - name: Report publication
        run: |
          gh pr comment 2 --repo "$GITHUB_REPOSITORY" --body \
            "Phase 2B was reconstructed on the squash-merged main branch, then passed Ruff, strict Mypy, core/optional-ML tests and clean-wheel smoke checks. Clean branch: \`agent/phase-2b-main\`. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
