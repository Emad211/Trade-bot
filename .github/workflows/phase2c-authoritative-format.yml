name: phase2c-authoritative-format

on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - "scripts/verify_phase2c_artifacts_strict.py"
      - "scripts/verify_phase2c_macro_gate.py"
      - "scripts/run_phase2c_foundation.py"
      - "scripts/verify_phase2c_foundation.py"
      - "src/hybrid_trader/forecasting/batched.py"
      - "tests/test_batched_forecasting.py"
      - ".github/workflows/phase2c-authoritative-format.yml"

permissions:
  contents: write

jobs:
  normalize-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Apply idempotent Phase 2C typing corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/hybrid_trader/phase2c.py")
          text = path.read_text(encoding="utf-8")
          replacements = {
              '"fold": int(fold),': '"fold": int(cast(int, fold)),',
              '''    missing = pd.DataFrame(
              sorted(missingness.items(), key=lambda item: item[1], reverse=True),
              columns=["column", "missing_ratio"],
          )
          ''': '''    missing = pd.DataFrame(
              list(missingness.items()),
              columns=["column", "missing_ratio"],
          ).sort_values("missing_ratio", ascending=False)
          ''',
              '''            manifest = write_tabular_artifact(
                  frame,
                  root / "sources" / "derivatives" / kind / _safe(venue.exchange_id),
          ''': '''            derivative_manifest = write_tabular_artifact(
                  frame,
                  root / "sources" / "derivatives" / kind / _safe(venue.exchange_id),
          ''',
              '''                    manifest,
                  spec.derivative_latency_seconds,
          ''': '''                    derivative_manifest,
                  spec.derivative_latency_seconds,
          ''',
              '''            manifest = write_snapshot(
                  frame,
                  root / "sources" / "spot" / _safe(venue.exchange_id),
          ''': '''            spot_manifest = write_snapshot(
                  frame,
                  root / "sources" / "spot" / _safe(venue.exchange_id),
          ''',
              '            spot_manifests[venue.exchange_id] = manifest': '            spot_manifests[venue.exchange_id] = spot_manifest',
              '            attempts.append(_attempt_spot(source_id, venue, spec, manifest, retrieved))': '            attempts.append(_attempt_spot(source_id, venue, spec, spot_manifest, retrieved))',
              '''            manifest = write_tabular_artifact(
                  result.frame,
                  root / "sources" / "fred" / _safe(item.series_id),
          ''': '''            macro_manifest = write_tabular_artifact(
                  result.frame,
                  root / "sources" / "fred" / _safe(item.series_id),
          ''',
              '''                    manifest,
                  item.source_latency_seconds,
          ''': '''                    macro_manifest,
                  item.source_latency_seconds,
          ''',
          }
          for before, after in replacements.items():
              text = text.replace(before, after)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Normalize all Python files
        run: ruff format .
      - name: Lint
        run: ruff check .
      - name: Strict type check
        run: mypy --python-version 3.12 src
      - name: Full tests
        run: pytest --cov=hybrid_trader --cov-report=term-missing
      - name: Commit normalized and typed sources
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Repository already matches the formatter and typing contract."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "normalize and type-check Phase 2C sources"
          git push origin HEAD:agent/phase-2c-real-data-benchmark
