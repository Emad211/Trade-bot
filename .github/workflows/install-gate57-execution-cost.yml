name: install-gate57-execution-cost

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/install-gate57-execution-cost.yml
      - .gate57-payload.b64.part00
      - .gate57-payload.b64.part01
      - .gate57-payload.b64.part02
      - .gate57-payload.b64.part03
      - .gate57-payload.b64.part04

permissions:
  contents: write

concurrency:
  group: install-gate57-execution-cost
  cancel-in-progress: false

jobs:
  install-verify-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install verification dependencies
        run: python -m pip install -e '.[dev,replication]'

      - name: Decode and install verified payload
        run: |
          set -euo pipefail
          cat .gate57-payload.b64.part* | tr -d '\n' | base64 -d > /tmp/gate57-payload.tar.gz
          echo 'f3804f1a97c1bca76dc85a9d2413aa05517eef455ad8d414e9a9e201a8d248cd  /tmp/gate57-payload.tar.gz' | sha256sum -c -
          tar -xzf /tmp/gate57-payload.tar.gz

      - name: Verify executable-price and cost semantics contract
        run: |
          set -euo pipefail
          files=(
            src/hybrid_trader/replication/okx_execution_cost_semantics.py
            scripts/validate_okx_execution_cost_semantics.py
            tests/test_okx_execution_cost_semantics.py
          )
          ruff format --check "${files[@]}"
          ruff check "${files[@]}"
          mypy \
            src/hybrid_trader/replication/okx_execution_cost_semantics.py \
            scripts/validate_okx_execution_cost_semantics.py
          pytest -q tests/test_okx_execution_cost_semantics.py
          python scripts/validate_okx_execution_cost_semantics.py \
            --output-dir build/okx-execution-cost-semantics

      - name: Independently verify safe synthetic evidence
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('build/okx-execution-cost-semantics')
          files = sorted(path.name for path in root.iterdir() if path.is_file())
          assert files == ['okx-execution-cost-semantics-safe-evidence.json'], files
          path = root / files[0]
          raw = path.read_bytes()
          evidence = json.loads(raw)

          assert len(raw) == 4269
          assert hashlib.sha256(raw).hexdigest() == '0a65fcf91393decbb1032840791af5c4dcc7c0228a0ece7105bffb529e86d930'
          assert evidence['gate_id'] == 'OKX_EXECUTABLE_PRICE_AND_COST_SEMANTICS_CONTRACT_V1'
          assert evidence['issue_number'] == 57
          assert evidence['validation_mode'] == 'SYNTHETIC_EXECUTION_RESPONSES_ONLY'
          assert evidence['real_order_request_performed'] is False
          assert evidence['real_private_endpoint_called'] is False
          assert evidence['owner_fee_snapshot_status'] == 'BLOCKED_OWNER_READ_ONLY_CREDENTIALS'
          assert evidence['real_execution_inputs_status'] == 'NOT_ADMITTED'
          assert evidence['price_identity_rules']['buy_executable_quote'] == 'BEST_ASK'
          assert evidence['price_identity_rules']['sell_executable_quote'] == 'BEST_BID'
          assert evidence['order_contract']['acknowledgement_is_execution'] is False
          assert evidence['order_contract']['cancel_ack_is_final_cancellation'] is False
          assert evidence['timing_contract']['fill_matching_field'] == 'fillTime'
          assert evidence['provider_cache_contract']['request_order_rewritten'] is False
          assert all(value is True for value in evidence['synthetic_rejections'].values())
          assert all(value is False for value in evidence['authorizations'].values())
          assert evidence['economic_edge_verdict'] == 'INCONCLUSIVE'

          text = raw.decode('utf-8')
          forbidden = (
              'API_KEY', 'SECRET_KEY', 'PASSPHRASE',
              'synthetic-order', 'synthetic-fill', 'synthetic-trade',
              '100.666', '99.0', '101.0',
          )
          assert not any(value in text for value in forbidden)
          PY

      - name: Retire installer and publish verified contract code
        run: |
          set -euo pipefail
          rm -rf build/okx-execution-cost-semantics
          rm .github/workflows/okx-execution-cost-semantics-contract.yml
          rm .github/workflows/install-gate57-execution-cost.yml
          rm .gate57-payload.b64.part00 \
             .gate57-payload.b64.part01 \
             .gate57-payload.b64.part02 \
             .gate57-payload.b64.part03 \
             .gate57-payload.b64.part04
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short
          git commit -m 'Add OKX execution-cost semantics contract'
          git push origin HEAD:agent/edge-research-reports
