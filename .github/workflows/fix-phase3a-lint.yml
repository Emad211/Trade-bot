name: fix-phase3a-lint

# Trigger revision after workflow registration.
on:
  push:
    branches: ["agent/phase-3a-robustness-gate"]
    paths:
      - ".github/workflows/fix-phase3a-lint.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3a-robustness-gate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install canonical Ruff version range
        run: python -m pip install 'ruff>=0.8,<1'
      - name: Apply safe lint fixes and formatting
        shell: bash
        run: |
          set -euo pipefail
          files=(
            src/hybrid_trader/robustness_policy.py
            src/hybrid_trader/sharpe_robustness.py
            src/hybrid_trader/bootstrap_robustness.py
            src/hybrid_trader/regime_robustness.py
            src/hybrid_trader/candidate_robustness.py
            scripts/assess_phase3a_robustness.py
            tests/test_sharpe_robustness.py
            tests/test_bootstrap_robustness.py
            tests/test_candidate_robustness.py
          )
          ruff check --fix "${files[@]}" || true
          ruff format "${files[@]}"
      - name: Commit safe fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/hybrid_trader/robustness_policy.py \
            src/hybrid_trader/sharpe_robustness.py \
            src/hybrid_trader/bootstrap_robustness.py \
            src/hybrid_trader/regime_robustness.py \
            src/hybrid_trader/candidate_robustness.py \
            scripts/assess_phase3a_robustness.py \
            tests/test_sharpe_robustness.py \
            tests/test_bootstrap_robustness.py \
            tests/test_candidate_robustness.py
          if git diff --cached --quiet; then
            echo 'No safe lint fixes were required.'
          else
            git commit -m 'apply safe Ruff fixes to Phase 3A gate'
            git push origin HEAD:agent/phase-3a-robustness-gate
          fi
      - name: Report remaining lint findings
        shell: bash
        run: |
          files=(
            src/hybrid_trader/robustness_policy.py
            src/hybrid_trader/sharpe_robustness.py
            src/hybrid_trader/bootstrap_robustness.py
            src/hybrid_trader/regime_robustness.py
            src/hybrid_trader/candidate_robustness.py
            scripts/assess_phase3a_robustness.py
            tests/test_sharpe_robustness.py
            tests/test_bootstrap_robustness.py
            tests/test_candidate_robustness.py
          )
          ruff check "${files[@]}"
