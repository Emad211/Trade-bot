name: list-foundation-timing-runs

# Trigger revision after workflow registration.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/list-foundation-timing-runs.yml"

permissions:
  actions: read
  contents: write

jobs:
  list:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - name: List recent materializer runs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-2c-real-data-benchmark&per_page=100" \
            --jq '[.workflow_runs[] | select(.name == "materialize-foundation-timing-fix") | {id,status,conclusion,head_sha,display_title,created_at,updated_at,html_url}]' \
            > .status/foundation-timing-runs.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/foundation-timing-runs.json
          git commit -m "list foundation timing runs" || true
          git push origin HEAD:agent/phase-2c-real-data-benchmark
