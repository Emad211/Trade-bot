name: materialize-phase2c

on:
  push:
    branches: ["agent/phase-2c-real-data"]
    paths:
      - ".phase2c-payload.part*"
      - ".github/workflows/materialize-phase2c.yml"
  pull_request:
    branches: ["agent/phase-2-point-in-time-benchmarks"]
    types: [opened, synchronize, reopened]
    paths:
      - ".phase2c-payload.part*"
      - ".github/workflows/materialize-phase2c.yml"

permissions:
  contents: write

concurrency:
  group: materialize-phase2c-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Verify payload parts and extract allow-listed source
        shell: bash
        run: |
          set -euo pipefail
          expected_parts=6
          actual_parts="$(find . -maxdepth 1 -type f -name '.phase2c-payload.part*' | wc -l)"
          test "${actual_parts}" -eq "${expected_parts}"
          echo "cb343a771f7973387965e7a53481986043511786b2780b086dcae1f6509d642d  .phase2c-payload.part00" | sha256sum --check -
          echo "a3575d33a8e9b1d667bc49fe279aeafabef9ef175a195a0d25be1f068c15f9f2  .phase2c-payload.part01" | sha256sum --check -
          echo "af17e4ef306c144c6aa929474701b2f2e6dbc0e2274f1240a6760dc0576aad10  .phase2c-payload.part02" | sha256sum --check -
          echo "f58095ed05791bec40046291401d95e1eb915a927cf8feded4fe52b22d49e7f9  .phase2c-payload.part03" | sha256sum --check -
          echo "5223d1141eb5be093cc13c8d2b9d71de480755c058fbb479af4dcf9cd496d12d  .phase2c-payload.part04" | sha256sum --check -
          echo "908bcef0e02adc8835926f6a1607bd254569bd35346b490874c5de8e29fa10e7  .phase2c-payload.part05" | sha256sum --check -
          cat .phase2c-payload.part00 .phase2c-payload.part01 \
              .phase2c-payload.part02 .phase2c-payload.part03 \
              .phase2c-payload.part04 .phase2c-payload.part05 \
            | base64 --decode > /tmp/phase2c-payload.tar.gz
          echo "961d7ff6c4d9a23bfb990887a23675384669815558800cef1aefc24204e30f54  /tmp/phase2c-payload.tar.gz" | sha256sum --check -
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import tarfile

          expected = {
              "Makefile",
              "README.md",
              ".github/workflows/phase2c-real-data.yml",
              "configs/btc_spot_4h_phase2c_smoke.yaml",
              "configs/phase2c_btc_4h.yaml",
              "docs/phase-2c-execution.md",
              "src/hybrid_trader/cli.py",
              "src/hybrid_trader/audit.py",
              "src/hybrid_trader/phase2c.py",
              "src/hybrid_trader/registry.py",
              "src/hybrid_trader/reporting.py",
              "tests/test_cli.py",
              "tests/test_audit.py",
              "tests/test_phase2c.py",
              "tests/test_registry.py",
              "tests/test_reporting.py",
          }
          archive = Path("/tmp/phase2c-payload.tar.gz")
          with tarfile.open(archive, "r:gz") as handle:
              members = handle.getmembers()
              names = {member.name for member in members}
              if names != expected:
                  raise SystemExit(f"payload member mismatch: {sorted(names ^ expected)}")
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"unsafe archive path: {member.name}")
                  if not member.isfile() or member.issym() or member.islnk():
                      raise SystemExit(f"unsupported archive member: {member.name}")
              handle.extractall(Path.cwd(), filter="data")
          PY
      - name: Commit non-workflow Phase 2C source tree
        shell: bash
        run: |
          set -euo pipefail
          target_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test -f .github/workflows/phase2c-real-data.yml
          sha256sum .github/workflows/phase2c-real-data.yml
          rm .github/workflows/phase2c-real-data.yml
          rm .phase2c-payload.part*
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "materialize phase 2c public-data research gate"
          git push origin "HEAD:${target_branch}"
