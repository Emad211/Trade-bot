name: Fix Moreira Muir Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-moreira-muir-lint.yml

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out research branch
        uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Apply exact non-semantic substitutions
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path('src/hybrid_trader/replication/moreira_muir.py')
          text = module.read_text(encoding='utf-8')
          if text.count('Moreira–Muir') != 2:
              raise SystemExit('Unexpected EN DASH occurrence count')
          module.write_text(text.replace('Moreira–Muir', 'Moreira-Muir'), encoding='utf-8')

          test = Path('tests/test_moreira_muir.py')
          text = test.read_text(encoding='utf-8')
          old = 'match="duplicate months|monthly date gap"'
          new = 'match=r"duplicate months|monthly date gap"'
          if text.count(old) != 1:
              raise SystemExit('Unexpected regex occurrence count')
          test.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Install project and verification tools
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e ".[dev,replication]"

      - name: Verify exact files
        run: |
          python -m ruff check \
            src/hybrid_trader/replication/moreira_muir.py \
            scripts/audit_moreira_muir_official_factors.py \
            tests/test_moreira_muir.py
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/moreira_muir.py
          python -m pytest -q tests/test_moreira_muir.py

      - name: Commit source and test fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/hybrid_trader/replication/moreira_muir.py \
            tests/test_moreira_muir.py
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "Fix Moreira Muir lint diagnostics"
          git push origin HEAD:agent/edge-research-reports
