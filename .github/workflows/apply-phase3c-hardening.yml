name: apply-phase3c-hardening

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".bootstrap/phase3c-hardening/**"
      - ".github/workflows/apply-phase3c-hardening.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Preserve and verify the transparent patch
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/phase3c-hardening/patch-00.diff \
              .bootstrap/phase3c-hardening/patch-01.diff \
              .bootstrap/phase3c-hardening/patch-02.diff \
              > /tmp/phase3c-hardening.patch
          echo "03dc7f46451ccb21c6af03548dd32029f724a32d7f65e01674285ecb23de7dcb  /tmp/phase3c-hardening.patch" \
            | sha256sum -c -
      - name: Apply patch to the clean AvalAI branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/phase-3c-avalai-clean
          git switch -C agent/phase-3c-avalai-clean origin/agent/phase-3c-avalai-clean
          git apply --check /tmp/phase3c-hardening.patch
          git apply /tmp/phase3c-hardening.patch
      - name: Validate hardened provider
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -q tests/test_avalai_provider.py tests/test_phase3c_avalai_capture.py
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and clean-install the wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/phase3c-hardening-wheel
          /tmp/phase3c-hardening-wheel/bin/python -m pip install dist/*.whl
          /tmp/phase3c-hardening-wheel/bin/python -c 'from hybrid_trader.avalai import AvalAISettings; assert AvalAISettings().model == "gpt-5-mini-2025-08-07"'
          /tmp/phase3c-hardening-wheel/bin/python -m pip check
      - name: Publish only the five reviewed files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/hybrid_trader/avalai.py \
            configs/phase3c_avalai_event_sources.yaml \
            docs/phase-3c-avalai-provider.md \
            tests/test_avalai_provider.py \
            tests/test_phase3c_avalai_capture.py
          git commit -m "pin and harden AvalAI semantic extraction"
          git push origin HEAD:agent/phase-3c-avalai-clean
