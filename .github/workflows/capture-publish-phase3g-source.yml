name: capture-publish-phase3g-source

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-publish-phase3g-source.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture Phase 3G source publisher status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase3c-hardening-runner&per_page=100" --jq '[.workflow_runs[] | select(.name == "publish-phase3g-source")][0]')
          run_id=$(jq -r .id <<<"$run")
          jobs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")
          jq -n --argjson run "$run" --argjson jobs "$jobs" '{run:$run,jobs:$jobs.jobs}' > .status/publish-phase3g-source.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/publish-phase3g-source.json
          git commit -m "capture Phase 3G source publisher status" || true
          git push origin HEAD:agent/phase3c-hardening-runner
