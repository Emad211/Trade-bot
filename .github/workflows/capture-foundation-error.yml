name: capture-foundation-error

# Generation 5: inspect foundation rerun after forecast-origin timing fix.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/capture-foundation-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - name: Capture complete foundation log
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29410149756 --repo "$GITHUB_REPOSITORY" --log > /tmp/foundation-full.log
          {
            echo '=== traceback and errors ==='
            grep -nE 'Traceback|Error|Exception|RuntimeError|ValueError|TypeError|AttributeError|ImportError|ModuleNotFoundError|Killed|No space|out of memory|OOM|exit code' /tmp/foundation-full.log || true
            echo
            echo '=== matrix section tail ==='
            awk '/Execute pinned challenger matrix/{capture=1} /Verify foundation evidence/{capture=0} capture' /tmp/foundation-full.log | tail -n 320
          } > .status/foundation-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/foundation-error.txt
          git commit -m "capture foundation rerun failure" || true
          git push origin HEAD:agent/phase-2c-real-data-benchmark
