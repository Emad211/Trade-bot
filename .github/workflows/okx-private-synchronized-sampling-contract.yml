name: OKX Private Synchronized Sampling Contract

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/okx-private-synchronized-sampling-contract.yml
      - src/hybrid_trader/replication/okx_private_sampling.py
      - src/hybrid_trader/replication/revocable_retention.py
      - scripts/validate_okx_private_sampling_contract.py
      - tests/test_okx_private_sampling.py
      - tests/test_revocable_retention.py
      - docs/research/edge-discovery/02-replication/02-03-okx-private-synchronized-sampling-contract-gate.yaml
  push:
    branches: [agent/edge-research-reports]
    paths:
      - .github/workflows/okx-private-synchronized-sampling-contract.yml
      - src/hybrid_trader/replication/okx_private_sampling.py
      - src/hybrid_trader/replication/revocable_retention.py
      - scripts/validate_okx_private_sampling_contract.py
      - tests/test_okx_private_sampling.py
      - tests/test_revocable_retention.py
      - docs/research/edge-discovery/02-replication/02-03-okx-private-synchronized-sampling-contract-gate.yaml

permissions:
  contents: read

concurrency:
  group: okx-private-synchronized-sampling-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-synthetic-contract-only:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install verification dependencies
        run: python -m pip install -e '.[dev,replication]'

      - name: Verify implementation and lifecycle tests
        run: |
          ruff format --check \
            src/hybrid_trader/replication/okx_private_sampling.py \
            scripts/validate_okx_private_sampling_contract.py \
            tests/test_okx_private_sampling.py
          ruff check \
            src/hybrid_trader/replication/okx_private_sampling.py \
            scripts/validate_okx_private_sampling_contract.py \
            tests/test_okx_private_sampling.py
          mypy \
            src/hybrid_trader/replication/okx_private_sampling.py \
            scripts/validate_okx_private_sampling_contract.py
          pytest -q \
            tests/test_okx_private_sampling.py \
            tests/test_revocable_retention.py

      - name: Run synthetic private sampling lifecycle
        run: |
          python scripts/validate_okx_private_sampling_contract.py \
            --output-dir build/okx-private-sampling-contract

      - name: Independently verify safe evidence and zero real execution
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('build/okx-private-sampling-contract')
          files = sorted(path.name for path in root.iterdir() if path.is_file())
          assert files == ['okx-private-sampling-contract-evidence.json'], files
          path = root / files[0]
          text = path.read_text(encoding='utf-8')
          evidence = json.loads(text)

          assert evidence['schema_version'] == '1.0'
          assert evidence['validation_id'] == 'OKX_PRIVATE_SYNCHRONIZED_SAMPLING_CONTRACT_V1'
          assert evidence['execution_mode'] == 'SYNTHETIC_VALIDATION'
          assert evidence['real_okx_request_performed'] is False
          assert evidence['real_raw_sampling_executed'] is False
          assert evidence['private_owner_storage_available_in_actions'] is False
          assert evidence['synthetic_raw_values_published'] is False
          assert evidence['contract_outcome'] == 'GO_OWNER_CONTROLLED_PRIVATE_OKX_SAMPLING_CONTRACT'
          assert evidence['real_execution_status'] == (
              'NOT_EXECUTED_REQUIRES_OWNER_PRIVATE_STORAGE_AND_KEYS'
          )

          manifest = evidence['manifest']
          assert manifest['contract_id'] == 'OKX_PRIVATE_SYNCHRONIZED_PRICE_SAMPLING_V1'
          assert manifest['execution_mode'] == 'SYNTHETIC_VALIDATION'
          assert manifest['synthetic_validation_only'] is True
          assert manifest['real_raw_sampling_executed'] is False
          assert manifest['source_count'] == 4
          assert manifest['source_order'] == [
              'OKX_SPOT_BTC_USDT_TICKER',
              'OKX_SWAP_BTC_USDT_SWAP_TICKER',
              'OKX_SWAP_BTC_USDT_SWAP_MARK_PRICE',
              'OKX_BTC_USDT_INDEX_TICKER',
          ]
          assert manifest['requested_retention_days'] == 2
          assert manifest['public_manifest_contains_market_values'] is False
          assert manifest['public_raw_artifact_authorized'] is False
          assert manifest['redistribution_authorized'] is False
          assert manifest['basis_computation_authorized'] is False
          assert manifest['funding_pnl_computation_authorized'] is False
          assert manifest['returns_computation_authorized'] is False
          assert manifest['transaction_cost_estimation_authorized'] is False
          assert manifest['empirical_fitting_authorized'] is False
          assert manifest['paper_or_live_trading_authorized'] is False
          assert manifest['report_2_4_authorized'] is False
          assert len(manifest['sources']) == 4
          assert len({source['artifact_id'] for source in manifest['sources']}) == 4
          for source in manifest['sources']:
              assert source['artifact_id'].startswith('sha256-')
              assert len(source['raw_sha256']) == 64
              assert source['byte_count'] > 0
              assert source['raw_values_publicly_retained'] is False

          assert evidence['active_compliance'] == {
              'active_artifact_count': 4,
              'compliant': True,
          }
          deletion = evidence['deletion']
          assert deletion['source_count'] == 4
          assert deletion['all_raw_deleted'] is True
          assert deletion['all_leases_deleted'] is True
          assert deletion['secure_erase_claimed'] is False
          assert all(source['integrity_matched_before_delete'] for source in deletion['sources'])
          assert all(source['raw_exists_after_delete'] is False for source in deletion['sources'])
          assert all(source['lease_exists_after_delete'] is False for source in deletion['sources'])
          assert evidence['post_delete_compliance'] == {
              'active_artifact_count': 0,
              'compliant': True,
          }
          assert all(value is False for value in evidence['authorization'].values())

          forbidden = (
              'SYNTHETIC_DO_NOT_PUBLISH',
              'synthetic_private_value',
              '99999.99',
          )
          assert all(marker not in text for marker in forbidden)
          assert not list(root.glob('*.bin'))
          assert not list(root.glob('*.csv'))
          assert not list(root.glob('*.zip'))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: okx-private-sampling-contract-safe-evidence-${{ github.sha }}
          path: build/okx-private-sampling-contract/okx-private-sampling-contract-evidence.json
          if-no-files-found: error
          retention-days: 90
