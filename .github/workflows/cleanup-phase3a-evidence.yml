name: cleanup-phase3a-evidence

# One-time cleanup after the final provenance run was committed.
on:
  push:
    branches: ["agent/phase-3a-robustness-gate"]
    paths:
      - ".github/workflows/cleanup-phase3a-evidence.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3a-robustness-gate
      - name: Retain only final Phase 3A evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            research/runs/phase3a-robustness-29485993354 \
            research/runs/phase3a-robustness-29486555686 \
            research/runs/phase3a-robustness-29486957608 \
            research/runs/phase3a-robustness-29487328088
          test -f research/runs/phase3a-robustness-29488655448/robustness_assessment.json
          test ! -s research/runs/phase3a-robustness-29488655448/prospective_decisions.jsonl
      - name: Commit evidence cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A research/runs
          git commit -m 'retain only final Phase 3A robustness evidence'
          git push origin HEAD:agent/phase-3a-robustness-gate
