name: capture-pr10-format-error

on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/capture-pr10-format-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - name: Capture formatter diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29411016319 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/pr10.log
          grep -nE 'Would reformat|would be reformatted|reformatted|format' /tmp/pr10.log \
            > .status/pr10-format-error.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/pr10-format-error.txt
          git commit -m "capture PR 10 formatter diagnostics" || true
          git push origin HEAD:agent/phase-2c-real-data-benchmark
