name: capture-pr10-format-error

# Generation 2: capture post-format validation failure.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/capture-pr10-format-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - name: Capture post-format validation failure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29411775940 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/pr10.log
          {
            echo '=== errors ==='
            grep -nE 'error:|Error|Traceback|FAILED|failed|would be reformatted|Found [0-9]+ error|mypy|pytest' /tmp/pr10.log || true
            echo
            echo '=== final 220 lines ==='
            tail -n 220 /tmp/pr10.log
          } > .status/pr10-format-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/pr10-format-error.txt
          git commit -m "capture PR 10 post-format failure" || true
          git push origin HEAD:agent/phase-2c-real-data-benchmark
