name: format-phase3a

on:
  push:
    branches: ["agent/phase-3a-robustness-gate"]
    paths:
      - ".github/workflows/format-phase3a.yml"
      - "src/hybrid_trader/*robustness.py"
      - "scripts/assess_phase3a_robustness.py"
      - "tests/test_*robustness.py"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3a-robustness-gate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install formatter
        run: python -m pip install 'ruff>=0.8,<1'
      - name: Apply canonical formatting
        run: ruff format .
      - name: Verify lint after formatting
        run: ruff check .
      - name: Commit formatting changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo 'No formatting changes required.'
          else
            git commit -m 'format Phase 3A robustness gate'
            git push origin HEAD:agent/phase-3a-robustness-gate
          fi
