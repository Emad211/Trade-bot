name: bootstrap-phase2

on:
  push:
    branches: ["agent/phase-2-point-in-time-benchmarks"]
  pull_request:
    branches: ["agent/phase-1-foundation"]

permissions:
  contents: write

jobs:
  materialize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/phase-2-point-in-time-benchmarks
      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .phase2-bootstrap/part-* | tr -d '\n' | base64 -d > /tmp/phase2b-source.tar.gz
          echo "2f34835d0b9dc91651c7c28200bf777f128209da01a86f4941a1b147d5649135  /tmp/phase2b-source.tar.gz" | sha256sum -c -
      - name: Materialize source tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .phase2-bootstrap ! -name .github -exec rm -rf {} +
          tar -xzf /tmp/phase2b-source.tar.gz -C .
          rm -rf .phase2-bootstrap
          # Workflow-file writes are published separately by the connected GitHub App.
          rm -f .github/workflows/bootstrap-phase2.yml .github/workflows/ci.yml
      - name: Commit materialized Phase 2B source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "implement point-in-time benchmark and public data foundation"
          git push origin HEAD:agent/phase-2-point-in-time-benchmarks
