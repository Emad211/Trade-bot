name: Bootstrap Databento Probe Files

on:
  workflow_dispatch:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/bootstrap-databento-probe-files.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out research branch
        uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - name: Decode verified source bundle
        shell: bash
        run: |
          cat > /tmp/databento-probe-bundle.tar.gz.b64 <<'B64'

B64
          base64 -d /tmp/databento-probe-bundle.tar.gz.b64 > /tmp/databento-probe-bundle.tar.gz
          echo "c4e5cb7ccb26e44292b77813c9f6dfa6b95289c6f626cc62c2113747cfdaebad  /tmp/databento-probe-bundle.tar.gz" | sha256sum -c -
          tar -xzf /tmp/databento-probe-bundle.tar.gz -C .

      - name: Verify generated files
        run: |
          python -m py_compile src/hybrid_trader/replication/databento_metadata_probe.py
          test -s scripts/run_databento_zero_purchase_probe.py
          test -s tests/test_databento_metadata_probe.py
          test -s .github/workflows/databento-zero-purchase-metadata-probe.yml

      - name: Commit generated source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/hybrid_trader/replication/databento_metadata_probe.py \
            scripts/run_databento_zero_purchase_probe.py \
            tests/test_databento_metadata_probe.py \
            .github/workflows/databento-zero-purchase-metadata-probe.yml
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "Add authenticated zero-purchase Databento metadata probe"
          git push origin HEAD:agent/edge-research-reports
