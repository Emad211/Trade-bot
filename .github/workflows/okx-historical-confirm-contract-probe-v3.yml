name: OKX Historical Confirm Contract Probe V3

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/okx-historical-confirm-contract-probe-v3.yml

permissions:
  contents: read

jobs:
  intercept-confirm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install isolated browser runtime
        run: |
          mkdir -p build/okx-confirm-v3/runtime build/okx-confirm-v3/output
          cd build/okx-confirm-v3/runtime
          npm init -y >/dev/null
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Intercept the funding export contract before transmission
        shell: bash
        run: |
          cat > build/okx-confirm-v3/runtime/probe.mjs <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import path from 'node:path';
          import { chromium } from 'playwright';

          const root = process.env.GITHUB_WORKSPACE;
          if (!root) throw new Error('GITHUB_WORKSPACE unavailable');
          const output = path.join(root, 'build/okx-confirm-v3/output/evidence.json');
          const evidence = {
            schema_version: '3.0',
            purpose: 'OKX_FUNDING_EXPORT_CONFIRM_REQUEST_CONTRACT_ONLY',
            landing_url: 'https://www.okx.com/en-gb/historical-data',
            instrument_type: 'Perpetual',
            requested_family: 'BTC-USDT',
            modal_opened: false,
            option_selected: false,
            selected_option_text: '',
            form_state: {},
            intercepted_requests: [],
            errors: [],
            confirm_clicked: false,
            request_transmitted: false,
            export_job_created: false,
            raw_market_data_retained: false,
            response_bodies_retained: false,
            gate_verdict: 'UNRESOLVED_REQUEST_CONTRACT_ONLY'
          };
          const digest = value => crypto.createHash('sha256').update(value).digest('hex');
          const cleanse = value => {
            if (Array.isArray(value)) return value.map(cleanse);
            if (value && typeof value === 'object') {
              return Object.fromEntries(Object.entries(value).map(([key, item]) => [
                key,
                /token|signature|secret|password|cookie|authorization/i.test(key)
                  ? '[REDACTED]'
                  : cleanse(item)
              ]));
            }
            return value;
          };
          const safePost = raw => {
            if (!raw) return { kind: 'empty' };
            try { return { kind: 'json', value: cleanse(JSON.parse(raw)) }; }
            catch { return { kind: 'opaque', byte_count: Buffer.byteLength(raw), sha256: digest(raw) }; }
          };
          const safeUrl = raw => {
            const url = new URL(raw);
            for (const key of [...url.searchParams.keys()]) {
              const value = url.searchParams.get(key) || '';
              if (/^(t|timestamp|token|signature|sig|key|expires?)$/i.test(key)) {
                url.searchParams.set(key, value ? `sha256:${digest(value).slice(0, 16)}` : '');
              }
            }
            url.hash = '';
            return url.toString();
          };

          let browser;
          let armed = false;
          try {
            browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              acceptDownloads: false,
              locale: 'en-GB',
              timezoneId: 'UTC'
            });
            const page = await context.newPage();
            page.on('download', async download => {
              evidence.errors.push({ stage: 'unexpected_download', name: download.suggestedFilename() });
              await download.cancel().catch(() => {});
            });
            await page.route('**/*', async route => {
              const request = route.request();
              const url = request.url();
              let host = '';
              try { host = new URL(url).hostname.toLowerCase(); } catch {}
              if (host && host !== 'okx.com' && host !== 'www.okx.com' && !host.endsWith('.okx.com')) {
                await route.abort('blockedbyclient');
                return;
              }
              if (/\.(zip|csv|gz|parquet|tar|7z|bz2|xz)(?:$|[?#])/i.test(url)) {
                evidence.errors.push({ stage: 'market_file_request_blocked', url: safeUrl(url) });
                await route.abort('blockedbyclient');
                return;
              }
              if (armed && ['fetch', 'xhr'].includes(request.resourceType())) {
                const relevant = /broker\/public\/trade-data|download|export|historical/i.test(url);
                if (relevant) {
                  evidence.intercepted_requests.push({
                    method: request.method(),
                    resource_type: request.resourceType(),
                    url: safeUrl(url),
                    post_data: safePost(request.postData()),
                    content_type: request.headers()['content-type'] || ''
                  });
                  await route.abort('blockedbyclient');
                  return;
                }
              }
              await route.continue();
            });

            await page.goto(evidence.landing_url, { waitUntil: 'domcontentloaded', timeout: 90000 });
            await page.waitForTimeout(7000);
            evidence.modal_opened = await page.evaluate(() => {
              const norm = v => (v || '').replace(/\s+/g, ' ').trim();
              const heading = [...document.querySelectorAll('*')]
                .find(node => norm(node.textContent) === 'Funding rate');
              if (!heading) return false;
              let container = heading;
              for (let depth = 0; depth < 10 && container; depth += 1, container = container.parentElement) {
                const button = [...container.querySelectorAll('button,a,[role="button"]')]
                  .find(node => /download/i.test(norm(node.textContent) || node.getAttribute('aria-label') || ''));
                if (button) { button.click(); return true; }
              }
              return false;
            });
            if (!evidence.modal_opened) throw new Error('Funding dialog did not open');
            await page.waitForTimeout(5000);
            const dialog = page.getByRole('dialog');
            if (await dialog.count() !== 1) throw new Error('Funding dialog was not unique');

            const symbol = dialog.getByRole('combobox').nth(1);
            await symbol.click();
            await page.waitForTimeout(1200);
            const search = page.locator('input[type="text"]:visible:not([readonly])');
            if (await search.count()) await search.last().fill('BTC-USDT');
            else await page.keyboard.type('BTC-USDT');
            await page.waitForTimeout(1200);

            const selection = await page.evaluate(() => {
              const norm = v => (v || '').replace(/\s+/g, ' ').trim();
              const visible = node => {
                const rect = node.getBoundingClientRect();
                const style = getComputedStyle(node);
                return rect.width > 0 && rect.height > 0 && style.display !== 'none' && style.visibility !== 'hidden';
              };
              const candidates = [...document.querySelectorAll('[role="option"], [role="listbox"] *, [data-testid="okd-popup"] *')]
                .filter(visible)
                .map(node => ({ node, text: norm(node.textContent) }))
                .filter(item => item.text && item.text.length <= 100);
              const target = candidates.find(item => item.text === 'BTC-USDT') ||
                candidates.find(item => item.text === 'BTC-USDT-SWAP') ||
                candidates.find(item => /^BTC\s*[-/]\s*USDT(?:\s*[-/]\s*SWAP)?$/i.test(item.text));
              if (!target) return { selected: false, observed: candidates.filter(x => /BTC|USDT/i.test(x.text)).map(x => x.text).slice(0, 20) };
              target.node.click();
              return { selected: true, text: target.text };
            });
            evidence.option_selected = Boolean(selection.selected);
            evidence.selected_option_text = selection.text || '';
            if (!evidence.option_selected) throw new Error(`No BTC-USDT option: ${JSON.stringify(selection.observed)}`);
            await page.waitForTimeout(800);

            const confirm = dialog.getByRole('button', { name: 'Confirm', exact: true });
            evidence.form_state = {
              instrument_type: await dialog.locator('input[value="Perpetual"]').inputValue(),
              selected_symbol_text: (await symbol.innerText()).replace(/\s+/g, ' ').trim(),
              date_grouping: await dialog.locator('input[value="Daily"]').inputValue(),
              start_date: await dialog.locator('input[placeholder="Start date"]').inputValue(),
              end_date: await dialog.locator('input[placeholder="End date"]').inputValue(),
              confirm_disabled: await confirm.isDisabled()
            };
            if (evidence.form_state.confirm_disabled) throw new Error('Confirm remained disabled');
            armed = true;
            evidence.confirm_clicked = true;
            await confirm.click();
            await page.waitForTimeout(4000);
            armed = false;
          } catch (error) {
            evidence.errors.push({ stage: 'probe', message: String(error?.stack || error) });
          } finally {
            if (browser) await browser.close().catch(() => {});
            fs.writeFileSync(output, JSON.stringify(evidence, null, 2) + '\n');
          }
          NODE
          cd build/okx-confirm-v3/runtime
          node probe.mjs
      - name: Enforce a meaningful metadata-only result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('build/okx-confirm-v3/output/evidence.json')
          evidence = json.loads(path.read_text(encoding='utf-8'))
          assert evidence['modal_opened'] is True
          assert evidence['option_selected'] is True
          assert evidence['confirm_clicked'] is True
          assert evidence['intercepted_requests'], 'No Confirm request contract was intercepted'
          assert evidence['request_transmitted'] is False
          assert evidence['export_job_created'] is False
          assert evidence['raw_market_data_retained'] is False
          assert evidence['response_bodies_retained'] is False
          assert not evidence['errors'], evidence['errors']
          assert evidence['gate_verdict'] == 'UNRESOLVED_REQUEST_CONTRACT_ONLY'
          print(json.dumps({
              'selected_option_text': evidence['selected_option_text'],
              'form_state': evidence['form_state'],
              'intercepted_requests': evidence['intercepted_requests'],
          }, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: okx-historical-confirm-contract-v3-${{ github.sha }}
          path: build/okx-confirm-v3/output/evidence.json
          if-no-files-found: error
          retention-days: 30
