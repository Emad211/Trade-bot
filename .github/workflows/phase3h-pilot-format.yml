name: phase3h-pilot-format

on:
  push:
    branches: ["agent/phase-3h-source-diversity"]
    paths:
      - ".github/workflows/phase3h-pilot-format.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3h-source-diversity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Format and validate Phase 3H pilot
        run: |
          ruff format \
            scripts/assess_phase3h_pilot.py \
            src/hybrid_trader/event_capture.py \
            src/hybrid_trader/event_capture_models.py \
            src/hybrid_trader/event_selection.py \
            src/hybrid_trader/phase3h.py \
            tests/test_phase3h_pilot.py \
            tests/test_phase3h_relevance.py \
            tests/test_phase3h_selection.py
          ruff check --fix \
            scripts/assess_phase3h_pilot.py \
            src/hybrid_trader/event_capture.py \
            src/hybrid_trader/event_capture_models.py \
            src/hybrid_trader/event_selection.py \
            src/hybrid_trader/phase3h.py \
            tests/test_phase3h_pilot.py \
            tests/test_phase3h_relevance.py \
            tests/test_phase3h_selection.py
          mypy --python-version 3.12 src
          pytest \
            tests/test_phase3h_relevance.py \
            tests/test_phase3h_selection.py \
            tests/test_phase3h_pilot.py \
            -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time formatter and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/phase3h-pilot-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "format and validate Phase 3H diversity pilot"
          git push origin HEAD:agent/phase-3h-source-diversity
