name: export-source

on:
  push:
    branches: ["agent/phase-2-point-in-time-benchmarks"]

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source archive
        run: |
          tar --exclude=.git --exclude='*.pyc' --exclude='__pycache__' -czf hybrid-trader-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: hybrid-trader-source
          path: hybrid-trader-source.tar.gz
          retention-days: 1
