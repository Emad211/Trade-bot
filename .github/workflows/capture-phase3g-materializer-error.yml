name: capture-phase3g-materializer-error

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-phase3g-materializer-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture Phase 3G materializer error
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29640666563 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/phase3g-materializer.log
          {
            grep -nE 'Would reformat|error:|Error|FAILED|AssertionError|Traceback|Found [0-9]+ error|E       ' /tmp/phase3g-materializer.log || true
            echo '=== tail ==='
            tail -n 240 /tmp/phase3g-materializer.log
          } > .status/phase3g-materializer-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3g-materializer-error.txt
          git commit -m "capture Phase 3G overlap materializer failure" || true
          git push origin HEAD:agent/phase3c-hardening-runner
