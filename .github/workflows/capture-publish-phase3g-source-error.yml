name: capture-publish-phase3g-source-error

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-publish-phase3g-source-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture source publisher failure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29641423495 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/publish-phase3g-source.log
          {
            grep -nE 'fatal:|error:|Error|FAILED|rejected|denied|pathspec|nothing to commit|remote:' /tmp/publish-phase3g-source.log || true
            echo '=== tail ==='
            tail -n 180 /tmp/publish-phase3g-source.log
          } > .status/publish-phase3g-source-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/publish-phase3g-source-error.txt
          git commit -m "capture Phase 3G source publisher failure" || true
          git push origin HEAD:agent/phase3c-hardening-runner
