name: phase3b-autofix

on:
  push:
    branches: ["agent/phase-3b-prospective-events"]
    paths:
      - ".github/workflows/phase3b-autofix.yml"

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3b-prospective-events
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply reviewed type and test fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          feed = Path("src/hybrid_trader/feed_source.py")
          text = feed.read_text(encoding="utf-8")
          old = "        payload = response.read(maximum_bytes + 1)\n"
          new = "        payload = bytes(response.read(maximum_bytes + 1))\n"
          if text.count(old) != 1:
              raise RuntimeError("Unexpected feed payload-read anchor")
          feed.write_text(text.replace(old, new, 1), encoding="utf-8")

          capture = Path("src/hybrid_trader/event_capture.py")
          text = capture.read_text(encoding="utf-8")
          old = "    prompt_sha256: str\n\n    def extraction_key"
          new = "    @property\n    def prompt_sha256(self) -> str: ...\n\n    def extraction_key"
          if text.count(old) != 1:
              raise RuntimeError("Unexpected semantic extractor protocol anchor")
          capture.write_text(text.replace(old, new, 1), encoding="utf-8")

          test = Path("tests/test_phase3b_document_ledger.py")
          text = test.read_text(encoding="utf-8")
          old = 'match="Invalid event ledger|hash chain"'
          new = 'match=r"Invalid event ledger|hash chain"'
          if text.count(old) != 1:
              raise RuntimeError("Unexpected ledger regex anchor")
          test.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Apply canonical Ruff formatting
        run: |
          python -m pip install 'ruff>=0.8,<1'
          ruff check --fix .
          ruff format .
          ruff check .
          ruff format --check .
      - name: Commit reviewed fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts src tests
          git commit -m "format and type-check Phase 3B event pipeline"
          git push origin HEAD:agent/phase-3b-prospective-events
