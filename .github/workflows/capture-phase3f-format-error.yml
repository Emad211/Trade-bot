name: capture-phase3f-format-error

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-phase3f-format-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture failed Phase 3F formatter log
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29576795223 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/phase3f-format.log
          {
            grep -nE 'Would reformat|error:|Error|FAILED|AssertionError|Traceback|Found [0-9]+ error' /tmp/phase3f-format.log || true
            echo '=== tail ==='
            tail -n 220 /tmp/phase3f-format.log
          } > .status/phase3f-format-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3f-format-error.txt
          git commit -m "capture Phase 3F formatter failure" || true
          git push origin HEAD:agent/phase3c-hardening-runner
