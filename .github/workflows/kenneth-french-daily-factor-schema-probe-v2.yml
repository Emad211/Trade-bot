name: Kenneth French Daily Factor Schema Probe V2

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/kenneth-french-daily-factor-schema-probe-v2.yml
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/kenneth-french-daily-factor-schema-probe-v2.yml

permissions:
  contents: read

jobs:
  acquire-profile-and-stage-safe-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - name: Acquire official Dartmouth files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/kf-daily-v2/raw
          base='https://mba.tuck.dartmouth.edu/pages/faculty/ken.french'
          curl --fail-with-body --location --retry 8 --retry-all-errors \
            --connect-timeout 20 --max-time 180 \
            --output build/kf-daily-v2/raw/data_library.html \
            "$base/data_library.html"
          for name in \
            F-F_Research_Data_Factors_daily_CSV.zip \
            F-F_Research_Data_5_Factors_2x3_daily_CSV.zip \
            F-F_Momentum_Factor_daily_CSV.zip; do
            curl --fail-with-body --location --retry 8 --retry-all-errors \
              --connect-timeout 20 --max-time 180 \
              --output "build/kf-daily-v2/raw/$name" \
              "$base/ftp/$name"
          done

      - name: Validate and profile exact current snapshots
        run: |
          python - <<'PY'
          import csv
          import hashlib
          import io
          import json
          import math
          import re
          import zipfile
          from datetime import datetime
          from pathlib import Path, PurePosixPath

          root = Path('build/kf-daily-v2')
          raw_root = root / 'raw'
          contracts = {
              'ff3': {
                  'zip': 'F-F_Research_Data_Factors_daily_CSV.zip',
                  'expected': ['Mkt-RF', 'SMB', 'HML', 'RF'],
                  'roles': ['Mkt-RF', 'SMB', 'HML'],
                  'diagnostic_zip_sha256': 'af8aec07d55c98caa15045a77b87455be68cb8847b2ee5bd03bf5c2c8a3f96e2',
                  'diagnostic_member_sha256': 'f051e37d30c129359c6801d9d2a715c929b19aa3be0ffe684b93995ede9ffebb',
              },
              'ff5': {
                  'zip': 'F-F_Research_Data_5_Factors_2x3_daily_CSV.zip',
                  'expected': ['Mkt-RF', 'SMB', 'HML', 'RMW', 'CMA', 'RF'],
                  'roles': ['RMW', 'CMA'],
                  'diagnostic_zip_sha256': 'bcf32ecc9e2bb20383784ac98891e42146a0091eec6ec77d3b5bf0d4e981e3f6',
                  'diagnostic_member_sha256': '8b6cf2992ccdc6086fc11b594b74ca8095843622deaee0602196b8deab0287b1',
              },
              'mom': {
                  'zip': 'F-F_Momentum_Factor_daily_CSV.zip',
                  'expected': ['Mom'],
                  'roles': ['Mom'],
                  'diagnostic_zip_sha256': 'f4237e2e36dffa13fd7823f55376316a94b5ac663af951dd9eaca8ed2c678bcf',
                  'diagnostic_member_sha256': '3f396e1381861a65f7cd37c86483f163e17fb2516a2ad4d0f66a312d48a860b2',
              },
          }
          date_pattern = re.compile(r'^\d{8}$')

          def trim_trailing_empty(cells):
              normalized = [cell.strip() for cell in cells]
              while normalized and normalized[-1] == '':
                  normalized.pop()
              return normalized

          profiles = []
          for key, contract in contracts.items():
              zip_path = raw_root / contract['zip']
              zip_bytes = zip_path.read_bytes()
              zip_digest = hashlib.sha256(zip_bytes).hexdigest()
              if zip_digest != contract['diagnostic_zip_sha256']:
                  raise SystemExit(f'{key} ZIP changed after diagnostic: {zip_digest}')
              if not zipfile.is_zipfile(io.BytesIO(zip_bytes)):
                  raise SystemExit(f'Invalid ZIP: {contract["zip"]}')
              with zipfile.ZipFile(io.BytesIO(zip_bytes)) as archive:
                  members = [item for item in archive.infolist() if not item.is_dir()]
                  if len(members) != 1:
                      raise SystemExit(f'Expected one member for {key}')
                  member = members[0]
                  path = PurePosixPath(member.filename)
                  if path.is_absolute() or '..' in path.parts or len(path.parts) != 1:
                      raise SystemExit(f'Unsafe ZIP path: {member.filename}')
                  if member.flag_bits & 1:
                      raise SystemExit(f'Encrypted ZIP member: {member.filename}')
                  if member.file_size <= 0 or member.file_size > 100_000_000:
                      raise SystemExit(f'Unsafe member size: {member.filename}')
                  payload = archive.read(member)
                  if archive.testzip() is not None:
                      raise SystemExit(f'ZIP CRC failure: {contract["zip"]}')
              member_digest = hashlib.sha256(payload).hexdigest()
              if member_digest != contract['diagnostic_member_sha256']:
                  raise SystemExit(f'{key} member changed after diagnostic: {member_digest}')

              try:
                  text = payload.decode('utf-8-sig')
                  encoding = 'utf-8-sig'
              except UnicodeDecodeError:
                  text = payload.decode('latin-1')
                  encoding = 'latin-1'
              lines = text.splitlines()
              header_index = None
              header = None
              for index, line in enumerate(lines):
                  candidate = trim_trailing_empty(next(csv.reader([line])))
                  if candidate and candidate[0] in ('', 'Date') and candidate[1:] == contract['expected']:
                      header_index = index
                      header = candidate
                      break
              if header_index is None or header is None:
                  raise SystemExit(f'Expected normalized header not found for {key}')

              records = []
              footer = []
              started = False
              raw_trailing_delimiter_rows = 0
              for line in lines[header_index + 1:]:
                  raw_cells = next(csv.reader([line]))
                  if raw_cells and raw_cells[-1].strip() == '':
                      raw_trailing_delimiter_rows += 1
                  row = trim_trailing_empty(raw_cells)
                  if row and date_pattern.fullmatch(row[0]):
                      started = True
                      if len(row) != len(header):
                          raise SystemExit(f'Normalized row-width mismatch in {key} on {row[0]}')
                      if any(cell == '' for cell in row):
                          raise SystemExit(f'Internal blank field in {key} on {row[0]}')
                      records.append(row)
                  elif started:
                      footer.append(line)
              if not records:
                  raise SystemExit(f'No records for {key}')

              dates = [datetime.strptime(row[0], '%Y%m%d') for row in records]
              if dates != sorted(dates) or len(dates) != len(set(dates)):
                  raise SystemExit(f'Date ordering or uniqueness failure for {key}')

              sentinels = {'-99.99': 0, '-999': 0}
              columns = []
              for idx, name in enumerate(contract['expected'], start=1):
                  values = []
                  for row in records:
                      cell = row[idx]
                      if cell in sentinels:
                          sentinels[cell] += 1
                          continue
                      try:
                          value = float(cell)
                      except ValueError as exc:
                          raise SystemExit(f'Non-numeric {key}.{name} on {row[0]}') from exc
                      if not math.isfinite(value):
                          raise SystemExit(f'Non-finite {key}.{name} on {row[0]}')
                      values.append(value)
                  columns.append({
                      'name': name,
                      'valid_numeric_count': len(values),
                      'minimum_percent': min(values) if values else None,
                      'maximum_percent': max(values) if values else None,
                  })

              release_tags = sorted(set(re.findall(r'\b20\d{4}\b', '\n'.join(lines[:header_index]))))
              profiles.append({
                  'source_key': key,
                  'source_url': (
                      'https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/ftp/'
                      + contract['zip']
                  ),
                  'zip_filename': contract['zip'],
                  'zip_byte_count': len(zip_bytes),
                  'zip_sha256': zip_digest,
                  'member_filename': member.filename,
                  'member_byte_count': len(payload),
                  'member_sha256': member_digest,
                  'member_crc32': f'{member.CRC:08x}',
                  'encoding': encoding,
                  'header_index_zero_based': header_index,
                  'header': header,
                  'factor_roles': contract['roles'],
                  'row_count': len(records),
                  'first_date': dates[0].date().isoformat(),
                  'last_date': dates[-1].date().isoformat(),
                  'trailing_delimiter_row_count': raw_trailing_delimiter_rows,
                  'sentinel_counts': sentinels,
                  'column_profiles': columns,
                  'source_release_tags': release_tags,
                  'preamble_sha256': hashlib.sha256(
                      ('\n'.join(lines[:header_index]) + '\n').encode('utf-8')
                  ).hexdigest(),
                  'footer_line_count': len(footer),
                  'footer_sha256': hashlib.sha256(
                      ('\n'.join(footer) + ('\n' if footer else '')).encode('utf-8')
                  ).hexdigest(),
              })

          library = (raw_root / 'data_library.html').read_bytes()
          library_text = library.decode('utf-8', errors='replace')
          phrase_presence = {
              phrase: phrase in library_text
              for phrase in (
                  'Legacy Format (FIZ)',
                  'Flat File Format 2.0 (CIZ)',
                  'reconstruct the full history of returns each month',
                  'Historical returns can change',
              )
          }
          if not all(phrase_presence.values()):
              raise SystemExit(f'Data Library revision-warning change: {phrase_presence}')

          evidence = {
              'schema_version': '1.0',
              'evidence_id': 'KENNETH_FRENCH_CURRENT_DAILY_FACTOR_SCHEMA_V1',
              'source_authority': 'Kenneth French Data Library, Dartmouth College',
              'data_library_url': 'https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html',
              'data_library_byte_count': len(library),
              'data_library_sha256': hashlib.sha256(library).hexdigest(),
              'revision_warning_phrase_presence': phrase_presence,
              'declared_return_unit': 'PERCENT',
              'data_state': 'CURRENT_REVISED_PUBLIC_RECONSTRUCTION_SOURCE',
              'legacy_to_flat_file_change': 'FIZ_TO_CIZ_BEGINNING_JANUARY_2025_RELEASE',
              'daily_historical_vintage_archive_verified': False,
              'sources': profiles,
              'raw_uploaded': False,
              'row_level_data_uploaded': False,
              'performance_calculated': False,
              'recursive_strategy_constructed': False,
              'paper_replication_pass': False,
              'economic_edge_verdict': 'INCONCLUSIVE',
          }
          evidence_bytes = (json.dumps(evidence, indent=2, sort_keys=True) + '\n').encode('utf-8')
          (root / 'safe-daily-schema-evidence.json').write_bytes(evidence_bytes)
          summary = {
              'evidence_id': evidence['evidence_id'],
              'data_library_sha256': evidence['data_library_sha256'],
              'source_count': len(profiles),
              'sources': [
                  {key: profile[key] for key in (
                      'source_key', 'zip_sha256', 'member_sha256', 'header', 'row_count',
                      'first_date', 'last_date', 'trailing_delimiter_row_count',
                      'sentinel_counts', 'source_release_tags'
                  )}
                  for profile in profiles
              ],
              'safe_evidence_sha256': hashlib.sha256(evidence_bytes).hexdigest(),
              'performance_calculated': False,
              'paper_replication_pass': False,
          }
          (root / 'safe-daily-schema-summary.json').write_text(
              json.dumps(summary, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Remove official raw content
        run: rm -rf build/kf-daily-v2/raw

      - name: Upload safe evidence
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: kenneth-french-current-daily-safe-schema-v2-${{ github.sha }}
          path: |
            build/kf-daily-v2/safe-daily-schema-evidence.json
            build/kf-daily-v2/safe-daily-schema-summary.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Create and upload receipt
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          receipt = {
              'schema_version': '1.0',
              'repository': os.environ['GITHUB_REPOSITORY'],
              'commit_sha': os.environ['GITHUB_SHA'],
              'workflow': os.environ['GITHUB_WORKFLOW'],
              'run_id': os.environ['GITHUB_RUN_ID'],
              'created_at': datetime.now(UTC).isoformat(),
              'artifact_id': os.environ['ARTIFACT_ID'],
              'artifact_url': os.environ['ARTIFACT_URL'],
              'artifact_digest': os.environ['ARTIFACT_DIGEST'],
              'storage_state': 'ACTIONS_SAFE_EVIDENCE_ONLY_RETENTION_90_DAYS',
              'source_count': 3,
              'raw_uploaded': False,
              'performance_calculated': False,
              'paper_replication_pass': False,
              'economic_edge_verdict': 'INCONCLUSIVE',
          }
          Path('build/kf-daily-v2-receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - uses: actions/upload-artifact@v7
        with:
          name: kenneth-french-current-daily-safe-schema-v2-receipt-${{ github.sha }}
          path: build/kf-daily-v2-receipt.json
          if-no-files-found: error
          retention-days: 90
