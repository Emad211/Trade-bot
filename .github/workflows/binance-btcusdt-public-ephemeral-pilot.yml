name: Binance BTCUSDT Public Ephemeral Pilot

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/binance-btcusdt-public-ephemeral-pilot.yml
      - src/hybrid_trader/replication/binance_public_pilot.py
      - scripts/validate_binance_btcusdt_public_pilot.py
      - tests/test_binance_public_pilot.py
  push:
    branches: [agent/edge-research-reports]
    paths:
      - .github/workflows/binance-btcusdt-public-ephemeral-pilot.yml
      - src/hybrid_trader/replication/binance_public_pilot.py
      - scripts/validate_binance_btcusdt_public_pilot.py
      - tests/test_binance_public_pilot.py

permissions:
  contents: read

concurrency:
  group: binance-btcusdt-public-ephemeral-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-without-retaining-market-rows:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and verification tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run scoped static checks and tests
        run: |
          python -m ruff check \
            src/hybrid_trader/replication/binance_public_pilot.py \
            scripts/validate_binance_btcusdt_public_pilot.py \
            tests/test_binance_public_pilot.py
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/binance_public_pilot.py
          python -m pytest -q tests/test_binance_public_pilot.py

      - name: Run ephemeral official-data validation
        id: pilot
        shell: bash
        run: |
          mkdir -p build/diagnostics build/binance-safe-evidence
          : > build/diagnostics/pilot.txt
          code=1
          set +e
          for attempt in 1 2 3 4 5; do
            {
              echo "=== attempt ${attempt} ==="
              python scripts/validate_binance_btcusdt_public_pilot.py \
                --output-dir build/binance-safe-evidence
            } >> build/diagnostics/pilot.txt 2>&1
            code=$?
            [[ $code -eq 0 ]] && break
            if grep -Eq "HTTP Error (429|500|502|503|504)|download failed|URLError|timed out|Temporary failure" build/diagnostics/pilot.txt; then
              [[ $attempt -lt 5 ]] && sleep $((attempt * 3)) && continue
            fi
            break
          done
          cat build/diagnostics/pilot.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload failure diagnostics only
        if: ${{ steps.pilot.outputs.exit_code != '0' }}
        uses: actions/upload-artifact@v7
        with:
          name: binance-btcusdt-public-pilot-diagnostics-${{ github.sha }}
          path: build/diagnostics/pilot.txt
          if-no-files-found: error
          retention-days: 30

      - name: Enforce validation result
        if: ${{ steps.pilot.outputs.exit_code != '0' }}
        run: exit 1

      - name: Independently verify safe evidence and fail-closed gates
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("build/binance-safe-evidence/binance-btcusdt-public-ephemeral-pilot-evidence.json")
          if not path.is_file() or not 0 < path.stat().st_size < 100_000:
              raise SystemExit("Missing, empty, or oversized safe evidence")
          e = json.loads(path.read_text(encoding="utf-8"))
          ids = ["SPOT_KLINES", "UM_KLINES", "UM_MARK", "UM_INDEX", "UM_PREMIUM", "UM_FUNDING"]
          allowed = {
              "source_id", "data_type", "zip_sha256", "zip_bytes", "provider_sha256",
              "member", "member_sha256", "member_bytes", "schema_fields", "schema_sha256",
              "header", "rows", "first_ms", "last_ms", "cadence_ms", "cadence_breaks",
              "exact_cadence_deviation_count", "max_abs_cadence_jitter_ms", "market",
              "symbol", "interval", "source_url", "checksum_url",
          }
          if e["pilot_version"] != "BINANCE_BTCUSDT_PUBLIC_EPHEMERAL_PILOT_V1":
              raise SystemExit("Unexpected pilot version")
          if e["pilot_month"] != "2024-01" or e["source_count"] != 6:
              raise SystemExit("Unexpected pilot scope")
          sources = e["sources"]
          if [s["source_id"] for s in sources] != ids:
              raise SystemExit("Source identity/order changed")
          for s in sources:
              if set(s) != allowed:
                  raise SystemExit(f"Unexpected evidence keys for {s['source_id']}")
              if s["provider_sha256"] != s["zip_sha256"] or s["cadence_breaks"] != 0:
                  raise SystemExit(f"Integrity/cadence failure for {s['source_id']}")
              if s["symbol"] != "BTCUSDT":
                  raise SystemExit("Unexpected symbol")
              if s["source_id"] == "UM_FUNDING":
                  expected = (93, 3, 1704067200000, 1706716800000)
                  observed = (s["rows"], s["schema_fields"], s["first_ms"], s["last_ms"])
                  if observed != expected:
                      raise SystemExit(f"Unexpected funding profile: {observed}")
                  if not 0 < s["exact_cadence_deviation_count"] < 93:
                      raise SystemExit("Unexpected funding deviation count")
                  if s["max_abs_cadence_jitter_ms"] != 1:
                      raise SystemExit("Unexpected funding jitter")
              else:
                  expected = (744, 12, 1704067200000, 1706742000000, 0, 0)
                  observed = (
                      s["rows"], s["schema_fields"], s["first_ms"], s["last_ms"],
                      s["exact_cadence_deviation_count"], s["max_abs_cadence_jitter_ms"],
                  )
                  if observed != expected:
                      raise SystemExit(f"Unexpected kline profile for {s['source_id']}: {observed}")
          if e["cross_source_checks"] != {
              "funding_cadence_tolerance_ms": 1,
              "funding_row_count": 93,
              "funding_timestamps_normalized_or_rewritten": False,
              "hourly_row_count": 744,
              "hourly_timestamp_grids_exactly_aligned": True,
              "spot_microsecond_transition_not_applicable": True,
              "timestamp_unit": "MILLISECONDS",
          }:
              raise SystemExit("Cross-source contract changed")
          r = e["retention_state"]
          if any(r[k] is not False for k in (
              "raw_bytes_written_to_disk", "raw_bytes_uploaded", "derived_price_rows_uploaded",
              "raw_retention_authorized", "raw_redistribution_authorized",
          )):
              raise SystemExit("Retention gate self-promoted")
          a = e["authorization"]
          forbidden = (
              "basis_computation", "funding_pnl_computation", "return_computation",
              "empirical_fitting", "parameter_tuning", "paper_trading", "live_trading",
              "capital_deployment", "report_2_4_full_authorization",
          )
          if any(a[k] is not False for k in forbidden):
              raise SystemExit("Forbidden authorization became true")
          if e["paper_replication_pass"] is not False or e["economic_edge_verdict"] != "INCONCLUSIVE":
              raise SystemExit("Pilot self-promoted")
          print(json.dumps({
              "safe_evidence_sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              "safe_evidence_bytes": path.stat().st_size,
              "source_count": e["source_count"],
          }, indent=2, sort_keys=True))
          PY

      - name: Prove no raw or derived market-data files remain
        run: |
          rm -rf build/diagnostics
          mapfile -t files < <(find build -type f -printf '%P\n' | sort)
          expected="binance-safe-evidence/binance-btcusdt-public-ephemeral-pilot-evidence.json"
          [[ ${#files[@]} -eq 1 && "${files[0]}" == "$expected" ]] || {
            printf 'Unexpected retained files:\n%s\n' "${files[*]}"; exit 1;
          }

      - name: Upload safe hash-and-profile evidence only
        id: upload_evidence
        uses: actions/upload-artifact@v7
        with:
          name: binance-btcusdt-public-safe-evidence-${{ github.sha }}
          path: build/binance-safe-evidence/binance-btcusdt-public-ephemeral-pilot-evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: Create safe-evidence staging receipt
        env:
          EVIDENCE_ARTIFACT_ID: ${{ steps.upload_evidence.outputs.artifact-id }}
          EVIDENCE_ARTIFACT_URL: ${{ steps.upload_evidence.outputs.artifact-url }}
          EVIDENCE_ARTIFACT_DIGEST: ${{ steps.upload_evidence.outputs.artifact-digest }}
        run: |
          python - <<'PY'
          import hashlib, json, os
          from datetime import UTC, datetime
          from pathlib import Path
          p = Path("build/binance-safe-evidence/binance-btcusdt-public-ephemeral-pilot-evidence.json")
          receipt = {
              "schema_version": "1.0", "repository": os.environ["GITHUB_REPOSITORY"],
              "commit_sha": os.environ["GITHUB_SHA"], "workflow": os.environ["GITHUB_WORKFLOW"],
              "run_id": os.environ["GITHUB_RUN_ID"], "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "created_at": datetime.now(UTC).isoformat(),
              "evidence_artifact_id": os.environ["EVIDENCE_ARTIFACT_ID"],
              "evidence_artifact_url": os.environ["EVIDENCE_ARTIFACT_URL"],
              "evidence_artifact_digest": os.environ["EVIDENCE_ARTIFACT_DIGEST"],
              "safe_evidence_sha256": hashlib.sha256(p.read_bytes()).hexdigest(),
              "storage_state": "ACTIONS_SAFE_METADATA_STAGED_RETENTION_90_DAYS",
              "raw_market_data_stored": False, "derived_price_rows_stored": False,
              "raw_retention_authorized": False, "basis_or_return_computed": False,
              "paper_replication_pass": False, "economic_edge_verdict": "INCONCLUSIVE",
          }
          if not all(receipt[k] for k in ("evidence_artifact_id", "evidence_artifact_url", "evidence_artifact_digest")):
              raise SystemExit("Incomplete upload evidence")
          Path("build/binance-btcusdt-public-safe-receipt.json").write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload safe-evidence receipt
        uses: actions/upload-artifact@v7
        with:
          name: binance-btcusdt-public-safe-receipt-${{ github.sha }}
          path: build/binance-btcusdt-public-safe-receipt.json
          if-no-files-found: error
          retention-days: 90
