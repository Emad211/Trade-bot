name: install-gate61-no-trade-package

on:
  pull_request:
    branches: [main]
    paths:
      - .gate61-package.part00
      - .gate61-package.part01
      - .gate61-package.part02
      - .gate61-package.part03
      - .github/workflows/install-gate61-no-trade-package.yml

permissions:
  contents: write

concurrency:
  group: install-gate61-no-trade-package
  cancel-in-progress: false

jobs:
  verify-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decode content-addressed Gate 61 package
        run: |
          set -euo pipefail
          cat .gate61-package.part* | tr -d '\n' | base64 -d > /tmp/gate61-package.tar.gz
          echo 'e854d7d00662eeaa5cadb9f54f62dabc64514d290c778fd1ca0afe790e01e26f  /tmp/gate61-package.tar.gz' | sha256sum -c -
          tar -xzf /tmp/gate61-package.tar.gz

      - name: Install verification dependencies
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e ".[dev]"

      - name: Verify Gate 61 package
        run: |
          python -m ruff format --check \
            src/hybrid_trader/replication/okx_no_trade_observation.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_observation_contract.py \
            tests/test_okx_no_trade_observation.py
          python -m ruff check \
            src/hybrid_trader/replication/okx_no_trade_observation.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_observation_contract.py \
            tests/test_okx_no_trade_observation.py
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/okx_no_trade_observation.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_observation_contract.py
          PYTHONPATH=src python -m pytest -q tests/test_okx_no_trade_observation.py
          rm -rf build/gate61-installer-safe
          PYTHONPATH=src python scripts/validate_okx_no_trade_observation_contract.py \
            --output-dir build/gate61-installer-safe \
            --policy configs/okx_no_trade_observation_policy_v1.yaml \
            --code-head-sha "$(git rev-parse HEAD)"

      - name: Verify safe output and no real access
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('build/gate61-installer-safe')
          files = [path for path in root.rglob('*') if path.is_file()]
          expected = root / 'okx-no-trade-observation-contract-safe-evidence.json'
          if files != [expected]:
              raise SystemExit(f'Unexpected installer evidence files: {files}')
          evidence = json.loads(expected.read_text(encoding='utf-8'))
          closed = [
              'real_public_request_performed',
              'real_private_fee_request_performed',
              'credentials_supplied_to_ci',
              'orders_sent',
              'trade_permission_used',
              'withdraw_permission_used',
              'basis_computation_authorized',
              'funding_pnl_computation_authorized',
              'returns_computation_authorized',
              'transaction_cost_estimation_authorized',
              'strategy_testing_authorized',
              'paper_or_live_trading_authorized',
              'report_2_4_authorized',
          ]
          if any(evidence[key] is not False for key in closed):
              raise SystemExit('Gate 61 installer violated a closed field')
          if evidence['batch_admitted'] is not True or evidence['batch_deleted'] is not True:
              raise SystemExit('Synthetic Gate 61 lifecycle did not complete')
          PY

      - name: Publish verified package and retire installer
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: agent/edge-research-reports
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ['REPOSITORY']
          branch = os.environ['BRANCH']
          token = os.environ['GH_TOKEN']
          api = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
          }

          def call(method, url, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.loads(response.read().decode())

          ref = call('GET', f'{api}/git/ref/heads/{branch}')
          parent = ref['object']['sha']
          parent_commit = call('GET', f'{api}/git/commits/{parent}')
          base_tree = parent_commit['tree']['sha']
          paths = [
              'src/hybrid_trader/replication/okx_no_trade_observation.py',
              'scripts/run_okx_no_trade_observation.py',
              'scripts/validate_okx_no_trade_observation_contract.py',
              'tests/test_okx_no_trade_observation.py',
              'configs/okx_no_trade_observation_policy_v1.yaml',
              '.github/workflows/okx-no-trade-observation-contract.yml',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-controlled-no-trade-observation-gate.yaml',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-controlled-no-trade-observation-runbook.md',
          ]
          entries = []
          for path in paths:
              raw = Path(path).read_bytes()
              blob = call('POST', f'{api}/git/blobs', {
                  'content': base64.b64encode(raw).decode(),
                  'encoding': 'base64',
              })
              entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': blob['sha']})

          cleanup = [
              '.gate61-package.part00',
              '.gate61-package.part01',
              '.gate61-package.part02',
              '.gate61-package.part03',
              '.github/workflows/install-gate61-no-trade-package.yml',
              'docs/research/edge-discovery/02-replication/02-04-owner-controlled-no-trade-observation-gate-draft.md',
          ]
          entries.extend(
              {'path': path, 'mode': '100644', 'type': 'blob', 'sha': None}
              for path in cleanup
          )
          tree = call('POST', f'{api}/git/trees', {'base_tree': base_tree, 'tree': entries})
          commit = call('POST', f'{api}/git/commits', {
              'message': 'Prepare owner-controlled OKX no-trade observation package',
              'tree': tree['sha'],
              'parents': [parent],
          })
          call('PATCH', f'{api}/git/refs/heads/{branch}', {
              'sha': commit['sha'],
              'force': False,
          })
          print({'parent': parent, 'commit': commit['sha']})
          PY
