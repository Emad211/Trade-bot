name: phase3h-format

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase-3h-source-admission"]
    paths:
      - ".github/workflows/phase3h-format.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3h-source-admission
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply Phase 3H security hardening
        run: python scripts/materialize_phase3h_hardening.py
      - name: Install development dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Format and validate Phase 3H
        run: |
          ruff format src/hybrid_trader/source_admission.py scripts/probe_phase3h_sources.py tests/test_phase3h_source_admission.py
          ruff check --fix src/hybrid_trader/source_admission.py scripts/probe_phase3h_sources.py tests/test_phase3h_source_admission.py
          mypy --python-version 3.12 src
          pytest tests/test_phase3h_source_admission.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Commit validated source and tests
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/materialize_phase3h_hardening.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hybrid_trader/source_admission.py scripts/probe_phase3h_sources.py tests/test_phase3h_source_admission.py scripts/materialize_phase3h_hardening.py
          git commit -m "validate Phase 3H source admission"
          git push origin HEAD:agent/phase-3h-source-admission
