name: phase3c-provider-maintenance

on:
  push:
    branches: ["agent/phase-3b-prospective-events"]
    paths:
      - ".github/workflows/phase3c-provider-maintenance.yml"

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3c-avalai-provider
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply source transformation
        run: python scripts/materialize_avalai_audit_hardening.py
      - name: Format and compile
        run: |
          python -m pip install -e '.[dev]'
          ruff format .
          ruff check --fix .
          python -m compileall -q src scripts tests
      - name: Remove temporary Phase 3C files
        run: rm -f scripts/materialize_avalai_audit_hardening.py .github/workflows/phase3c-materialize.yml .github/workflows/avalai-docs-inspect.yml
      - name: Commit transformed source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "harden and format AvalAI provider integration"
          git push origin HEAD:agent/phase-3c-avalai-provider
