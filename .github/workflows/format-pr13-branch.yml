name: format-pr13-branch

# Trigger revision after workflow registration.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/format-pr13-branch.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/foundation-screening-verdict
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install formatter
        run: python -m pip install -e '.[dev]'
      - name: Format changed Python files
        run: ruff format scripts/assess_phase2c_foundation.py tests/test_foundation_assessment.py
      - name: Commit canonical formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/assess_phase2c_foundation.py tests/test_foundation_assessment.py
          git commit -m "format foundation verdict assessment" || true
          git push origin HEAD:agent/foundation-screening-verdict
