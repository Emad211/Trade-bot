name: OKX Historical Confirm Contract Probe V2

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/okx-historical-confirm-contract-probe-v2.yml

permissions:
  contents: read

concurrency:
  group: okx-historical-confirm-contract-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  intercept-confirm-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out triggering commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install isolated Playwright runtime
        run: |
          mkdir -p build/okx-confirm-v2/runtime
          cd build/okx-confirm-v2/runtime
          npm init -y >/dev/null
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Discover official instrument-family option and intercept Confirm locally
        run: |
          mkdir -p build/okx-confirm-v2/output
          cat > build/okx-confirm-v2/runtime/probe.mjs <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import path from 'node:path';
          import { chromium } from 'playwright';

          const workspace = process.env.GITHUB_WORKSPACE;
          if (!workspace) throw new Error('GITHUB_WORKSPACE is unavailable');
          const outputPath = path.join(workspace, 'build/okx-confirm-v2/output/evidence.json');
          fs.mkdirSync(path.dirname(outputPath), { recursive: true });

          const evidence = {
            schema_version: '2.0',
            purpose: 'OKX_HISTORICAL_FUNDING_CONFIRM_REQUEST_CONTRACT_ONLY',
            landing_url: 'https://www.okx.com/en-gb/historical-data',
            target_contract_identity: 'BTC-USDT-SWAP',
            target_instrument_family_candidates: ['BTC-USDT', 'BTC-USDT-SWAP'],
            modal_opened: false,
            popup_snapshot: {},
            selected_option: {},
            form_state_before_confirm: {},
            intercepted_confirm_requests: [],
            errors: [],
            confirm_clicked: false,
            confirm_request_transmitted: false,
            export_job_created: false,
            download_events_cancelled: 0,
            raw_market_data_retained: false,
            response_bodies_retained: false,
            gate_verdict: 'UNRESOLVED_CONFIRM_CONTRACT_ONLY'
          };

          function digest(value) {
            return crypto.createHash('sha256').update(value).digest('hex');
          }

          function safeUrl(raw) {
            try {
              const url = new URL(raw);
              for (const key of [...url.searchParams.keys()]) {
                const value = url.searchParams.get(key) || '';
                url.searchParams.set(key, value ? `sha256:${digest(value).slice(0, 16)}` : '');
              }
              url.hash = '';
              return url.toString();
            } catch {
              return raw.slice(0, 500);
            }
          }

          function safePostData(raw) {
            if (!raw) return { kind: 'empty', value: '' };
            try {
              const sensitive = /token|signature|credential|secret|password|cookie|authorization/i;
              const cleanse = value => {
                if (Array.isArray(value)) return value.map(cleanse);
                if (value && typeof value === 'object') {
                  return Object.fromEntries(Object.entries(value).map(([key, item]) => [
                    key,
                    sensitive.test(key) ? '[REDACTED]' : cleanse(item)
                  ]));
                }
                return value;
              };
              return { kind: 'json', value: cleanse(JSON.parse(raw)) };
            } catch {
              return { kind: 'non_json', byte_count: Buffer.byteLength(raw), sha256: digest(raw) };
            }
          }

          let browser = null;
          let interceptConfirm = false;

          try {
            browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              acceptDownloads: false,
              locale: 'en-GB',
              timezoneId: 'UTC'
            });
            const page = await context.newPage();

            page.on('download', async download => {
              evidence.download_events_cancelled += 1;
              evidence.errors.push({
                stage: 'download_event',
                message: 'Unexpected download cancelled',
                suggested_filename: download.suggestedFilename()
              });
              await download.cancel().catch(() => {});
            });

            await page.route('**/*', async route => {
              const request = route.request();
              const url = request.url();
              const host = (() => {
                try { return new URL(url).hostname.toLowerCase(); }
                catch { return ''; }
              })();
              const resourceType = request.resourceType();

              if (host && host !== 'okx.com' && host !== 'www.okx.com' && !host.endsWith('.okx.com')) {
                await route.abort('blockedbyclient');
                return;
              }
              if (/\.(zip|csv|gz|gzip|parquet|tar|7z|bz2|xz)(?:$|[?#])/i.test(url)) {
                evidence.errors.push({ stage: 'file_request_blocked', url: safeUrl(url) });
                await route.abort('blockedbyclient');
                return;
              }
              if (
                interceptConfirm &&
                ['fetch', 'xhr'].includes(resourceType) &&
                host.endsWith('okx.com') &&
                !url.includes('/apmfe/') &&
                !url.includes('/et/priapi/')
              ) {
                evidence.intercepted_confirm_requests.push({
                  method: request.method(),
                  resource_type: resourceType,
                  url: safeUrl(url),
                  post_data: safePostData(request.postData()),
                  content_type: request.headers()['content-type'] || ''
                });
                await route.abort('blockedbyclient');
                return;
              }
              await route.continue();
            });

            await page.goto(evidence.landing_url, { waitUntil: 'domcontentloaded', timeout: 90000 });
            await page.waitForTimeout(7000);
            evidence.modal_opened = await page.evaluate(() => {
              const normalize = value => (value || '').replace(/\s+/g, ' ').trim();
              const heading = [...document.querySelectorAll('*')]
                .find(element => normalize(element.textContent) === 'Funding rate');
              if (!heading) return false;
              let container = heading;
              for (let depth = 0; depth < 10 && container; depth += 1, container = container.parentElement) {
                const button = [...container.querySelectorAll('button,a,[role="button"]')]
                  .find(element => /download/i.test(
                    normalize(element.textContent) || element.getAttribute('aria-label') || ''
                  ));
                if (button) {
                  button.click();
                  return true;
                }
              }
              return false;
            });
            await page.waitForTimeout(5000);

            const dialog = page.getByRole('dialog');
            if (await dialog.count() !== 1) throw new Error('Funding dialog was not uniquely resolved');
            const symbolCombobox = dialog.getByRole('combobox').nth(1);
            await symbolCombobox.click();
            await page.waitForTimeout(1500);

            const searchable = page.locator('input[type="text"]:visible:not([readonly])');
            if (await searchable.count() > 0) {
              await searchable.last().fill('BTC-USDT');
              await page.waitForTimeout(1500);
            } else {
              await page.keyboard.type('BTC-USDT');
              await page.waitForTimeout(1500);
            }

            evidence.popup_snapshot = await page.evaluate(() => {
              const compact = value => (value || '').replace(/\s+/g, ' ').trim().slice(0, 200);
              const visible = element => {
                const style = getComputedStyle(element);
                const rect = element.getBoundingClientRect();
                return style.visibility !== 'hidden' && style.display !== 'none' && rect.width > 0 && rect.height > 0;
              };
              const roots = [...document.querySelectorAll('[role="listbox"], [data-testid="okd-popup"]')]
                .filter(visible);
              const candidates = [...document.querySelectorAll('[role="option"], [role="listbox"] *, [data-testid="okd-popup"] *')]
                .filter(visible)
                .map((element, index) => ({
                  index,
                  tag: element.tagName,
                  role: element.getAttribute('role') || '',
                  text: compact(element.textContent),
                  direct_text: compact(
                    [...element.childNodes]
                      .filter(node => node.nodeType === Node.TEXT_NODE)
                      .map(node => node.textContent)
                      .join(' ')
                  ),
                  class_tokens: String(element.className || '').split(/\s+/).filter(Boolean).slice(0, 15)
                }))
                .filter(item => /btc|usdt/i.test(`${item.text} ${item.direct_text}`))
                .slice(0, 100);
              return {
                visible_popup_count: roots.length,
                btc_usdt_candidates: candidates
              };
            });

            evidence.selected_option = await page.evaluate(() => {
              const normalize = value => (value || '').replace(/\s+/g, ' ').trim();
              const visible = element => {
                const style = getComputedStyle(element);
                const rect = element.getBoundingClientRect();
                return style.visibility !== 'hidden' && style.display !== 'none' && rect.width > 0 && rect.height > 0;
              };
              const pool = [...document.querySelectorAll('[role="option"], [role="listbox"] *, [data-testid="okd-popup"] *')]
                .filter(visible)
                .map(element => ({ element, text: normalize(element.textContent) }))
                .filter(item => item.text && item.text.length <= 100);
              const exact = pool.find(item => item.text === 'BTC-USDT') ||
                pool.find(item => item.text === 'BTC-USDT-SWAP');
              const fuzzy = pool.find(item => /^BTC\s*[-/]\s*USDT(?:\s*[-/]\s*SWAP)?$/i.test(item.text));
              const target = exact || fuzzy;
              if (!target) return { selected: false, reason: 'no_visible_btc_usdt_family_option' };
              target.element.click();
              return {
                selected: true,
                displayed_text: target.text,
                tag: target.element.tagName,
                role: target.element.getAttribute('role') || ''
              };
            });
            if (!evidence.selected_option.selected) {
              throw new Error('No official BTC-USDT instrument-family option was selectable');
            }
            await page.waitForTimeout(1000);

            const confirm = dialog.getByRole('button', { name: 'Confirm', exact: true });
            evidence.form_state_before_confirm = {
              symbol_combobox_text: (await symbolCombobox.innerText()).replace(/\s+/g, ' ').trim(),
              instrument_type: await dialog.locator('input[value="Perpetual"]').inputValue(),
              date_grouping: await dialog.locator('input[value="Daily"]').inputValue(),
              start_date: await dialog.locator('input[placeholder="Start date"]').inputValue(),
              end_date: await dialog.locator('input[placeholder="End date"]').inputValue(),
              confirm_disabled: await confirm.isDisabled()
            };
            if (evidence.form_state_before_confirm.confirm_disabled) {
              throw new Error('Confirm remained disabled after official family selection');
            }

            interceptConfirm = true;
            evidence.confirm_clicked = true;
            await confirm.click();
            await page.waitForTimeout(5000);
            interceptConfirm = false;
          } catch (error) {
            evidence.errors.push({ stage: 'confirm_contract_probe_v2', message: String(error?.stack || error) });
          } finally {
            if (browser) await browser.close().catch(() => {});
            evidence.confirm_request_transmitted = false;
            evidence.export_job_created = false;
            evidence.raw_market_data_retained = false;
            evidence.response_bodies_retained = false;
            evidence.gate_verdict = 'UNRESOLVED_CONFIRM_CONTRACT_ONLY';
            fs.writeFileSync(outputPath, JSON.stringify(evidence, null, 2) + '\n');
          }
          NODE

          cd build/okx-confirm-v2/runtime
          node probe.mjs
          cd "$GITHUB_WORKSPACE"

      - name: Verify no request left the browser
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = json.loads(
              Path('build/okx-confirm-v2/output/evidence.json').read_text(encoding='utf-8')
          )
          assert evidence['confirm_request_transmitted'] is False
          assert evidence['export_job_created'] is False
          assert evidence['raw_market_data_retained'] is False
          assert evidence['response_bodies_retained'] is False
          assert evidence['gate_verdict'] == 'UNRESOLVED_CONFIRM_CONTRACT_ONLY'
          print(json.dumps({
              'popup_snapshot': evidence['popup_snapshot'],
              'selected_option': evidence['selected_option'],
              'form_state_before_confirm': evidence['form_state_before_confirm'],
              'intercepted_confirm_requests': evidence['intercepted_confirm_requests'],
              'errors': evidence['errors'],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload request-contract evidence
        uses: actions/upload-artifact@v7
        with:
          name: okx-historical-confirm-contract-v2-${{ github.sha }}
          path: build/okx-confirm-v2/output/evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Record non-promotional summary
        run: |
          {
            echo "## OKX historical Confirm request contract V2"
            echo
            echo "- Contract identity targeted: BTC-USDT-SWAP"
            echo "- Official UI family selected only if displayed: yes"
            echo "- Confirm request transmitted: no"
            echo "- Export job created: no"
            echo "- Market data retained: no"
          } >> "$GITHUB_STEP_SUMMARY"
