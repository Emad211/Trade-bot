name: materialize-phase2c-clean-branch

# Transfer hashes are verified; run the complete validation and publication chain.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/materialize-phase2c-clean-branch.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-clean
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Reconstruct and verify clean overlay
        id: reconstruct
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ROOT=.bootstrap/phase2c-clean
          for encoded in "$ROOT"/phase2c-chunk-[0-9][0-9][0-9].b64.b64; do
            [ -e "$encoded" ] || continue
            base64 --decode "$encoded" > "${encoded%.b64}"
          done
          for encoded in "$ROOT"/phase2c-chunk-012-part-[0-9][0-9].b64.b64; do
            [ -e "$encoded" ] || continue
            base64 --decode "$encoded" > "${encoded%.b64}"
          done
          segment_parts=("$ROOT"/phase2c-chunk-012-part-[0-9][0-9].b64)
          [ "${#segment_parts[@]}" -eq 4 ] || { echo "Expected four chunk-012 segments" >&2; exit 1; }
          cat "${segment_parts[@]}" > "$ROOT/phase2c-chunk-012.b64"
          echo "b06a1cda3c198ab033e4430de97bc7635fe52470a958e392089c9657664f8b11  $ROOT/phase2c-chunk-012.b64" | sha256sum -c -
          [ "$(wc -c < "$ROOT/phase2c-chunk-012.b64")" -eq 2116 ]
          parts=()
          for index in $(seq -w 0 12); do
            part="$ROOT/phase2c-chunk-0${index}.b64"
            [ -f "$part" ] || { echo "Missing $part" >&2; exit 1; }
            parts+=("$part")
          done
          cat "${parts[@]}" > /tmp/phase2c-overlay.b64
          base64 --decode /tmp/phase2c-overlay.b64 > /tmp/phase2c-overlay.tar.gz
          echo "08a899bcccd33c49fd512ea72433e8b786b8f2e7dfef17b66a55d86b794afc46  /tmp/phase2c-overlay.tar.gz" | sha256sum -c -
          tar -tzf /tmp/phase2c-overlay.tar.gz > /tmp/phase2c-overlay-files.txt
          if grep -Eq '(^/|(^|/)\.\.(/|$)|(^|/)\.git(/|$)|(^|/)\.bootstrap(/|$))' /tmp/phase2c-overlay-files.txt; then
            echo "Unsafe archive path detected" >&2
            exit 1
          fi
          if tar -tvzf /tmp/phase2c-overlay.tar.gz | awk '{print substr($1,1,1)}' | grep -Ev '^[-d]$'; then
            echo "Archive contains a link or special file" >&2
            exit 1
          fi
          tar -xzf /tmp/phase2c-overlay.tar.gz
          rm -rf .bootstrap/phase2c-clean .github/workflows/phase2c-clean-materialize.yml
          git fetch --depth=1 origin agent/phase-2-point-in-time-benchmarks
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
      - name: Report reconstruction failure
        if: ${{ steps.reconstruct.outcome != 'success' }}
        run: |
          gh pr comment 6 --repo "$GITHUB_REPOSITORY" --body \
            "Clean Phase 2C materialization failed during hash-verified reconstruction. No source commit was created. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          exit 1
      - name: Install and validate materialized tree
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and smoke-test wheel
        shell: bash
        run: |
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/phase2c-clean-wheel
          /tmp/phase2c-clean-wheel/bin/python -m pip install dist/*.whl
          /tmp/phase2c-clean-wheel/bin/hybrid-trader --help >/dev/null
          /tmp/phase2c-clean-wheel/bin/python - <<'PY'
          import hybrid_trader
          import hybrid_trader.phase2c
          print(hybrid_trader.__version__)
          PY
          /tmp/phase2c-clean-wheel/bin/python -m pip check
      - name: Commit validated clean tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add clean Phase 2C public-data research gate"
          git push origin HEAD:agent/phase-2c-clean
      - name: Report success
        run: |
          gh pr comment 6 --repo "$GITHUB_REPOSITORY" --body \
            "Clean Phase 2C overlay passed chunk and archive SHA-256 verification, Ruff, strict Mypy, core tests, optional ML tests and clean-wheel smoke testing. Bootstrap files were removed before the source commit. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
