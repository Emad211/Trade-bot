name: phase3d-format

# Apply the reviewed type-contract fix, format, validate, and remove this workflow.
on:
  push:
    branches: ["agent/phase-3d-avalai-pilot"]
    paths:
      - ".github/workflows/phase3d-format.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3d-avalai-pilot
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply fail-closed decision-count typing
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/hybrid_trader/phase3d.py")
          text = path.read_text(encoding="utf-8")
          before = '    decision_count = int(verification["prospective_decision_count"])\n'
          after = '''    raw_decision_count = verification.get("prospective_decision_count")
              if not isinstance(raw_decision_count, int):
                  raise TypeError("Phase 3C verifier returned a non-integer decision count")
              decision_count = raw_decision_count
          '''
          if text.count(before) != 1:
              raise RuntimeError("Expected one Phase 3D decision-count conversion")
          path.write_text(text.replace(before, after, 1), encoding="utf-8")
          PY
      - name: Install development dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Format and validate Phase 3D
        run: |
          ruff format src/hybrid_trader/phase3d.py scripts/assess_phase3d_avalai_pilot.py tests/test_phase3d_quality_gate.py
          ruff check --fix src/hybrid_trader/phase3d.py scripts/assess_phase3d_avalai_pilot.py tests/test_phase3d_quality_gate.py
          mypy --python-version 3.12 src
          pytest tests/test_phase3d_quality_gate.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time formatter and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/phase3d-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "format and validate Phase 3D pilot"
          git push origin HEAD:agent/phase-3d-avalai-pilot
