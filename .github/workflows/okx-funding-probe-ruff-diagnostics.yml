name: OKX Funding Probe Ruff Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/okx-funding-probe-ruff-diagnostics.yml
      - src/hybrid_trader/replication/okx_public_funding_probe.py
      - scripts/probe_okx_public_funding.py
      - tests/test_okx_public_funding_probe.py

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev,replication]"
      - name: Capture Ruff output
        shell: bash
        run: |
          mkdir -p build/okx-ruff-diagnostics
          set +e
          python -m ruff check \
            src/hybrid_trader/replication/okx_public_funding_probe.py \
            scripts/probe_okx_public_funding.py \
            tests/test_okx_public_funding_probe.py \
            > build/okx-ruff-diagnostics/ruff.txt 2>&1
          code=$?
          cat build/okx-ruff-diagnostics/ruff.txt
          echo "$code" > build/okx-ruff-diagnostics/exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: okx-funding-probe-ruff-diagnostics-${{ github.sha }}
          path: build/okx-ruff-diagnostics/
          if-no-files-found: error
          retention-days: 7
