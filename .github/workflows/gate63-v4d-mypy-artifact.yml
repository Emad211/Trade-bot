name: gate63-v4d-mypy-artifact

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/gate63-v4d-mypy-artifact.yml

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Decode exact hardened candidate
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/gate63-v4.tar.gz"
          {
            cat .gate63v4-package.part00 .gate63v4-package.part01 .gate63v4-package.part02a
            base64 -d < .gate63v4-package.part02b.b64
            cat .gate63v4-package.part03 .gate63v4-package.part04 .gate63v4-package.part05
            base64 -d < .gate63v4-package.part06a.b64
            base64 -d < .gate63v4-package.part06b.b64
          } | tr -d '\n' | base64 -d > "$archive"
          echo "9e6f3b9f68f38d163332ad4c83864b3405731a0760e02c0304a46c21145d28b2  $archive" | sha256sum -c -
          tar -xzf "$archive"

      - name: Install verification environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Capture strict Mypy output
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p build/gate63-mypy
          set +e
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_execution_plan_contract.py \
            > build/gate63-mypy/mypy.txt 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > build/gate63-mypy/exit-code.txt
          cat build/gate63-mypy/mypy.txt

      - uses: actions/upload-artifact@v7
        with:
          name: gate63-mypy-${{ github.sha }}
          path: build/gate63-mypy/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
