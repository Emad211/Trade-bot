name: phase3h-materialize

on:
  push:
    branches: ["agent/phase-3h-source-diversity"]
    paths:
      - "scripts/materialize_phase3h_relevance.py"
      - "tests/test_phase3h_relevance.py"
      - ".github/workflows/phase3h-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3h-source-diversity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply relevance integration
        run: python scripts/materialize_phase3h_relevance.py
      - name: Format and validate relevance contracts
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format src/hybrid_trader/event_source_spec.py src/hybrid_trader/event_relevance.py src/hybrid_trader/event_capture_models.py src/hybrid_trader/event_capture_state.py src/hybrid_trader/event_capture.py scripts/verify_phase3b_events.py tests/test_phase3h_relevance.py
          ruff check --fix src/hybrid_trader/event_source_spec.py src/hybrid_trader/event_relevance.py src/hybrid_trader/event_capture_models.py src/hybrid_trader/event_capture_state.py src/hybrid_trader/event_capture.py scripts/verify_phase3b_events.py tests/test_phase3h_relevance.py
          mypy --python-version 3.12 src
          pytest tests/test_phase3h_relevance.py tests/test_phase3b_capture.py tests/test_phase3c_avalai_capture.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/materialize_phase3h_relevance.py .github/workflows/phase3h-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add validated prospective relevance filtering"
          git push origin HEAD:agent/phase-3h-source-diversity
