name: Fix Kenneth French Monthly Typing

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-kf-monthly-typing.yml

permissions:
  contents: write

jobs:
  fix-verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Apply exact annotation fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/hybrid_trader/replication/kenneth_french_monthly.py')
          text = path.read_text(encoding='utf-8')
          old = '    data = {column: [] for column in columns}\n'
          new = '    data: dict[str, list[float]] = {column: [] for column in columns}\n'
          if text.count(old) != 1:
              raise SystemExit('Unexpected monthly numeric-block annotation state')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e ".[dev,replication]"
      - name: Verify source and tests
        run: |
          python -m ruff check \
            src/hybrid_trader/replication/kenneth_french_monthly.py \
            scripts/audit_kenneth_french_monthly_sources.py \
            tests/test_kenneth_french_monthly.py
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/kenneth_french_monthly.py \
            scripts/audit_kenneth_french_monthly_sources.py
          python -m pytest -q tests/test_kenneth_french_monthly.py
      - name: Commit exact annotation fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hybrid_trader/replication/kenneth_french_monthly.py
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "Annotate Kenneth French monthly numeric block"
          git push origin HEAD:agent/edge-research-reports
