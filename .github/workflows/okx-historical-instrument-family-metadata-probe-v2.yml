name: OKX Historical Instrument Family Metadata Probe V2

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/okx-historical-instrument-family-metadata-probe-v2.yml

permissions:
  contents: read

jobs:
  inspect-nested-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Inspect nested metadata without retaining the response
        run: |
          mkdir -p build/okx-instrument-v2
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import urllib.request
          from collections import Counter
          from collections.abc import Mapping
          from pathlib import Path
          from typing import Any
          from urllib.parse import urlsplit

          url = 'https://www.okx.com/priapi/v5/broker/public/trade-data/instruments?instType=SWAP'
          request = urllib.request.Request(url, headers={
              'Accept': 'application/json',
              'Referer': 'https://www.okx.com/en-gb/historical-data',
              'User-Agent': 'Emad211-Trade-bot-replication/1.0',
          })
          with urllib.request.urlopen(request, timeout=45) as response:
              raw = response.read(5_000_001)
              status = int(response.status)
              final_url = response.geturl()
              content_type = response.headers.get('Content-Type', '')
          if status != 200 or len(raw) > 5_000_000 or 'json' not in content_type.lower():
              raise SystemExit('Official instrument metadata response violated transport limits')
          parsed = urlsplit(final_url)
          if parsed.scheme != 'https' or parsed.hostname != 'www.okx.com':
              raise SystemExit(f'Unexpected final host: {final_url}')
          payload: Any = json.loads(raw)

          schema_nodes: list[dict[str, Any]] = []
          string_matches: list[dict[str, str]] = []
          key_counts: Counter[str] = Counter()
          forbidden_keys = {'last', 'bidPx', 'askPx', 'fundingRate', 'realizedRate', 'markPx', 'idxPx'}
          observed_forbidden: set[str] = set()

          def walk(value: Any, path: str = '$') -> None:
              if isinstance(value, Mapping):
                  keys = sorted(str(key) for key in value)
                  key_counts.update(keys)
                  observed_forbidden.update(forbidden_keys.intersection(keys))
                  if len(schema_nodes) < 200:
                      schema_nodes.append({'path': path, 'type': 'object', 'keys': keys})
                  for key, item in value.items():
                      walk(item, f'{path}.{key}')
              elif isinstance(value, list):
                  if len(schema_nodes) < 200:
                      schema_nodes.append({'path': path, 'type': 'list', 'length': len(value)})
                  for index, item in enumerate(value[:500]):
                      walk(item, f'{path}[{index}]')
              elif isinstance(value, str):
                  upper = value.upper()
                  if ('BTC' in upper or 'USDT' in upper) and len(string_matches) < 200:
                      string_matches.append({'path': path, 'value': value[:160]})

          walk(payload)
          evidence = {
              'schema_version': '2.0',
              'purpose': 'OKX_HISTORICAL_UI_NESTED_INSTRUMENT_METADATA_ONLY',
              'source_url': url,
              'final_url': final_url,
              'http_status': status,
              'content_type': content_type,
              'response_byte_count': len(raw),
              'response_sha256': hashlib.sha256(raw).hexdigest(),
              'top_level_type': type(payload).__name__,
              'top_level_keys': sorted(payload) if isinstance(payload, Mapping) else [],
              'schema_nodes': schema_nodes,
              'frequent_keys': key_counts.most_common(100),
              'btc_usdt_string_matches': string_matches,
              'btc_usdt_match_count': len(string_matches),
              'observed_forbidden_market_value_keys': sorted(observed_forbidden),
              'raw_response_retained': False,
              'market_prices_retained': False,
              'funding_rates_retained': False,
              'gate_verdict': 'UNRESOLVED_NESTED_INSTRUMENT_METADATA_ONLY',
          }
          Path('build/okx-instrument-v2/evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          print(json.dumps({
              'top_level_keys': evidence['top_level_keys'],
              'schema_nodes': schema_nodes[:30],
              'btc_usdt_string_matches': string_matches[:50],
          }, indent=2, sort_keys=True))
          PY
      - name: Verify safe and informative evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          evidence = json.loads(Path('build/okx-instrument-v2/evidence.json').read_text())
          assert evidence['raw_response_retained'] is False
          assert evidence['market_prices_retained'] is False
          assert evidence['funding_rates_retained'] is False
          assert evidence['observed_forbidden_market_value_keys'] == []
          assert evidence['btc_usdt_match_count'] > 0, 'No BTC/USDT metadata path was found'
          assert evidence['gate_verdict'] == 'UNRESOLVED_NESTED_INSTRUMENT_METADATA_ONLY'
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: okx-historical-instrument-family-v2-${{ github.sha }}
          path: build/okx-instrument-v2/evidence.json
          if-no-files-found: error
          retention-days: 30
