name: materialize-phase3-robustness-branch

# Trigger revision after workflow registration on the established Phase 2C runner branch.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/materialize-phase3-robustness-branch.yml"

permissions:
  actions: read
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      HISTORICAL_RUN_ID: "29313821568"
      EVIDENCE_PATH: "research/runs/phase2c-historical-29313821568"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-classical-robustness
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify and apply Phase 3 payload
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=.bootstrap/phase3-classical-robustness.patch.gz.b64
          echo "b0e79161ddbdd57c862a357bcec87dae359d34a19b8333dddf207b7873219a33  $PAYLOAD" | sha256sum -c -
          base64 --decode "$PAYLOAD" > /tmp/phase3.patch.gz
          echo "2e1c5b7f4270b167f2529caf85f2fb8447481e835345513a6846f7925803201d  /tmp/phase3.patch.gz" | sha256sum -c -
          gzip --decompress --stdout /tmp/phase3.patch.gz > /tmp/phase3.patch
          echo "3f787b3e53e351a825e0eae82bddb6de2955125125f8698ddeb11a0402dfd759  /tmp/phase3.patch" | sha256sum -c -
          git apply --check /tmp/phase3.patch
          git apply /tmp/phase3.patch
          rm -rf .bootstrap .github/workflows/materialize-phase3-classical-robustness.yml
      - name: Install and validate
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Recompute historical classical verdict
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/historical-download /tmp/classical-assessment
          gh run download "$HISTORICAL_RUN_ID" --dir /tmp/historical-download
          REGISTRY=$(find /tmp/historical-download -type f -name source_registry.json -print -quit)
          test -n "$REGISTRY"
          HISTORICAL_ROOT=$(dirname "$REGISTRY")
          python scripts/verify_phase2c_artifacts.py "$HISTORICAL_ROOT"
          python scripts/verify_phase2c_artifacts_strict.py "$HISTORICAL_ROOT" --spec configs/phase2c_sources_authoritative.yaml
          python scripts/verify_phase2c_macro_gate.py "$HISTORICAL_ROOT" --spec configs/phase2c_sources_authoritative.yaml
          python scripts/assess_phase2c_classical.py "$HISTORICAL_ROOT" --output /tmp/classical-assessment
          test ! -s "$EVIDENCE_PATH/prospective/decisions.jsonl"
          (cd "$EVIDENCE_PATH" && sha256sum -c SHA256SUMS)
      - name: Build and clean-install wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/phase3-wheel
          /tmp/phase3-wheel/bin/python -m pip install dist/*.whl
          /tmp/phase3-wheel/bin/hybrid-trader --help >/dev/null
          /tmp/phase3-wheel/bin/python -c 'import hybrid_trader.candidate_screening; import hybrid_trader.statistical_validation'
          /tmp/phase3-wheel/bin/python -m pip check
      - name: Commit materialized Phase 3 tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add serial-dependence-aware classical robustness gate"
          git push origin HEAD:agent/phase-3-classical-robustness
