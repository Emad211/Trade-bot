name: snapshot-phase3g-status

# Trigger after workflow registration.
on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/snapshot-phase3g-status.yml"

permissions:
  actions: read
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Snapshot latest Phase 3G runs
        run: |
          mkdir -p .status
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3g-maturity-monitor&per_page=100" \
            --jq '{runs: [.workflow_runs[] | select(.name == "phase3g-format" or .name == "phase3g-maturity-monitor" or .name == "ci") | {id,name,status,conclusion,head_sha,html_url,created_at,updated_at}][0:12]}' \
            > .status/phase3g-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3g-status.json
          git commit -m "snapshot Phase 3G status" || true
          git push origin HEAD:agent/phase3c-hardening-runner
