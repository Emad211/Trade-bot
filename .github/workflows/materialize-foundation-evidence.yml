name: materialize-foundation-evidence

on:
  push:
    branches: ["agent/foundation-screening-verdict"]
    paths:
      - ".github/workflows/materialize-foundation-evidence.yml"

permissions:
  actions: read
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_RUN_ID: "29412736808"
      SOURCE_ARTIFACT_ID: "8342048388"
      SOURCE_ARTIFACT_NAME: "phase2c-foundation-494e5af03b7957cac6e3f654ea92fbfda4ac1b8f"
      SOURCE_ARTIFACT_DIGEST: "sha256:0e01fc2c0179000c83c7cb2d56665356fb8e42dd7f4a1d2711ce1d80b6766335"
      TARGET: "research/runs/phase2c-foundation-29412736808"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/foundation-screening-verdict
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install assessment dependencies
        run: python -m pip install -e .
      - name: Download immutable GitHub Actions evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/foundation-download
          gh run download "$SOURCE_RUN_ID" --dir /tmp/foundation-download
          ROOT=$(find /tmp/foundation-download -type f -name foundation_manifest.json -print -quit)
          test -n "$ROOT"
          echo "EVIDENCE_ROOT=$(dirname "$ROOT")" >> "$GITHUB_ENV"
      - name: Recompute assessment with current screening policy
        run: python scripts/assess_phase2c_foundation.py "$EVIDENCE_ROOT"
      - name: Materialize compact repository-native evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          for file in \
            foundation_manifest.json \
            verification.json \
            foundation_assessment.json \
            foundation_screening.csv \
            foundation_ablation_contributions.csv \
            baseline_vs_foundation.csv \
            scenario_summary.csv \
            scenario_fold_metrics.csv \
            scenario_cost_stress.csv \
            ablation_summary.csv \
            prospective_decisions.jsonl; do
            cp "$EVIDENCE_ROOT/$file" "$TARGET/$file"
          done
          test ! -s "$TARGET/prospective_decisions.jsonl"
          cat > "$TARGET/artifact.json" <<JSON
          {
            "workflow_run_id": $SOURCE_RUN_ID,
            "artifact_id": $SOURCE_ARTIFACT_ID,
            "artifact_name": "$SOURCE_ARTIFACT_NAME",
            "artifact_size_bytes": 54411026,
            "artifact_digest": "$SOURCE_ARTIFACT_DIGEST",
            "source_commit": "494e5af03b7957cac6e3f654ea92fbfda4ac1b8f",
            "storage": "github_actions",
            "raw_feature_caches_and_predictions_committed_to_git": false,
            "reason": "Large immutable binary and prediction outputs remain in GitHub Actions; compact auditable reports and their checksums are committed here."
          }
          JSON
          cat > "$TARGET/README.md" <<'MD'
          # Phase 2C foundation evidence — workflow run 29412736808

          This directory contains the compact, human-reviewable outputs from the successful pinned TimesFM 2.5 and Chronos-2 experiment.

          The source run used real model inference and completed verification, ablation, cost-stress and non-activation checks. The full 54.4 MB immutable artifact remains stored by GitHub Actions under artifact ID `8342048388` with digest `sha256:0e01fc2c0179000c83c7cb2d56665356fb8e42dd7f4a1d2711ce1d80b6766335`.

          Large feature caches, prediction matrices and packaged archives are intentionally not committed as opaque binary files. Their artifact identity is recorded in `artifact.json`; the compact CSV/JSON reports needed to audit the conclusion are committed alongside `SHA256SUMS`.

          The assessment is regenerated by the current repository screening code. No candidate is activated, and `prospective_decisions.jsonl` must remain empty.
          MD
          (cd "$TARGET" && sha256sum \
            README.md artifact.json foundation_manifest.json verification.json \
            foundation_assessment.json foundation_screening.csv \
            foundation_ablation_contributions.csv baseline_vs_foundation.csv \
            scenario_summary.csv scenario_fold_metrics.csv scenario_cost_stress.csv \
            ablation_summary.csv prospective_decisions.jsonl > SHA256SUMS)
      - name: Commit evidence to the research branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET"
          git commit -m "commit compact foundation-run evidence"
          git push origin HEAD:agent/foundation-screening-verdict
