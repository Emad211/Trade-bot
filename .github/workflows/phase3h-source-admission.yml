name: phase3h-source-admission

# Trigger the first live candidate probe after workflow registration.
on:
  workflow_dispatch:
  push:
    branches: ["agent/phase-3h-source-admission"]
    paths:
      - ".github/workflows/phase3h-source-admission.yml"
      - "configs/phase3h_candidate_sources.yaml"
      - "src/hybrid_trader/source_admission.py"
      - "scripts/probe_phase3h_sources.py"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install the research package
        run: python -m pip install -e .
      - name: Probe candidate public feeds
        id: admission
        continue-on-error: true
        run: |
          python scripts/probe_phase3h_sources.py \
            --config configs/phase3h_candidate_sources.yaml \
            --output artifacts/phase3h-source-admission \
            --timeout-seconds 30
      - name: Verify probe isolation and summarize accepted sources
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root=artifacts/phase3h-source-admission
          test ! -e "$root/state"
          test ! -e "$root/prospective_decisions.jsonl"
          if [ -f "$root/summary.json" ]; then
            jq '{accepted_source_ids,rejected_source_ids,required_integration_failures,all_required_candidates_accepted,longitudinal_state_modified}' "$root/summary.json"
            test "$(jq -r .longitudinal_state_modified "$root/summary.json")" = "false"
          fi
      - name: Record workflow provenance and checksum inventory
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root=artifacts/phase3h-source-admission
          mkdir -p "$root"
          printf '%s\n' "$GITHUB_SHA" > "$root/source_commit_sha.txt"
          printf '%s\n' "$GITHUB_RUN_ID" > "$root/workflow_run_id.txt"
          find "$root" -type f ! -name SHA256SUMS -print0 \
            | sort -z | xargs -0 sha256sum > "$root/SHA256SUMS"
      - name: Upload source-admission evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3h-source-admission-${{ github.run_id }}
          path: artifacts/phase3h-source-admission/
          if-no-files-found: error
          retention-days: 90
      - name: Enforce required candidate admission
        if: always()
        shell: bash
        run: |
          test "${{ steps.admission.outcome }}" = "success"
