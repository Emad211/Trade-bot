name: phase3h-source-admission

# Report the exact live admission verdict on PR #33.
on:
  workflow_dispatch:
  push:
    branches: ["agent/phase-3h-source-admission"]
    paths:
      - ".github/workflows/phase3h-source-admission.yml"
      - "configs/phase3h_candidate_sources.yaml"
      - "src/hybrid_trader/source_admission.py"
      - "scripts/probe_phase3h_sources.py"

permissions:
  contents: read
  pull-requests: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install the research package
        run: python -m pip install -e .
      - name: Probe candidate public feeds
        id: admission
        continue-on-error: true
        run: |
          python scripts/probe_phase3h_sources.py \
            --config configs/phase3h_candidate_sources.yaml \
            --output artifacts/phase3h-source-admission \
            --timeout-seconds 30
      - name: Verify probe isolation and summarize accepted sources
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root=artifacts/phase3h-source-admission
          test ! -e "$root/state"
          test ! -e "$root/prospective_decisions.jsonl"
          if [ -f "$root/summary.json" ]; then
            jq '{accepted_source_ids,rejected_source_ids,required_integration_failures,all_required_candidates_accepted,longitudinal_state_modified}' "$root/summary.json"
            test "$(jq -r .longitudinal_state_modified "$root/summary.json")" = "false"
          fi
      - name: Record workflow provenance and checksum inventory
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root=artifacts/phase3h-source-admission
          mkdir -p "$root"
          printf '%s\n' "$GITHUB_SHA" > "$root/source_commit_sha.txt"
          printf '%s\n' "$GITHUB_RUN_ID" > "$root/workflow_run_id.txt"
          find "$root" -type f ! -name SHA256SUMS -print0 \
            | sort -z | xargs -0 sha256sum > "$root/SHA256SUMS"
      - name: Report exact admission verdict on PR
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root=artifacts/phase3h-source-admission
          {
            echo '## Phase 3H live source-admission verdict'
            echo
            echo "- workflow run: ${GITHUB_RUN_ID}"
            echo "- source commit: \`${GITHUB_SHA}\`"
            echo "- probe outcome: \`${{ steps.admission.outcome }}\`"
            if [ -f "$root/summary.json" ]; then
              echo "- accepted: \`$(jq -c .accepted_source_ids "$root/summary.json")\`"
              echo "- rejected: \`$(jq -c .rejected_source_ids "$root/summary.json")\`"
              echo "- required failures: \`$(jq -c .required_integration_failures "$root/summary.json")\`"
              echo
              echo '### Per-source verdicts'
              jq -r '.results[] | "- `\(.source_id)`: **\(.status)** — documents=\(.parsed_documents), published_ratio=\(.published_timestamp_ratio), skipped_fraction=\(.skipped_fraction), reasons=\(.failure_reasons | join(",") // "")"' "$root/summary.json"
            else
              echo '- summary: missing'
            fi
          } > /tmp/phase3h-verdict.md
          gh pr comment 33 --repo "$GITHUB_REPOSITORY" --body-file /tmp/phase3h-verdict.md
      - name: Upload source-admission evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3h-source-admission-${{ github.run_id }}
          path: artifacts/phase3h-source-admission/
          if-no-files-found: error
          retention-days: 90
      - name: Enforce required candidate admission
        if: always()
        shell: bash
        run: |
          test "${{ steps.admission.outcome }}" = "success"
