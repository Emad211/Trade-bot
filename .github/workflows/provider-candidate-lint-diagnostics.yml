name: Provider Candidate Lint Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/provider-candidate-lint-diagnostics.yml
      - src/hybrid_trader/replication/provider_price_linkage.py
      - scripts/build_cftc_tff_2022_provider_candidate_plan.py
      - tests/test_provider_price_linkage.py
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/provider-candidate-lint-diagnostics.yml
      - src/hybrid_trader/replication/provider_price_linkage.py
      - scripts/build_cftc_tff_2022_provider_candidate_plan.py
      - tests/test_provider_price_linkage.py

permissions:
  contents: read

jobs:
  capture-ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,replication]"
      - name: Capture Ruff diagnostics
        id: lint
        shell: bash
        run: |
          mkdir -p build/provider-diagnostics
          set +e
          python -m ruff check \
            src/hybrid_trader/replication/provider_price_linkage.py \
            scripts/build_cftc_tff_2022_provider_candidate_plan.py \
            tests/test_provider_price_linkage.py \
            > build/provider-diagnostics/ruff.txt 2>&1
          code=$?
          cat build/provider-diagnostics/ruff.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: provider-candidate-ruff-diagnostics-${{ github.sha }}
          path: build/provider-diagnostics/ruff.txt
          if-no-files-found: error
          retention-days: 14
      - name: Enforce Ruff result
        if: ${{ steps.lint.outputs.exit_code != '0' }}
        run: exit 1
