name: phase3g-prospective-overlap

on:
  workflow_dispatch:
  schedule:
    - cron: "47 7 * * 1"
  push:
    branches: ["agent/phase-3g-prospective-overlap"]
    paths:
      - ".github/workflows/phase3g-prospective-overlap.yml"
      - "configs/phase3g_market_overlap.yaml"
      - "scripts/run_phase3g_overlap.py"
      - "src/hybrid_trader/phase3g_*.py"

permissions:
  actions: read
  contents: read

jobs:
  overlap:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install public exchange dependencies
        run: python -m pip install -e '.[exchange]'
      - name: Restore and verify latest prospective semantic state
        shell: bash
        run: |
          set -euo pipefail
          semantic_root=/tmp/phase3g-semantic-root
          mkdir -p "$semantic_root"
          runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?status=success&per_page=100")
          semantic_run_id=$(jq -r '[.workflow_runs[] | select(.name == "phase3e-longitudinal-events")][0].id // empty' <<<"$runs")
          if [ -z "$semantic_run_id" ]; then
            echo "No successful Phase 3E longitudinal run was found." >&2
            exit 1
          fi
          artifacts=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${semantic_run_id}/artifacts?per_page=100")
          artifact=$(jq -c '[.artifacts[] | select(.expired == false) | select(.name | startswith("phase3e-longitudinal-state-"))][0] // empty' <<<"$artifacts")
          if [ -z "$artifact" ]; then
            echo "The latest successful Phase 3E run has no state artifact." >&2
            exit 1
          fi
          semantic_artifact_id=$(jq -r .id <<<"$artifact")
          semantic_artifact_digest=$(jq -r .digest <<<"$artifact")
          semantic_artifact_name=$(jq -r .name <<<"$artifact")
          gh run download "$semantic_run_id" --name "$semantic_artifact_name" --dir /tmp/phase3g-semantic-download
          state_dir=$(find /tmp/phase3g-semantic-download -type d -name state -print -quit)
          test -n "$state_dir"
          cp -a "$state_dir" "$semantic_root/state"
          rm -f "$semantic_root/state/.capture.lock"
          python scripts/verify_phase3c_provider.py "$semantic_root"
          test ! -s "$semantic_root/state/prospective_decisions.jsonl"
          {
            echo "SEMANTIC_ROOT=$semantic_root/state"
            echo "SEMANTIC_RUN_ID=$semantic_run_id"
            echo "SEMANTIC_ARTIFACT_ID=$semantic_artifact_id"
            echo "SEMANTIC_ARTIFACT_DIGEST=$semantic_artifact_digest"
          } >> "$GITHUB_ENV"
      - name: Restore previous Phase 3G trajectory when available
        shell: bash
        run: |
          set -euo pipefail
          output=artifacts/phase3g-overlap
          mkdir -p "$output/state"
          previous_run_id=""
          previous_artifact_id=""
          previous_artifact_digest=""
          trajectory_restored=false
          runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?status=success&per_page=100")
          previous_run_id=$(jq -r --arg current "$GITHUB_RUN_ID" '[.workflow_runs[] | select(.name == "phase3g-prospective-overlap") | select((.id | tostring) != $current)][0].id // empty' <<<"$runs")
          if [ -n "$previous_run_id" ]; then
            artifacts=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${previous_run_id}/artifacts?per_page=100")
            artifact=$(jq -c '[.artifacts[] | select(.expired == false) | select(.name | startswith("phase3g-overlap-"))][0] // empty' <<<"$artifacts")
            if [ -z "$artifact" ]; then
              echo "Previous successful Phase 3G run has no overlap artifact." >&2
              exit 1
            fi
            previous_artifact_id=$(jq -r .id <<<"$artifact")
            previous_artifact_digest=$(jq -r .digest <<<"$artifact")
            artifact_name=$(jq -r .name <<<"$artifact")
            gh run download "$previous_run_id" --name "$artifact_name" --dir /tmp/phase3g-previous
            trajectory=$(find /tmp/phase3g-previous -type f -name maturity_trajectory.jsonl -print -quit)
            test -n "$trajectory"
            cp "$trajectory" "$output/state/maturity_trajectory.jsonl"
            python - <<'PY'
          from hybrid_trader.phase3g_trajectory import verify_phase3g_trajectory

          state = verify_phase3g_trajectory(
              "artifacts/phase3g-overlap/state/maturity_trajectory.jsonl"
          )
          if state.count < 1 or state.head_sha256 is None:
              raise RuntimeError("Restored Phase 3G trajectory is empty")
          print(state)
          PY
            trajectory_restored=true
          fi
          {
            echo "PREVIOUS_PHASE3G_RUN_ID=$previous_run_id"
            echo "PREVIOUS_PHASE3G_ARTIFACT_ID=$previous_artifact_id"
            echo "PREVIOUS_PHASE3G_ARTIFACT_DIGEST=$previous_artifact_digest"
            echo "TRAJECTORY_RESTORED=$trajectory_restored"
          } >> "$GITHUB_ENV"
      - name: Declare exact observation cutoff
        shell: bash
        run: |
          set -euo pipefail
          as_of=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "PHASE3G_AS_OF=$as_of" >> "$GITHUB_ENV"
      - name: Build prospective market and semantic overlap
        run: |
          python scripts/run_phase3g_overlap.py \
            --market-config configs/phase3g_market_overlap.yaml \
            --benchmark-config configs/btc_spot_4h_smoke.yaml \
            --semantic-state-root "$SEMANTIC_ROOT" \
            --output artifacts/phase3g-overlap \
            --trajectory-path artifacts/phase3g-overlap/state/maturity_trajectory.jsonl \
            --as-of "$PHASE3G_AS_OF" \
            --source-commit-sha "$GITHUB_SHA"
      - name: Verify overlap, trajectory and safety boundaries
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import pandas as pd

          from hybrid_trader.phase3g_overlap import Phase3GOverlapManifest
          from hybrid_trader.phase3g_trajectory import verify_phase3g_trajectory
          from hybrid_trader.semantic_dataset import read_semantic_dataset

          root = Path("artifacts/phase3g-overlap")
          overlap = Phase3GOverlapManifest.model_validate_json(
              (root / "overlap_manifest.json").read_text(encoding="utf-8")
          )
          frame, dataset = read_semantic_dataset(root / "dataset")
          trajectory = verify_phase3g_trajectory(
              root / "state" / "maturity_trajectory.jsonl"
          )
          if dataset.market_snapshot_sha256 != overlap.market_snapshot_sha256:
              raise RuntimeError("Overlap dataset and market snapshot are not bound")
          if trajectory.head_sha256 != overlap.trajectory_entry_id:
              raise RuntimeError("Overlap trajectory head is not the current entry")
          if overlap.model_fitting_executed or overlap.prospective_decisions_created:
              raise RuntimeError("Phase 3G attempted model fitting or a decision")
          event_columns = [
              column
              for column in dataset.semantic_feature_columns
              if column.endswith("_event_count")
          ]
          first_available: pd.Timestamp | None = None
          semantic_ledger = Path(os.environ["SEMANTIC_ROOT"]) / "semantic_events.jsonl"
          for line in semantic_ledger.read_bytes().splitlines():
              record = json.loads(line)
              value = pd.Timestamp(record["available_at"])
              first_available = (
                  value if first_available is None else min(first_available, value)
              )
          if first_available is not None:
              before = frame["decision_time"] < first_available
              if frame.loc[before, event_columns].to_numpy(dtype=float).sum() != 0.0:
                  raise RuntimeError("Semantic features were backfilled before availability")
          summary = {
              "overlap_id": overlap.overlap_id,
              "as_of": overlap.as_of.isoformat(),
              "market_snapshot_sha256": overlap.market_snapshot_sha256,
              "dataset_id": overlap.dataset_id,
              "dataset_content_sha256": overlap.dataset_content_sha256,
              "trajectory_entry_id": overlap.trajectory_entry_id,
              "trajectory_count": overlap.trajectory_count,
              "semantic_record_count": overlap.semantic_record_count,
              "active_decision_row_count": overlap.active_decision_row_count,
              "matured_labeled_row_count": overlap.matured_labeled_row_count,
              "maturity_status": overlap.maturity_status,
              "research_model_fitting_allowed": overlap.research_model_fitting_allowed,
              "model_fitting_executed": False,
              "prospective_decisions_created": False,
              "semantic_event_sum": float(
                  frame[event_columns].to_numpy(dtype=float).sum()
              ),
          }
          (root / "verification.json").write_text(
              json.dumps(summary, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Record source provenance
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def optional_int(name: str) -> int | None:
              value = os.environ.get(name, "")
              return int(value) if value else None

          def optional_text(name: str) -> str | None:
              value = os.environ.get(name, "")
              return value or None

          root = Path("artifacts/phase3g-overlap")
          payload = {
              "schema_version": "1.0",
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "source_commit_sha": os.environ["GITHUB_SHA"],
              "as_of": os.environ["PHASE3G_AS_OF"],
              "semantic_run_id": os.environ["SEMANTIC_RUN_ID"],
              "semantic_artifact_id": int(os.environ["SEMANTIC_ARTIFACT_ID"]),
              "semantic_artifact_digest": os.environ["SEMANTIC_ARTIFACT_DIGEST"],
              "previous_phase3g_run_id": optional_text(
                  "PREVIOUS_PHASE3G_RUN_ID"
              ),
              "previous_phase3g_artifact_id": optional_int(
                  "PREVIOUS_PHASE3G_ARTIFACT_ID"
              ),
              "previous_phase3g_artifact_digest": optional_text(
                  "PREVIOUS_PHASE3G_ARTIFACT_DIGEST"
              ),
              "trajectory_restored": os.environ["TRAJECTORY_RESTORED"] == "true",
              "credentials_used": False,
              "model_fitting_executed": False,
              "prospective_decisions_created": False,
          }
          (root / "run_context.json").write_text(
              json.dumps(payload, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          root=artifacts/phase3g-overlap
          printf '%s\n' "$GITHUB_SHA" > "$root/source_commit_sha.txt"
          printf '%s\n' "$GITHUB_RUN_ID" > "$root/workflow_run_id.txt"
          find "$root" -type f ! -name SHA256SUMS -print0 \
            | sort -z | xargs -0 sha256sum > "$root/SHA256SUMS"
      - name: Upload Phase 3G overlap evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase3g-overlap-${{ github.run_id }}
          path: artifacts/phase3g-overlap/
          if-no-files-found: error
          retention-days: 90
