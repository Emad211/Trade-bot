name: phase3h-selection-materialize

on:
  push:
    branches: ["agent/phase-3h-source-diversity"]
    paths:
      - "scripts/materialize_phase3h_selection.py"
      - "tests/test_phase3h_selection.py"
      - ".github/workflows/phase3h-selection-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3h-source-diversity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply source-balanced selection
        run: python scripts/materialize_phase3h_selection.py
      - name: Format and validate selection contracts
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format \
            src/hybrid_trader/event_capture.py \
            src/hybrid_trader/event_capture_models.py \
            src/hybrid_trader/event_selection.py \
            tests/test_phase3h_selection.py
          ruff check --fix \
            src/hybrid_trader/event_capture.py \
            src/hybrid_trader/event_capture_models.py \
            src/hybrid_trader/event_selection.py \
            tests/test_phase3h_selection.py
          mypy --python-version 3.12 src
          pytest tests/test_phase3h_relevance.py tests/test_phase3h_selection.py -q
          pytest -m 'not optional_ml' -q
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            scripts/materialize_phase3h_selection.py \
            .github/workflows/phase3h-selection-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add source-balanced semantic budget selection"
          git push origin HEAD:agent/phase-3h-source-diversity
