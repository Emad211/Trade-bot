name: install-gate63-sealed-plan-package

on:
  pull_request:
    branches: [main]
    paths:
      - .gate63-package.part00
      - .gate63-package.part01
      - .gate63-package.part02
      - .gate63-package.part03
      - .gate63-package.part04
      - .gate63-package.part05
      - .github/workflows/install-gate63-sealed-plan-package.yml

permissions:
  contents: write

concurrency:
  group: install-gate63-sealed-plan-package
  cancel-in-progress: false

jobs:
  verify-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out staging branch
        uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Decode and verify content-addressed Gate 63 package
        shell: bash
        run: |
          set -euo pipefail
          cat .gate63-package.part* | tr -d '\n' | base64 -d > "${RUNNER_TEMP}/gate63-package.tar.gz"
          echo '8675d9afb5f6ce117b985745f05105860f402f2d564feb6153332f4c95d5ef28  '"${RUNNER_TEMP}/gate63-package.tar.gz" | sha256sum -c -
          ARCHIVE="${RUNNER_TEMP}/gate63-package.tar.gz" python - <<'PY'
          import os
          import tarfile
          from pathlib import PurePosixPath

          expected = {
              'src/hybrid_trader/replication/okx_no_trade_execution_plan.py',
              'scripts/run_okx_no_trade_observation.py',
              'scripts/validate_okx_no_trade_execution_plan_contract.py',
              'tests/test_okx_no_trade_execution_plan.py',
              '.github/workflows/okx-sealed-execution-plan-contract.yml',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-gate.yaml',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-runbook.md',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-controlled-no-trade-observation-runbook.md',
          }
          with tarfile.open(os.environ['ARCHIVE'], 'r:gz') as archive:
              members = archive.getmembers()
              names = {member.name for member in members}
              if names != expected:
                  raise SystemExit(f'Gate 63 archive member mismatch: {sorted(names)}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts or not member.isfile():
                      raise SystemExit(f'Unsafe Gate 63 archive member: {member.name}')
          PY
          tar -xzf "${RUNNER_TEMP}/gate63-package.tar.gz"

      - name: Install project and verification tools
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e ".[dev]"

      - name: Format and verify Gate 63 package
        shell: bash
        run: |
          set -euo pipefail
          files=(
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py
            scripts/run_okx_no_trade_observation.py
            scripts/validate_okx_no_trade_execution_plan_contract.py
            tests/test_okx_no_trade_execution_plan.py
          )
          python -m ruff format "${files[@]}"
          python -m ruff format --check "${files[@]}"
          python -m ruff check "${files[@]}"
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_execution_plan_contract.py
          python -m pytest -q -p no:cacheprovider \
            tests/test_okx_no_trade_observation.py \
            tests/test_okx_no_trade_execution_plan.py
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in (
              Path('.github/workflows/okx-sealed-execution-plan-contract.yml'),
              Path('docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-gate.yaml'),
          ):
              value = yaml.safe_load(path.read_text(encoding='utf-8'))
              if not isinstance(value, dict):
                  raise SystemExit(f'Invalid YAML mapping: {path}')
          PY

      - name: Generate and independently audit synthetic safe evidence
        shell: bash
        run: |
          set -euo pipefail
          safe="${RUNNER_TEMP}/gate63-installer-safe"
          rm -rf "$safe"
          PYTHONPATH=src python scripts/validate_okx_no_trade_execution_plan_contract.py \
            --output-dir "$safe" \
            --code-head-sha "$(git rev-parse HEAD)"
          SAFE="$safe" python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['SAFE'])
          files = [path for path in root.rglob('*') if path.is_file()]
          expected = root / 'okx-sealed-execution-plan-safe-evidence.json'
          if files != [expected]:
              raise SystemExit(f'Unexpected Gate 63 evidence files: {files}')
          evidence = json.loads(expected.read_text(encoding='utf-8'))
          required_true = (
              'actual_head_bound',
              'clean_worktree_required',
              'plan_mode_0600',
              'claim_mode_0600',
              'credential_binding_hmac_present',
              'plan_authenticator_hmac_present',
              'claim_created_before_executor',
              'successful_claim_finalized',
              'replay_rejected',
              'failure_raised_after_claim',
              'failed_plan_consumed',
              'failed_plan_replay_rejected',
              'configuration_change_rejected',
              'credential_change_rejected',
              'expired_plan_rejected',
              'dirty_worktree_rejected',
              'head_mismatch_rejected',
              'safe_local_plan_and_claim_exclude_values',
          )
          if any(evidence[name] is not True for name in required_true):
              raise SystemExit('A required Gate 63 proof is not true')
          closed = (
              'credentials_present_in_safe_evidence',
              'owner_path_values_present_in_safe_evidence',
              'real_public_request_performed',
              'real_private_fee_request_performed',
              'credentials_supplied_to_ci',
              'orders_sent',
              'trade_permission_used',
              'withdraw_permission_used',
              'basis_computation_authorized',
              'funding_pnl_computation_authorized',
              'returns_computation_authorized',
              'transaction_cost_estimation_authorized',
              'strategy_testing_authorized',
              'paper_or_live_trading_authorized',
              'report_2_4_authorized',
          )
          if any(evidence[name] is not False for name in closed):
              raise SystemExit('A closed Gate 63 field was opened')
          text = expected.read_text(encoding='utf-8').casefold()
          for token in ('api_key', 'secret_key', 'passphrase', 'fee-snapshot.json', 'private-raw'):
              if token in text:
                  raise SystemExit(f'Forbidden safe-evidence token: {token}')
          PY

      - name: Create exact clean candidate commit
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          base_head="$(git rev-parse HEAD)"
          remote_head="$(git ls-remote origin refs/heads/agent/edge-research-reports | cut -f1)"
          if [[ "$remote_head" != "$base_head" ]]; then
            echo "Branch moved during Gate 63 verification" >&2
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_execution_plan_contract.py \
            tests/test_okx_no_trade_execution_plan.py \
            .github/workflows/okx-sealed-execution-plan-contract.yml \
            docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-gate.yaml \
            docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-runbook.md \
            docs/research/edge-discovery/02-replication/02-04-okx-owner-controlled-no-trade-observation-runbook.md
          git rm -f \
            .gate63-package.part00 \
            .gate63-package.part01 \
            .gate63-package.part02 \
            .gate63-package.part03 \
            .gate63-package.part04 \
            .gate63-package.part05 \
            .github/workflows/install-gate63-sealed-plan-package.yml
          git commit -m 'Seal owner-local OKX one-time execution plan'
          candidate_head="$(git rev-parse HEAD)"
          if [[ -n "$(git status --porcelain=v1 --untracked-files=normal)" ]]; then
            echo 'Candidate checkout is not clean' >&2
            git status --short
            exit 1
          fi
          echo "base_head=$base_head" >> "$GITHUB_OUTPUT"
          echo "candidate_head=$candidate_head" >> "$GITHUB_OUTPUT"

      - name: Prove candidate-head owner preflight without network access
        shell: bash
        env:
          OKX_API_KEY: gate63-installer-synthetic-api-key
          OKX_SECRET_KEY: gate63-installer-synthetic-secret-key
          OKX_PASSPHRASE: gate63-installer-synthetic-passphrase
        run: |
          set -euo pipefail
          candidate="${{ steps.candidate.outputs.candidate_head }}"
          if [[ "$(git rev-parse HEAD)" != "$candidate" ]]; then
            echo 'Candidate head changed before preflight' >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain=v1 --untracked-files=normal)" ]]; then
            echo 'Candidate checkout is dirty before preflight' >&2
            exit 1
          fi
          root="${RUNNER_TEMP}/gate63-owner-local"
          rm -rf "$root"
          mkdir -p "$root/private" "$root/safe"
          python scripts/run_okx_no_trade_observation.py preflight \
            --private-root "$root/private" \
            --repository-root "$(git rev-parse --show-toplevel)" \
            --private-fee-snapshot-output "$root/private/fee-snapshot.json" \
            --safe-batch-manifest-output "$root/safe/batch-manifest.json" \
            --safe-observation-receipt-output "$root/safe/observation-receipt.json" \
            --policy configs/okx_no_trade_observation_policy_v1.yaml \
            --code-head-sha "$candidate" \
            --api-domain www.okx.com \
            --retention-days 2 \
            --confirm I_CONFIRM_OWNER_CONTROLLED_OKX_NO_TRADE_OBSERVATION \
            --enable-public-network-fetch \
            --enable-private-network-fetch \
            --attest-terms-reviewed \
            --attest-personal-noncommercial-use \
            --attest-reasonable-rate-and-scale \
            --attest-redistribution-disabled \
            --attest-encryption-at-rest \
            --attest-owner-only-access \
            --attest-backup-and-sync-excluded \
            --attest-public-artifact-upload-disabled \
            --attest-owner-controlled-private-storage \
            --attest-owner-controlled-encryption-keys \
            --attest-real-execution-owner-confirmed \
            --attest-read-permission-enabled \
            --attest-trade-permission-disabled \
            --attest-withdraw-permission-disabled \
            --attest-ip-allowlist-enabled \
            --attest-credentials-outside-repository \
            --attest-credentials-outside-ci \
            --attest-credentials-not-logged \
            --sealed-execution-plan-output "$root/safe/sealed-plan.json" \
            --plan-claim-output "$root/safe/plan-claim.json" \
            --safe-deletion-receipt-output "$root/safe/deletion-receipt.json" \
            --plan-ttl-seconds 600 \
            > "$root/preflight-summary.json"
          ROOT="$root" CANDIDATE="$candidate" python - <<'PY'
          import json
          import os
          import stat
          from pathlib import Path

          root = Path(os.environ['ROOT'])
          candidate = os.environ['CANDIDATE']
          plan_path = root / 'safe/sealed-plan.json'
          summary = json.loads((root / 'preflight-summary.json').read_text(encoding='utf-8'))
          plan_text = plan_path.read_text(encoding='utf-8')
          if stat.S_IMODE(plan_path.stat().st_mode) != 0o600:
              raise SystemExit('Sealed plan mode is not 0600')
          if summary['network_request_performed'] is not False:
              raise SystemExit('Preflight unexpectedly performed network access')
          if summary['actual_git_head_sha'] != candidate:
              raise SystemExit('Preflight did not bind the candidate head')
          if summary['clean_worktree'] is not True:
              raise SystemExit('Preflight did not bind a clean worktree')
          for forbidden in (
              os.environ['OKX_API_KEY'],
              os.environ['OKX_SECRET_KEY'],
              os.environ['OKX_PASSPHRASE'],
              str(root),
          ):
              if forbidden in plan_text:
                  raise SystemExit('Sealed plan leaked a credential or owner path value')
          PY
          if [[ -n "$(git status --porcelain=v1 --untracked-files=normal)" ]]; then
            echo 'Preflight changed candidate checkout' >&2
            git status --short
            exit 1
          fi

      - name: Push verified candidate fast-forward
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.candidate.outputs.base_head }}"
          candidate="${{ steps.candidate.outputs.candidate_head }}"
          remote_head="$(git ls-remote origin refs/heads/agent/edge-research-reports | cut -f1)"
          if [[ "$remote_head" != "$base" ]]; then
            echo 'Branch moved before Gate 63 publication' >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$candidate" ]]; then
            echo 'Local candidate changed before push' >&2
            exit 1
          fi
          git push origin HEAD:refs/heads/agent/edge-research-reports
