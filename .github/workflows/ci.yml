name: ci

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: write

jobs:
  phase3a-typing-patch:
    if: ${{ (github.event_name == 'push' && github.ref_name == 'agent/phase-3a-robustness-gate') || (github.event_name == 'pull_request' && github.head_ref == 'agent/phase-3a-robustness-gate') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3a-robustness-gate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply reviewed typing-only patch
        run: |
          python scripts/patch_phase3a_candidate_typing.py
          python -m pip install 'ruff>=0.8,<1'
          ruff format src/hybrid_trader/candidate_robustness.py
          ruff check src/hybrid_trader/candidate_robustness.py
      - name: Commit typing-only patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hybrid_trader/candidate_robustness.py
          git commit -m 'fix Phase 3A regime-summary typing'
          git push origin HEAD:agent/phase-3a-robustness-gate

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core and development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: |
          set -o pipefail
          mypy --python-version ${{ matrix.python-version }} src 2>&1 \
            | tee mypy-${{ matrix.python-version }}.log
      - name: Upload mypy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-${{ matrix.python-version }}-${{ github.sha }}
          path: mypy-${{ matrix.python-version }}.log
          if-no-files-found: error
      - name: Core tests
        run: |
          set -o pipefail
          pytest -m "not optional_ml" --cov=hybrid_trader --cov-report=term-missing --tb=short 2>&1 | tee pytest.log
      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}-${{ github.sha }}
          path: pytest.log
          if-no-files-found: warn
      - name: Dependency consistency
        run: python -m pip check

  optional-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tree-model dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Optional ML integration
        run: pytest -m optional_ml -q

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/hybrid-trader-package-smoke
          /tmp/hybrid-trader-package-smoke/bin/python -m pip install dist/*.whl
      - name: Verify packaged CLI and imports
        run: |
          /tmp/hybrid-trader-package-smoke/bin/hybrid-trader --help
          /tmp/hybrid-trader-package-smoke/bin/python - <<'PY'
          import hybrid_trader
          import hybrid_trader.models
          from hybrid_trader.cli import app
          print(hybrid_trader.__version__, type(app).__name__)
          PY
          /tmp/hybrid-trader-package-smoke/bin/python -m pip check
      - name: Create reproducible source bundle
        run: |
          git archive \
            --format=tar.gz \
            --prefix="Trade-bot-${GITHUB_SHA}/" \
            --output="dist/Trade-bot-${GITHUB_SHA}.tar.gz" \
            HEAD
          sha256sum dist/* > dist/SHA256SUMS
      - name: Upload verified distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
