name: ci

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: write

jobs:
  materialize-phase2c-clean:
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'agent/phase-2c-clean' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-clean
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Reconstruct and verify clean overlay
        shell: bash
        run: |
          set -euo pipefail
          ROOT=.bootstrap/phase2c-clean
          for encoded in "$ROOT"/phase2c-chunk-[0-9][0-9][0-9].b64.b64; do
            [ -e "$encoded" ] || continue
            base64 --decode "$encoded" > "${encoded%.b64}"
          done
          parts=()
          for index in $(seq -w 0 12); do
            part="$ROOT/phase2c-chunk-0${index}.b64"
            [ -f "$part" ] || { echo "Missing $part" >&2; exit 1; }
            parts+=("$part")
          done
          cat "${parts[@]}" > /tmp/phase2c-overlay.b64
          base64 --decode /tmp/phase2c-overlay.b64 > /tmp/phase2c-overlay.tar.gz
          echo "08a899bcccd33c49fd512ea72433e8b786b8f2e7dfef17b66a55d86b794afc46  /tmp/phase2c-overlay.tar.gz" | sha256sum -c -
          tar -tzf /tmp/phase2c-overlay.tar.gz > /tmp/phase2c-overlay-files.txt
          if grep -Eq '(^/|(^|/)\.\.(/|$)|(^|/)\.git(/|$)|(^|/)\.bootstrap(/|$))' /tmp/phase2c-overlay-files.txt; then
            echo "Unsafe archive path detected" >&2
            exit 1
          fi
          if tar -tvzf /tmp/phase2c-overlay.tar.gz | awk '{print substr($1,1,1)}' | grep -Ev '^[-d]$'; then
            echo "Archive contains a link or special file" >&2
            exit 1
          fi
          tar -xzf /tmp/phase2c-overlay.tar.gz
      - name: Remove one-time publication files and restore canonical CI
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap/phase2c-clean .github/workflows/phase2c-clean-materialize.yml
          git fetch --depth=1 origin agent/phase-2-point-in-time-benchmarks
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
      - name: Install and validate materialized tree
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and smoke-test wheel
        shell: bash
        run: |
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/phase2c-clean-wheel
          /tmp/phase2c-clean-wheel/bin/python -m pip install dist/*.whl
          /tmp/phase2c-clean-wheel/bin/hybrid-trader --help >/dev/null
          /tmp/phase2c-clean-wheel/bin/python - <<'PY'
          import hybrid_trader
          import hybrid_trader.phase2c
          print(hybrid_trader.__version__)
          PY
          /tmp/phase2c-clean-wheel/bin/python -m pip check
      - name: Commit validated Phase 2C source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "add clean Phase 2C public-data research gate"
          git push origin HEAD:agent/phase-2c-clean

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core and development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy --python-version ${{ matrix.python-version }} src
      - name: Core tests
        run: |
          set -o pipefail
          pytest -m "not optional_ml" --cov=hybrid_trader --cov-report=term-missing --tb=short 2>&1 | tee pytest.log
      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest.log
      - name: Dependency consistency
        run: python -m pip check

  optional-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tree-model dependencies
        run: python -m pip install -e '.[dev,ml]'
      - name: Optional ML integration
        run: pytest -m optional_ml -q

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/hybrid-trader-package-smoke
          /tmp/hybrid-trader-package-smoke/bin/python -m pip install dist/*.whl
      - name: Verify packaged CLI and imports
        run: |
          /tmp/hybrid-trader-package-smoke/bin/hybrid-trader --help
          /tmp/hybrid-trader-package-smoke/bin/python - <<'PY'
          import hybrid_trader
          import hybrid_trader.models
          from hybrid_trader.cli import app
          print(hybrid_trader.__version__, type(app).__name__)
          PY
          /tmp/hybrid-trader-package-smoke/bin/python -m pip check
      - name: Create reproducible source bundle
        run: |
          git archive \
            --format=tar.gz \
            --prefix="Trade-bot-${GITHUB_SHA}/" \
            --output="dist/Trade-bot-${GITHUB_SHA}.tar.gz" \
            HEAD
          sha256sum dist/* > dist/SHA256SUMS
      - name: Upload verified distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
