name: Cboe VX 2022 Settlement Schema Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/cboe-vx-2022-settlement-schema-probe.yml
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/cboe-vx-2022-settlement-schema-probe.yml

permissions:
  contents: read

concurrency:
  group: cboe-vx-2022-settlement-schema-probe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acquire-and-inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out triggering commit
        uses: actions/checkout@v6

      - name: Acquire official Cboe settlement CSV
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/cboe-vx-schema-probe/raw
          url='https://www-api.cboe.com/us/futures/market_statistics/settlement/csv?dt=2022-09-16'
          curl \
            --fail-with-body \
            --location \
            --retry 5 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 120 \
            --user-agent 'Trade-bot research replication/1.0' \
            --dump-header build/cboe-vx-schema-probe/response-headers.txt \
            --output build/cboe-vx-schema-probe/raw/cboe_settlement_2022-09-16.csv \
            "$url"

      - name: Profile raw bytes and retain diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import hashlib
          import io
          import json
          from pathlib import Path

          root = Path('build/cboe-vx-schema-probe')
          path = root / 'raw/cboe_settlement_2022-09-16.csv'
          raw = path.read_bytes()
          errors = []
          if not raw:
              errors.append('EMPTY_RESPONSE')
          html_like = b'<html' in raw[:2000].lower() or b'<!doctype' in raw[:2000].lower()
          if html_like:
              errors.append('HTML_INSTEAD_OF_CSV')
          try:
              text = raw.decode('utf-8-sig')
          except UnicodeDecodeError:
              text = raw.decode('latin-1')
              errors.append('NON_UTF8_RESPONSE')
          rows = list(csv.reader(io.StringIO(text, newline='')))
          if len(rows) < 2:
              errors.append('NO_DATA_ROWS')
          header = rows[0] if rows else []
          widths = sorted({len(row) for row in rows})
          if len(widths) > 1:
              errors.append('NON_UNIFORM_ROW_WIDTH')
          vx_candidates = [
              row for row in rows[1:]
              if any('VX' in cell.strip().upper() for cell in row)
          ]
          if not vx_candidates:
              errors.append('NO_VX_CANDIDATE_ROWS')
          diagnostics = {
              'source_url': 'https://www-api.cboe.com/us/futures/market_statistics/settlement/csv?dt=2022-09-16',
              'requested_date': '2022-09-16',
              'filename': path.name,
              'byte_count': len(raw),
              'sha256': hashlib.sha256(raw).hexdigest(),
              'line_count': len(rows),
              'header': header,
              'row_widths': widths,
              'first_twenty_rows': rows[:20],
              'vx_candidate_row_count': len(vx_candidates),
              'vx_candidate_rows': vx_candidates[:30],
              'validation_errors': errors,
              'validation_status': 'PASS' if not errors else 'QUARANTINED',
              'price_linkage_authorized': False,
              'returns_authorized': False,
          }
          (root / 'schema-diagnostics.json').write_text(
              json.dumps(diagnostics, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(diagnostics, indent=2, sort_keys=True))
          if errors:
              raise SystemExit('Cboe schema probe quarantined: ' + ','.join(errors))
          PY

      - name: Upload raw schema-probe bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cboe-vx-2022-settlement-schema-probe-${{ github.sha }}
          path: build/cboe-vx-schema-probe/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
