name: phase2c-foundation-format

on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - "src/hybrid_trader/forecasting/batched.py"
      - "scripts/run_phase2c_foundation.py"
      - "scripts/verify_phase2c_foundation.py"
      - "tests/test_batched_forecasting.py"
      - ".github/workflows/phase2c-foundation-benchmark.yml"
      - ".github/workflows/phase2c-foundation-format.yml"

permissions:
  contents: write

jobs:
  normalize-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Normalize formatting
        run: ruff format .
      - name: Lint
        run: ruff check .
      - name: Strict type check
        run: mypy --python-version 3.12 src
      - name: Tests
        run: pytest --cov=hybrid_trader --cov-report=term-missing
      - name: Commit formatting-only changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Repository already matches Ruff formatting."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/hybrid_trader/forecasting/batched.py \
            scripts/run_phase2c_foundation.py \
            scripts/verify_phase2c_foundation.py \
            tests/test_batched_forecasting.py \
            .github/workflows/phase2c-foundation-benchmark.yml
          git commit -m "format foundation challenger sources"
          git push origin HEAD:agent/phase-2c-real-data-benchmark
