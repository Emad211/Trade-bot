name: OKX Historical Bundle Contract Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/okx-historical-bundle-contract-probe.yml

permissions:
  contents: read

concurrency:
  group: okx-historical-bundle-contract-${{ github.ref }}
  cancel-in-progress: false

jobs:
  inspect-public-bundles:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Fetch and inspect only official page bundles
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import re
          import tempfile
          import urllib.request
          from pathlib import Path
          from urllib.parse import parse_qsl, urlencode, urlsplit, urlunsplit

          SOURCE_URLS = (
              "https://www.okx.com/cdn/assets/okfe/broker-center/339/index.26fa602d.js",
              "https://www.okx.com/cdn/assets/okfe/broker-center/992/index.65af8d40.js",
              "https://www.okx.com/cdn/assets/okfe/broker-center/445/index.62e27511.js",
              "https://www.okx.com/cdn/assets/okfe/broker-center/brokerHistory/index.06c0c768.js",
          )
          MAX_BYTES_PER_ASSET = 2_000_000
          output = Path("build/okx-historical-bundle-contract-probe/evidence.json")
          output.parent.mkdir(parents=True, exist_ok=True)

          def sha256(data: bytes) -> str:
              return hashlib.sha256(data).hexdigest()

          def safe_url(raw: str) -> str:
              try:
                  parts = urlsplit(raw)
              except ValueError:
                  return raw[:500]
              query = []
              for key, value in parse_qsl(parts.query, keep_blank_values=True):
                  query.append((key, f"sha256:{sha256(value.encode())[:16]}" if value else ""))
              return urlunsplit((parts.scheme, parts.netloc, parts.path, urlencode(query), ""))

          keyword_pattern = re.compile(
              r"funding|history|historical|download|export|trade-data|instrument|"
              r"dategroup|daterange|date_aggregation|module|file|uploadCloudPlatform",
              re.IGNORECASE,
          )
          endpoint_pattern = re.compile(
              r"/(?:priapi|api|v\d+|broker)[A-Za-z0-9_./{}?=&%:+-]{3,300}"
          )
          literal_pattern = re.compile(r"[\"']([^\"'\r\n]{1,500})[\"']")
          url_pattern = re.compile(r"https?://[^\"'\s\\]{1,500}")

          assets = []
          all_paths: set[str] = set()
          all_literals: set[str] = set()
          all_urls: set[str] = set()

          for source_url in SOURCE_URLS:
              request = urllib.request.Request(
                  source_url,
                  headers={
                      "Accept": "application/javascript,text/javascript,*/*;q=0.1",
                      "User-Agent": (
                          "Emad211-Trade-bot-replication/1.0 "
                          "(+https://github.com/Emad211/Trade-bot)"
                      ),
                  },
              )
              with urllib.request.urlopen(request, timeout=45) as response:
                  status = int(response.status)
                  content_type = response.headers.get("Content-Type", "")
                  final_url = response.geturl()
                  raw = response.read(MAX_BYTES_PER_ASSET + 1)
              if status != 200:
                  raise SystemExit(f"Official bundle returned HTTP {status}: {source_url}")
              if len(raw) > MAX_BYTES_PER_ASSET:
                  raise SystemExit(f"Official bundle exceeded byte-size guard: {source_url}")
              if "javascript" not in content_type.lower():
                  raise SystemExit(f"Unexpected content type {content_type!r}: {source_url}")
              final_parts = urlsplit(final_url)
              if final_parts.scheme != "https" or final_parts.hostname != "www.okx.com":
                  raise SystemExit(f"Bundle redirected off official host: {final_url}")

              with tempfile.NamedTemporaryFile(prefix="okx-bundle-", suffix=".js") as handle:
                  handle.write(raw)
                  handle.flush()
                  text = raw.decode("utf-8", errors="strict")
                  paths = {
                      value
                      for value in endpoint_pattern.findall(text)
                      if keyword_pattern.search(value)
                  }
                  literals = {
                      value
                      for value in literal_pattern.findall(text)
                      if keyword_pattern.search(value)
                  }
                  urls = {
                      safe_url(value)
                      for value in url_pattern.findall(text)
                      if keyword_pattern.search(value)
                  }

              all_paths.update(paths)
              all_literals.update(literals)
              all_urls.update(urls)
              assets.append(
                  {
                      "source_url": source_url,
                      "final_url": safe_url(final_url),
                      "http_status": status,
                      "content_type": content_type,
                      "byte_count": len(raw),
                      "sha256": sha256(raw),
                      "candidate_endpoint_paths": sorted(paths)[:250],
                      "candidate_string_literals": sorted(literals)[:250],
                      "candidate_absolute_urls": sorted(urls)[:100],
                  }
              )

          evidence = {
              "schema_version": "1.1",
              "purpose": "OKX_HISTORICAL_DELIVERY_STATIC_CONTRACT_METADATA_ONLY",
              "assets": assets,
              "candidate_endpoint_paths": sorted(all_paths)[:500],
              "candidate_string_literals": sorted(all_literals)[:500],
              "candidate_absolute_urls": sorted(all_urls)[:200],
              "raw_bundles_retained": False,
              "response_bodies_uploaded": False,
              "market_data_requested": False,
              "market_data_retained": False,
              "gate_verdict": "UNRESOLVED_STATIC_METADATA_ONLY",
          }
          output.write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(evidence, indent=2, sort_keys=True))
          PY

      - name: Verify evidence is metadata-only
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = json.loads(
              Path("build/okx-historical-bundle-contract-probe/evidence.json")
              .read_text(encoding="utf-8")
          )
          if evidence["raw_bundles_retained"] is not False:
              raise SystemExit("Raw JavaScript bundles were retained")
          if evidence["response_bodies_uploaded"] is not False:
              raise SystemExit("JavaScript response bodies were uploaded")
          if evidence["market_data_requested"] is not False:
              raise SystemExit("Market data was requested")
          if evidence["market_data_retained"] is not False:
              raise SystemExit("Market data was retained")
          if evidence["gate_verdict"] != "UNRESOLVED_STATIC_METADATA_ONLY":
              raise SystemExit("Static probe self-promoted to a gate verdict")
          if any(
              len(value) > 500
              for value in evidence["candidate_string_literals"]
          ):
              raise SystemExit("Extracted source fragment exceeds safety bound")
          print(json.dumps({
              "asset_count": len(evidence["assets"]),
              "candidate_endpoint_paths": evidence["candidate_endpoint_paths"],
              "candidate_absolute_urls": evidence["candidate_absolute_urls"],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload safe static-contract evidence
        uses: actions/upload-artifact@v7
        with:
          name: okx-historical-bundle-contract-${{ github.sha }}
          path: build/okx-historical-bundle-contract-probe/evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Record non-promotional summary
        run: |
          {
            echo "## OKX historical bundle contract probe"
            echo
            echo "- Official page JavaScript assets inspected ephemerally: four"
            echo "- Raw bundles retained or uploaded: no"
            echo "- Market data requested or retained: no"
            echo "- Gate verdict: unresolved static metadata only"
          } >> "$GITHUB_STEP_SUMMARY"
