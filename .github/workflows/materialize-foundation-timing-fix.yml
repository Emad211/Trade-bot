name: materialize-foundation-timing-fix

# Generation 4: rerun the validated timing materializer on the current fix branch.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/materialize-foundation-timing-fix.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-foundation-forecast-timing
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Materialize forecast-origin timing contract
        run: python scripts/materialize_foundation_timing_core.py
      - name: Apply Mypy-safe timing guards
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/hybrid_trader/forecasting/rolling.py")
          text = path.read_text("utf-8")
          replacements = {
              "if row_times.isna().any():": (
                  "if np.asarray(row_times.isna(), dtype=bool).any():"
              ),
              "if (origin_at > row_times).any():": (
                  "if np.asarray(origin_at > row_times, dtype=bool).any():"
              ),
              "if (origin_available < origin_at).any():": (
                  "if np.asarray(origin_available < origin_at, dtype=bool).any():"
              ),
              "if (available < origin_available).any():": (
                  "if np.asarray(available < origin_available, dtype=bool).any():"
              ),
              '''    elif manifest.schema_version == "1.3":
                  frame = _validate_forecast_timing(
                      frame,
                      horizon=int(manifest.spec.get("horizon", 0)) or None,
                  )
          ''': '''    elif manifest.schema_version == "1.3":
                  horizon_value = manifest.spec.get("horizon")
                  horizon = (
                      horizon_value
                      if isinstance(horizon_value, int) and horizon_value > 0
                      else None
                  )
                  frame = _validate_forecast_timing(frame, horizon=horizon)
          ''',
          }
          for before, after in replacements.items():
              if text.count(before) != 1:
                  raise RuntimeError(
                      f"Expected one typing anchor, found {text.count(before)}: {before[:80]}"
                  )
              text = text.replace(before, after, 1)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Remove one-time materializer
        run: |
          rm -rf .bootstrap/foundation-timing
          rm -f scripts/materialize_foundation_timing_core.py
          rm -f scripts/materialize_foundation_timing_tests.py
      - name: Install and format
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format src/hybrid_trader/forecasting/rolling.py src/hybrid_trader/cli.py tests/test_forecasting.py tests/test_batched_forecasting.py
      - name: Validate source tree
        run: |
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and clean-install wheel
        run: |
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/foundation-timing-wheel
          /tmp/foundation-timing-wheel/bin/python -m pip install dist/*.whl
          /tmp/foundation-timing-wheel/bin/hybrid-trader --help >/dev/null
          /tmp/foundation-timing-wheel/bin/python -c 'import hybrid_trader.forecasting.rolling'
          /tmp/foundation-timing-wheel/bin/python -m pip check
      - name: Commit validated timing fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hybrid_trader/forecasting/batched.py src/hybrid_trader/forecasting/rolling.py src/hybrid_trader/cli.py tests/test_forecasting.py tests/test_batched_forecasting.py
          git add -A .bootstrap/foundation-timing scripts/materialize_foundation_timing_core.py scripts/materialize_foundation_timing_tests.py
          git commit -m "fix foundation forecast-origin timing semantics"
          git push origin HEAD:agent/fix-foundation-forecast-timing
      - name: Report success
        run: |
          gh pr comment 11 --repo "$GITHUB_REPOSITORY" --body \
            "Foundation timing fix passed Ruff, strict Mypy, core tests, optional ML tests and clean-wheel smoke testing. Explicit forecast origin, origin availability and forecast-step metadata remain fail-closed. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
