name: materialize-foundation-timing-fix

on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - ".github/workflows/materialize-foundation-timing-fix.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-foundation-forecast-timing
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Materialize forecast-origin timing contract
        run: python scripts/materialize_foundation_timing_core.py
      - name: Remove one-time materializer
        run: rm -f scripts/materialize_foundation_timing_core.py
      - name: Install and format
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format src/hybrid_trader/forecasting/rolling.py src/hybrid_trader/cli.py tests/test_forecasting.py tests/test_batched_forecasting.py
      - name: Validate source tree
        run: |
          ruff format --check .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Build and clean-install wheel
        run: |
          python -m pip wheel --no-deps --wheel-dir dist .
          python -m venv /tmp/foundation-timing-wheel
          /tmp/foundation-timing-wheel/bin/python -m pip install dist/*.whl
          /tmp/foundation-timing-wheel/bin/hybrid-trader --help >/dev/null
          /tmp/foundation-timing-wheel/bin/python -c 'import hybrid_trader.forecasting.rolling'
          /tmp/foundation-timing-wheel/bin/python -m pip check
      - name: Commit validated timing fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hybrid_trader/forecasting/batched.py src/hybrid_trader/forecasting/rolling.py src/hybrid_trader/cli.py tests/test_forecasting.py tests/test_batched_forecasting.py
          git add -A scripts/materialize_foundation_timing_core.py
          git commit -m "fix foundation forecast-origin timing semantics"
          git push origin HEAD:agent/fix-foundation-forecast-timing
      - name: Report success
        run: |
          gh pr comment 3 --repo "$GITHUB_REPOSITORY" --body \
            "Foundation timing fix passed Ruff, strict Mypy, core tests, optional ML tests and clean-wheel smoke testing. The fix adds explicit forecast origin, origin availability and forecast-step metadata while preserving fail-closed future-origin checks. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
