name: capture-phase3g-real-latest

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-phase3g-real-latest.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture latest real Phase 3G run
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3g-prospective-overlap&per_page=100" --jq '[.workflow_runs[] | select(.name == "phase3g-prospective-overlap")][0]')
          run_id=$(jq -r .id <<<"$run")
          jobs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")
          artifacts=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100")
          jq -n --argjson run "$run" --argjson jobs "$jobs" --argjson artifacts "$artifacts" '{run:$run,jobs:$jobs.jobs,artifacts:$artifacts.artifacts}' > .status/phase3g-real-latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3g-real-latest.json
          git commit -m "capture latest real Phase 3G run" || true
          git push origin HEAD:agent/phase3c-hardening-runner
