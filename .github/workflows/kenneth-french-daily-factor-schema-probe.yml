name: Kenneth French Daily Factor Schema Probe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/kenneth-french-daily-factor-schema-probe.yml
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/kenneth-french-daily-factor-schema-probe.yml

permissions:
  contents: read

concurrency:
  group: kenneth-french-daily-factor-schema-probe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acquire-profile-and-stage-safe-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out triggering commit
        uses: actions/checkout@v6

      - name: Acquire official Dartmouth source page and ZIP files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/kenneth-french-daily-probe/raw
          base='https://mba.tuck.dartmouth.edu/pages/faculty/ken.french'
          curl \
            --fail-with-body \
            --location \
            --retry 8 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 180 \
            --user-agent 'Trade-bot research replication/1.0' \
            --dump-header build/kenneth-french-daily-probe/library-headers.txt \
            --output build/kenneth-french-daily-probe/raw/data_library.html \
            "$base/data_library.html"

          declare -A files=(
            [ff3]='F-F_Research_Data_Factors_daily_CSV.zip'
            [ff5]='F-F_Research_Data_5_Factors_2x3_daily_CSV.zip'
            [mom]='F-F_Momentum_Factor_daily_CSV.zip'
          )
          for key in ff3 ff5 mom; do
            name="${files[$key]}"
            curl \
              --fail-with-body \
              --location \
              --retry 8 \
              --retry-all-errors \
              --connect-timeout 20 \
              --max-time 180 \
              --user-agent 'Trade-bot research replication/1.0' \
              --dump-header "build/kenneth-french-daily-probe/${key}-headers.txt" \
              --output "build/kenneth-french-daily-probe/raw/${name}" \
              "$base/ftp/$name"
          done

      - name: Verify ZIP safety and profile exact daily schemas
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import hashlib
          import io
          import json
          import math
          import re
          import zipfile
          from datetime import datetime
          from pathlib import Path, PurePosixPath

          root = Path('build/kenneth-french-daily-probe')
          raw_root = root / 'raw'
          sources = {
              'ff3': {
                  'zip': 'F-F_Research_Data_Factors_daily_CSV.zip',
                  'expected_columns': ['Mkt-RF', 'SMB', 'HML', 'RF'],
                  'factor_role': ['Mkt-RF', 'SMB', 'HML'],
              },
              'ff5': {
                  'zip': 'F-F_Research_Data_5_Factors_2x3_daily_CSV.zip',
                  'expected_columns': ['Mkt-RF', 'SMB', 'HML', 'RMW', 'CMA', 'RF'],
                  'factor_role': ['RMW', 'CMA'],
              },
              'mom': {
                  'zip': 'F-F_Momentum_Factor_daily_CSV.zip',
                  'expected_columns': ['Mom'],
                  'factor_role': ['Mom'],
              },
          }
          date_pattern = re.compile(r'^\d{8}$')
          source_profiles = []
          for key, contract in sources.items():
              zip_path = raw_root / contract['zip']
              zip_bytes = zip_path.read_bytes()
              if not zip_bytes:
                  raise SystemExit(f'Empty ZIP: {zip_path.name}')
              if len(zip_bytes) > 100_000_000:
                  raise SystemExit(f'ZIP exceeds size cap: {zip_path.name}')
              if not zipfile.is_zipfile(io.BytesIO(zip_bytes)):
                  raise SystemExit(f'Invalid ZIP: {zip_path.name}')
              with zipfile.ZipFile(io.BytesIO(zip_bytes)) as archive:
                  members = [info for info in archive.infolist() if not info.is_dir()]
                  if len(members) != 1:
                      raise SystemExit(
                          f'Expected exactly one regular ZIP member in {zip_path.name}: '
                          f'{[member.filename for member in members]}'
                      )
                  member = members[0]
                  posix = PurePosixPath(member.filename)
                  if posix.is_absolute() or '..' in posix.parts or len(posix.parts) != 1:
                      raise SystemExit(f'Unsafe ZIP member path: {member.filename}')
                  if member.flag_bits & 0x1:
                      raise SystemExit(f'Encrypted ZIP member: {member.filename}')
                  if member.file_size <= 0 or member.file_size > 100_000_000:
                      raise SystemExit(f'Unsafe ZIP member size: {member.filename}')
                  member_bytes = archive.read(member)
                  if len(member_bytes) != member.file_size:
                      raise SystemExit(f'ZIP member size mismatch: {member.filename}')
                  archive.testzip_result = archive.testzip()  # type: ignore[attr-defined]
                  if archive.testzip_result is not None:  # type: ignore[attr-defined]
                      raise SystemExit(f'ZIP CRC failure: {archive.testzip_result}')  # type: ignore[attr-defined]

              try:
                  text = member_bytes.decode('utf-8-sig')
                  encoding = 'utf-8-sig'
              except UnicodeDecodeError:
                  text = member_bytes.decode('latin-1')
                  encoding = 'latin-1'
              lines = text.splitlines()
              expected = list(contract['expected_columns'])
              header_index = None
              header = None
              for index, line in enumerate(lines):
                  row = next(csv.reader([line]))
                  normalized = [cell.strip() for cell in row]
                  if normalized and normalized[0] in ('', 'Date') and normalized[1:] == expected:
                      header_index = index
                      header = normalized
                      break
              if header_index is None or header is None:
                  raise SystemExit(
                      f'Expected header not found for {key}; first lines hash '
                      f'{hashlib.sha256(chr(10).join(lines[:20]).encode()).hexdigest()}'
                  )

              records = []
              footer_lines = []
              started = False
              for line in lines[header_index + 1:]:
                  row = next(csv.reader([line]))
                  normalized = [cell.strip() for cell in row]
                  if normalized and date_pattern.fullmatch(normalized[0]):
                      started = True
                      if len(normalized) != len(header):
                          raise SystemExit(f'Row-width mismatch in {key}: {normalized[:2]}')
                      records.append(normalized)
                      continue
                  if started:
                      footer_lines.append(line)
              if not records:
                  raise SystemExit(f'No daily records found for {key}')

              dates = [datetime.strptime(row[0], '%Y%m%d') for row in records]
              if dates != sorted(dates):
                  raise SystemExit(f'Dates not sorted for {key}')
              if len(dates) != len(set(dates)):
                  raise SystemExit(f'Duplicate dates for {key}')

              sentinel_counts = {'-99.99': 0, '-999': 0}
              column_profiles = []
              for column_index, column in enumerate(expected, start=1):
                  values = []
                  missing_blank = 0
                  for row in records:
                      cell = row[column_index]
                      if cell == '':
                          missing_blank += 1
                          continue
                      if cell in sentinel_counts:
                          sentinel_counts[cell] += 1
                          continue
                      try:
                          value = float(cell)
                      except ValueError as exc:
                          raise SystemExit(
                              f'Non-numeric {key}.{column} value {cell!r} on {row[0]}'
                          ) from exc
                      if not math.isfinite(value):
                          raise SystemExit(f'Non-finite {key}.{column} value on {row[0]}')
                      values.append(value)
                  if missing_blank:
                      raise SystemExit(f'Blank values in {key}.{column}: {missing_blank}')
                  column_profiles.append({
                      'name': column,
                      'valid_numeric_count': len(values),
                      'minimum_percent': min(values) if values else None,
                      'maximum_percent': max(values) if values else None,
                  })

              source_profiles.append({
                  'source_key': key,
                  'source_url': (
                      'https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/ftp/'
                      + contract['zip']
                  ),
                  'zip_filename': contract['zip'],
                  'zip_byte_count': len(zip_bytes),
                  'zip_sha256': hashlib.sha256(zip_bytes).hexdigest(),
                  'member_filename': member.filename,
                  'member_byte_count': len(member_bytes),
                  'member_sha256': hashlib.sha256(member_bytes).hexdigest(),
                  'member_crc32': f'{member.CRC:08x}',
                  'encoding': encoding,
                  'header_index_zero_based': header_index,
                  'header': header,
                  'expected_factor_role': contract['factor_role'],
                  'row_count': len(records),
                  'first_date': dates[0].date().isoformat(),
                  'last_date': dates[-1].date().isoformat(),
                  'duplicate_date_count': 0,
                  'sentinel_counts': sentinel_counts,
                  'column_profiles': column_profiles,
                  'preamble_line_count': header_index,
                  'preamble_sha256': hashlib.sha256(
                      ('\n'.join(lines[:header_index]) + '\n').encode('utf-8')
                  ).hexdigest(),
                  'footer_line_count': len(footer_lines),
                  'footer_sha256': hashlib.sha256(
                      ('\n'.join(footer_lines) + ('\n' if footer_lines else '')).encode('utf-8')
                  ).hexdigest(),
              })

          library = (raw_root / 'data_library.html').read_bytes()
          library_text = library.decode('utf-8', errors='replace')
          required_phrases = [
              'Legacy Format (FIZ)',
              'Flat File Format 2.0 (CIZ)',
              'reconstruct the full history of returns each month',
              'Historical returns can change',
          ]
          missing_phrases = [phrase for phrase in required_phrases if phrase not in library_text]
          if missing_phrases:
              raise SystemExit(f'Kenneth French revision warning changed: {missing_phrases}')

          evidence = {
              'schema_version': '1.0',
              'evidence_id': 'KENNETH_FRENCH_CURRENT_DAILY_FACTOR_SCHEMA_PROBE_V1',
              'source_authority': 'Kenneth French Data Library, Dartmouth College',
              'data_library_url': (
                  'https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html'
              ),
              'data_library_byte_count': len(library),
              'data_library_sha256': hashlib.sha256(library).hexdigest(),
              'declared_return_unit': 'PERCENT',
              'data_state': 'CURRENT_REVISED_PUBLIC_RECONSTRUCTION_SOURCE',
              'legacy_to_flat_file_change': 'FIZ_TO_CIZ_BEGINNING_JANUARY_2025_RELEASE',
              'historical_revisions_possible': True,
              'daily_historical_vintage_archive_verified': False,
              'sources': source_profiles,
              'raw_uploaded': False,
              'row_level_data_uploaded': False,
              'performance_calculated': False,
              'recursive_strategy_constructed': False,
              'empirical_verdict_issued': False,
              'paper_replication_pass': False,
              'economic_edge_verdict': 'INCONCLUSIVE',
          }
          evidence_bytes = (json.dumps(evidence, indent=2, sort_keys=True) + '\n').encode('utf-8')
          (root / 'safe-daily-schema-evidence.json').write_bytes(evidence_bytes)
          summary = {
              'evidence_id': evidence['evidence_id'],
              'data_library_sha256': evidence['data_library_sha256'],
              'source_count': len(source_profiles),
              'sources': [
                  {
                      'source_key': item['source_key'],
                      'zip_sha256': item['zip_sha256'],
                      'member_sha256': item['member_sha256'],
                      'header': item['header'],
                      'row_count': item['row_count'],
                      'first_date': item['first_date'],
                      'last_date': item['last_date'],
                      'sentinel_counts': item['sentinel_counts'],
                  }
                  for item in source_profiles
              ],
              'safe_evidence_sha256': hashlib.sha256(evidence_bytes).hexdigest(),
              'performance_calculated': False,
              'paper_replication_pass': False,
          }
          (root / 'safe-daily-schema-summary.json').write_text(
              json.dumps(summary, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Remove raw Dartmouth content before artifact upload
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/kenneth-french-daily-probe/raw
          rm -f build/kenneth-french-daily-probe/*-headers.txt
          if find build/kenneth-french-daily-probe -type f \( -name '*.zip' -o -name '*.csv' -o -name '*.html' \) | grep -q .; then
            echo 'Raw Dartmouth content remains in safe artifact directory' >&2
            exit 1
          fi

      - name: Upload safe daily-schema evidence
        id: upload_evidence
        uses: actions/upload-artifact@v7
        with:
          name: kenneth-french-current-daily-safe-schema-${{ github.sha }}
          path: build/kenneth-french-daily-probe/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Create safe receipt
        env:
          ARTIFACT_ID: ${{ steps.upload_evidence.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload_evidence.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload_evidence.outputs.artifact-digest }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          summary = json.loads(
              Path('build/kenneth-french-daily-probe/safe-daily-schema-summary.json')
              .read_text(encoding='utf-8')
          )
          receipt = {
              'schema_version': '1.0',
              'repository': os.environ['GITHUB_REPOSITORY'],
              'commit_sha': os.environ['GITHUB_SHA'],
              'workflow': os.environ['GITHUB_WORKFLOW'],
              'run_id': os.environ['GITHUB_RUN_ID'],
              'run_attempt': os.environ['GITHUB_RUN_ATTEMPT'],
              'created_at': datetime.now(UTC).isoformat(),
              'artifact_id': os.environ['ARTIFACT_ID'],
              'artifact_url': os.environ['ARTIFACT_URL'],
              'artifact_digest': os.environ['ARTIFACT_DIGEST'],
              'storage_state': 'ACTIONS_SAFE_EVIDENCE_ONLY_RETENTION_90_DAYS',
              'source_count': summary['source_count'],
              'raw_uploaded': False,
              'performance_calculated': False,
              'paper_replication_pass': False,
              'economic_edge_verdict': 'INCONCLUSIVE',
          }
          Path('build/kenneth-french-daily-schema-receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(receipt, indent=2, sort_keys=True))
          PY

      - name: Upload safe receipt
        uses: actions/upload-artifact@v7
        with:
          name: kenneth-french-current-daily-safe-schema-receipt-${{ github.sha }}
          path: build/kenneth-french-daily-schema-receipt.json
          if-no-files-found: error
          retention-days: 90
