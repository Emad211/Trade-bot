name: capture-phase3g-ruff-context

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/capture-phase3g-ruff-context.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Capture Ruff diagnostic context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh run view 29640906589 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/run.log
          grep -B8 -A12 -n 'phase3g_trajectory.py:102' /tmp/run.log > .status/phase3g-ruff-context.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3g-ruff-context.txt
          git commit -m "capture Phase 3G Ruff context" || true
          git push origin HEAD:agent/phase3c-hardening-runner
