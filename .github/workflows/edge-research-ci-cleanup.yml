name: edge-research-ci-cleanup

on:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/edge-research-ci-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Apply formatting and safe lint fixes
        run: |
          ruff format .
          ruff check --fix src tests scripts

      - name: Remove temporary workflow
        run: rm .github/workflows/edge-research-ci-cleanup.yml

      - name: Verify cleanup scope
        run: |
          ruff format --check .
          ruff check src tests scripts
          python -m compileall -q src tests scripts
          pytest -q -m 'not optional_ml'

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests scripts .github/workflows/edge-research-ci-cleanup.yml
          if git diff --cached --quiet; then
            echo 'No cleanup changes were required.'
            exit 0
          fi
          git commit -m 'Normalize replication code formatting'
          git push origin HEAD:agent/edge-research-reports
