name: phase2c-yahoo-materialize

# One-time validated materializer for Yahoo market-context runner support.
on:
  push:
    branches: ["agent/phase-2c-real-data-benchmark"]
    paths:
      - "scripts/materialize_phase2c_yahoo.py"
      - ".github/workflows/phase2c-yahoo-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2c-real-data-benchmark
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Materialize Yahoo runner integration
        run: python scripts/materialize_phase2c_yahoo.py
      - name: Install and validate
        run: |
          python -m pip install -e '.[dev,ml]'
          ruff format .
          ruff check .
          mypy --python-version 3.12 src
          pytest -m 'not optional_ml' --cov=hybrid_trader --cov-report=term-missing
          pytest -m optional_ml -q
          python -m pip check
      - name: Remove one-time materializer
        run: rm -f scripts/materialize_phase2c_yahoo.py .github/workflows/phase2c-yahoo-materialize.yml
      - name: Commit Yahoo runner integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "integrate Yahoo market context into Phase 2C runner"
          git push origin HEAD:agent/phase-2c-real-data-benchmark
