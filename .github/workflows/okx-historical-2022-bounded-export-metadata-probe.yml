name: OKX Historical 2022 Bounded Export Metadata Probe

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/okx-historical-2022-bounded-export-metadata-probe.yml

permissions:
  contents: read

jobs:
  request-metadata-only:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Submit one bounded March 2022 export request without downloading files
        run: |
          mkdir -p build/okx-2022-bounded-export
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import urllib.error
          import urllib.request
          from collections.abc import Mapping
          from pathlib import Path
          from typing import Any
          from urllib.parse import urlsplit

          ENDPOINT = 'https://www.okx.com/priapi/v5/broker/public/trade-data/download-link'
          REQUEST_BODY = {
              'module': '3',
              'instType': 'SWAP',
              'instQueryParam': {
                  'instFamilyList': ['BTC-USDT'],
              },
              'dateQuery': {
                  'dateAggrType': 'daily',
                  'begin': '1646092800000',  # 2022-03-01T00:00:00Z
                  'end': '1648684800000',    # 2022-03-31T00:00:00Z
              },
          }
          MAX_RESPONSE_BYTES = 2_000_000
          FORBIDDEN_MARKET_KEYS = {
              'fundingRate', 'realizedRate', 'markPx', 'idxPx', 'last',
              'bidPx', 'askPx', 'open', 'high', 'low', 'close', 'vol',
          }
          SAFE_SCALAR_KEYS = {
              'code', 'msg', 'module', 'instType', 'dateAggrType',
              'begin', 'end', 'exportTime', 'state', 'status',
              'totalSizeMB', 'groupSizeMB', 'sizeMB', 'filename',
              'instFamily', 'instId', 'symbols', 'result', 'ts',
          }
          LINK_KEY_PATTERN = ('url', 'link', 'href', 'download', 'file')

          raw_request = json.dumps(
              REQUEST_BODY, separators=(',', ':'), sort_keys=True
          ).encode('utf-8')
          request = urllib.request.Request(
              ENDPOINT,
              data=raw_request,
              method='POST',
              headers={
                  'Accept': 'application/json',
                  'Content-Type': 'application/json',
                  'Origin': 'https://www.okx.com',
                  'Referer': 'https://www.okx.com/en-gb/historical-data',
                  'User-Agent': 'Emad211-Trade-bot-replication/1.0',
              },
          )

          response_status: int | None = None
          response_headers: dict[str, str] = {}
          final_url = ENDPOINT
          raw_response = b''
          transport_error: dict[str, Any] | None = None
          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  response_status = int(response.status)
                  final_url = response.geturl()
                  response_headers = {
                      key.lower(): value for key, value in response.headers.items()
                  }
                  raw_response = response.read(MAX_RESPONSE_BYTES + 1)
          except urllib.error.HTTPError as exc:
              response_status = int(exc.code)
              final_url = exc.geturl()
              response_headers = {
                  key.lower(): value for key, value in exc.headers.items()
              }
              raw_response = exc.read(MAX_RESPONSE_BYTES + 1)
          except urllib.error.URLError as exc:
              transport_error = {
                  'type': type(exc.reason).__name__,
                  'message_sha256': hashlib.sha256(
                      str(exc.reason).encode('utf-8')
                  ).hexdigest(),
              }

          if len(raw_response) > MAX_RESPONSE_BYTES:
              raise SystemExit('OKX response exceeded the metadata byte guard')
          parsed_final = urlsplit(final_url)
          if parsed_final.scheme != 'https' or parsed_final.hostname != 'www.okx.com':
              raise SystemExit(f'POST redirected off official host: {final_url}')

          content_type = response_headers.get('content-type', '')
          parsed_payload: Any = None
          json_error_sha256: str | None = None
          if raw_response:
              try:
                  parsed_payload = json.loads(raw_response)
              except json.JSONDecodeError as exc:
                  json_error_sha256 = hashlib.sha256(str(exc).encode()).hexdigest()

          observed_keys: set[str] = set()
          forbidden_keys: set[str] = set()
          scalar_types: dict[str, set[str]] = {}
          safe_scalars: list[dict[str, Any]] = []
          redacted_links: list[dict[str, Any]] = []
          list_profiles: list[dict[str, Any]] = []

          def retain_link(path: str, value: str) -> None:
              parsed = urlsplit(value)
              redacted_links.append({
                  'path': path,
                  'scheme': parsed.scheme,
                  'host': parsed.hostname or '',
                  'url_path': parsed.path,
                  'query_key_names': sorted(
                      part.split('=', 1)[0]
                      for part in parsed.query.split('&') if part
                  ),
                  'full_value_sha256': hashlib.sha256(
                      value.encode('utf-8')
                  ).hexdigest(),
              })

          def walk(value: Any, path: str = '$') -> None:
              if isinstance(value, Mapping):
                  keys = [str(key) for key in value]
                  observed_keys.update(keys)
                  forbidden_keys.update(FORBIDDEN_MARKET_KEYS.intersection(keys))
                  for key, item in value.items():
                      key_text = str(key)
                      item_path = f'{path}.{key_text}'
                      scalar_types.setdefault(key_text, set()).add(type(item).__name__)
                      lower_key = key_text.lower()
                      if (
                          isinstance(item, str)
                          and any(token in lower_key for token in LINK_KEY_PATTERN)
                          and item.startswith(('http://', 'https://'))
                      ):
                          retain_link(item_path, item)
                      elif key_text in SAFE_SCALAR_KEYS and isinstance(
                          item, (str, int, float, bool, type(None))
                      ):
                          safe_scalars.append({'path': item_path, 'value': item})
                      walk(item, item_path)
              elif isinstance(value, list):
                  list_profiles.append({
                      'path': path,
                      'length': len(value),
                      'item_types': sorted({type(item).__name__ for item in value}),
                  })
                  for index, item in enumerate(value[:500]):
                      walk(item, f'{path}[{index}]')

          if parsed_payload is not None:
              walk(parsed_payload)

          top_code = None
          top_msg = None
          if isinstance(parsed_payload, Mapping):
              top_code = parsed_payload.get('code')
              top_msg = parsed_payload.get('msg')

          if forbidden_keys:
              raise SystemExit(
                  f'Unexpected market-value keys in export metadata response: {sorted(forbidden_keys)}'
              )

          if transport_error is not None:
              delivery_class = 'BLOCKED_TRANSPORT'
          elif response_status in {401, 403}:
              delivery_class = 'BLOCKED_AUTHENTICATION_OR_ACCESS'
          elif response_status != 200:
              delivery_class = 'BLOCKED_HTTP_RESPONSE'
          elif parsed_payload is None:
              delivery_class = 'BLOCKED_NON_JSON_RESPONSE'
          elif str(top_code) not in {'0', 'None'}:
              delivery_class = 'BLOCKED_PROVIDER_RESPONSE'
          elif redacted_links:
              delivery_class = 'DOWNLOAD_LINK_METADATA_RETURNED'
          else:
              delivery_class = 'EXPORT_METADATA_RETURNED_NO_LINK_OBSERVED'

          evidence = {
              'schema_version': '1.0',
              'purpose': 'OKX_BOUNDED_MARCH_2022_FUNDING_EXPORT_METADATA_ONLY',
              'endpoint': ENDPOINT,
              'request_method': 'POST',
              'request_body': REQUEST_BODY,
              'request_body_sha256': hashlib.sha256(raw_request).hexdigest(),
              'requested_window_utc': {
                  'begin': '2022-03-01T00:00:00Z',
                  'end': '2022-03-31T00:00:00Z',
              },
              'response_status': response_status,
              'final_url': final_url,
              'content_type': content_type,
              'response_byte_count': len(raw_response),
              'response_sha256': (
                  hashlib.sha256(raw_response).hexdigest()
                  if raw_response else None
              ),
              'transport_error': transport_error,
              'json_error_sha256': json_error_sha256,
              'top_level_type': type(parsed_payload).__name__,
              'top_level_keys': (
                  sorted(str(key) for key in parsed_payload)
                  if isinstance(parsed_payload, Mapping) else []
              ),
              'top_code': top_code,
              'top_message_sha256': (
                  hashlib.sha256(str(top_msg).encode()).hexdigest()
                  if top_msg not in (None, '') else None
              ),
              'observed_keys': sorted(observed_keys),
              'scalar_types': {
                  key: sorted(values) for key, values in sorted(scalar_types.items())
              },
              'safe_scalars': safe_scalars,
              'list_profiles': list_profiles,
              'redacted_link_metadata': redacted_links,
              'delivery_class': delivery_class,
              'raw_response_retained': False,
              'download_link_followed': False,
              'market_file_downloaded': False,
              'market_rows_retained': False,
              'basis_computed': False,
              'funding_pnl_computed': False,
              'returns_computed': False,
              'gate_verdict': 'UNRESOLVED_BOUNDED_EXPORT_METADATA_ONLY',
          }
          Path('build/okx-2022-bounded-export/evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps({
              'response_status': response_status,
              'top_code': top_code,
              'delivery_class': delivery_class,
              'observed_keys': sorted(observed_keys),
              'list_profiles': list_profiles,
              'redacted_link_metadata': redacted_links,
          }, indent=2, sort_keys=True))
          PY
      - name: Verify the no-download research boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          evidence = json.loads(
              Path('build/okx-2022-bounded-export/evidence.json').read_text()
          )
          assert evidence['request_method'] == 'POST'
          assert evidence['request_body']['module'] == '3'
          assert evidence['request_body']['instType'] == 'SWAP'
          assert evidence['request_body']['instQueryParam']['instFamilyList'] == ['BTC-USDT']
          assert evidence['raw_response_retained'] is False
          assert evidence['download_link_followed'] is False
          assert evidence['market_file_downloaded'] is False
          assert evidence['market_rows_retained'] is False
          assert evidence['basis_computed'] is False
          assert evidence['funding_pnl_computed'] is False
          assert evidence['returns_computed'] is False
          assert evidence['gate_verdict'] == 'UNRESOLVED_BOUNDED_EXPORT_METADATA_ONLY'
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: okx-2022-bounded-export-metadata-${{ github.sha }}
          path: build/okx-2022-bounded-export/evidence.json
          if-no-files-found: error
          retention-days: 30
