name: gate63-v4-candidate-artifact

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/gate63-v4-candidate-artifact.yml
      - .gate63v4-package.part*

permissions:
  contents: read

concurrency:
  group: gate63-v4-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Decode and allowlist hardened package
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/gate63-v4.tar.gz"
          cat .gate63v4-package.part* | tr -d '\n' | base64 -d > "$archive"
          echo "9e6f3b9f68f38d163332ad4c83864b3405731a0760e02c0304a46c21145d28b2  $archive" | sha256sum -c -
          ARCHIVE="$archive" python - <<'PY'
          import os
          import tarfile
          from pathlib import PurePosixPath

          expected = {
              'src/hybrid_trader/replication/okx_no_trade_execution_plan.py',
              'scripts/run_okx_no_trade_observation.py',
              'scripts/validate_okx_no_trade_execution_plan_contract.py',
              'tests/test_okx_no_trade_execution_plan.py',
              '.github/workflows/okx-sealed-execution-plan-contract.yml',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-gate.yaml',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-runbook.md',
              'docs/research/edge-discovery/02-replication/02-04-okx-owner-controlled-no-trade-observation-runbook.md',
          }
          with tarfile.open(os.environ['ARCHIVE'], 'r:gz') as bundle:
              members = bundle.getmembers()
              names = {member.name for member in members}
              if names != expected:
                  raise SystemExit(f'Unexpected Gate 63 members: {sorted(names)}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts or not member.isfile():
                      raise SystemExit(f'Unsafe Gate 63 member: {member.name}')
          PY
          tar -xzf "$archive"

      - name: Install verification environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Format, lint and type-check exact candidate
        shell: bash
        run: |
          set -euo pipefail
          files=(
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py
            scripts/run_okx_no_trade_observation.py
            scripts/validate_okx_no_trade_execution_plan_contract.py
            tests/test_okx_no_trade_execution_plan.py
          )
          python -m ruff format "${files[@]}"
          python -m ruff check --fix "${files[@]}"
          python -m ruff format --check "${files[@]}"
          python -m ruff check "${files[@]}"
          python -m mypy --strict --ignore-missing-imports \
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py \
            scripts/run_okx_no_trade_observation.py \
            scripts/validate_okx_no_trade_execution_plan_contract.py

      - name: Run scoped regression suite
        run: >-
          python -m pytest -q -p no:cacheprovider
          tests/test_okx_no_trade_observation.py
          tests/test_okx_no_trade_execution_plan.py

      - name: Generate and verify safe evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/gate63-v4-safe
          PYTHONPATH=src python scripts/validate_okx_no_trade_execution_plan_contract.py \
            --output-dir build/gate63-v4-safe \
            --code-head-sha "$(git rev-parse HEAD)"
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('build/gate63-v4-safe')
          files = sorted(path for path in root.rglob('*') if path.is_file())
          expected = root / 'okx-sealed-execution-plan-safe-evidence.json'
          if files != [expected]:
              raise SystemExit(f'Unexpected evidence files: {files}')
          evidence = json.loads(expected.read_text(encoding='utf-8'))
          required_true = (
              'actual_head_bound',
              'clean_worktree_required',
              'plan_mode_0600',
              'claim_mode_0600',
              'credential_binding_hmac_present',
              'plan_authenticator_hmac_present',
              'claim_created_before_executor',
              'successful_claim_finalized',
              'replay_rejected',
              'failure_raised_after_claim',
              'failed_plan_consumed',
              'failed_plan_replay_rejected',
              'configuration_change_rejected',
              'credential_change_rejected',
              'expired_plan_rejected',
              'dirty_worktree_rejected',
              'head_mismatch_rejected',
              'durable_file_and_parent_directory_fsync_verified',
              'invalid_receipt_sha_rejected',
              'invalid_receipt_plan_consumed',
              'tampered_claim_rejected',
              'safe_local_plan_and_claim_exclude_values',
          )
          if any(evidence[name] is not True for name in required_true):
              raise SystemExit('A required hardened Gate 63 proof is false')
          closed = (
              'credentials_present_in_safe_evidence',
              'owner_path_values_present_in_safe_evidence',
              'real_public_request_performed',
              'real_private_fee_request_performed',
              'credentials_supplied_to_ci',
              'orders_sent',
              'trade_permission_used',
              'withdraw_permission_used',
              'basis_computation_authorized',
              'funding_pnl_computation_authorized',
              'returns_computation_authorized',
              'transaction_cost_estimation_authorized',
              'strategy_testing_authorized',
              'paper_or_live_trading_authorized',
              'report_2_4_authorized',
          )
          if any(evidence[name] is not False for name in closed):
              raise SystemExit('A closed Gate 63 field was opened')
          text = expected.read_text(encoding='utf-8').casefold()
          for token in ('api_key', 'secret_key', 'passphrase', 'fee-snapshot.json', 'private-raw'):
              if token in text:
                  raise SystemExit(f'Forbidden evidence token: {token}')
          PY

      - name: Assemble exact formatted candidate
        shell: bash
        run: |
          set -euo pipefail
          out="${RUNNER_TEMP}/gate63-v4-candidate"
          repo="$out/repository"
          mkdir -p "$repo"
          files=(
            src/hybrid_trader/replication/okx_no_trade_execution_plan.py
            scripts/run_okx_no_trade_observation.py
            scripts/validate_okx_no_trade_execution_plan_contract.py
            tests/test_okx_no_trade_execution_plan.py
            .github/workflows/okx-sealed-execution-plan-contract.yml
            docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-gate.yaml
            docs/research/edge-discovery/02-replication/02-04-okx-owner-local-sealed-execution-plan-runbook.md
            docs/research/edge-discovery/02-replication/02-04-okx-owner-controlled-no-trade-observation-runbook.md
          )
          for path in "${files[@]}"; do
            mkdir -p "$repo/$(dirname "$path")"
            cp "$path" "$repo/$path"
          done
          (cd "$repo" && find . -type f -print0 | sort -z | xargs -0 sha256sum) > "$out/SHA256SUMS"
          SOURCE_HEAD="$(git rev-parse HEAD)" \
          SOURCE_TREE="$(git rev-parse HEAD^{tree})" \
          OUT="$out" python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          out = Path(os.environ['OUT'])
          sums = out.joinpath('SHA256SUMS').read_bytes()
          receipt = {
              'schema_version': 2,
              'gate': 63,
              'source_head_sha': os.environ['SOURCE_HEAD'],
              'source_tree_sha': os.environ['SOURCE_TREE'],
              'source_package_sha256': '9e6f3b9f68f38d163332ad4c83864b3405731a0760e02c0304a46c21145d28b2',
              'candidate_file_count': 8,
              'sha256sums_sha256': hashlib.sha256(sums).hexdigest(),
              'ruff_format_passed': True,
              'ruff_lint_passed': True,
              'strict_mypy_passed': True,
              'scoped_tests_passed': 31,
              'hardened_safe_evidence_passed': True,
              'repository_mutation_performed': False,
              'real_network_request_performed': False,
              'credentials_supplied_to_ci': False,
              'orders_sent': False,
              'report_2_4_authorized': False,
          }
          out.joinpath('candidate-receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - uses: actions/upload-artifact@v7
        with:
          name: gate63-v4-candidate-${{ github.sha }}
          path: ${{ runner.temp }}/gate63-v4-candidate/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          include-hidden-files: true
