name: OKX Executable Price and Cost Semantics Contract

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/okx-execution-cost-semantics-contract.yml
      - src/hybrid_trader/replication/okx_execution_cost_semantics.py
      - scripts/validate_okx_execution_cost_semantics.py
      - tests/test_okx_execution_cost_semantics.py
      - docs/research/edge-discovery/02-replication/02-03-okx-executable-price-and-cost-semantics-gate.yaml
  push:
    branches: [agent/edge-research-reports]
    paths:
      - .github/workflows/okx-execution-cost-semantics-contract.yml
      - src/hybrid_trader/replication/okx_execution_cost_semantics.py
      - scripts/validate_okx_execution_cost_semantics.py
      - tests/test_okx_execution_cost_semantics.py
      - docs/research/edge-discovery/02-replication/02-03-okx-executable-price-and-cost-semantics-gate.yaml

permissions:
  contents: read

jobs:
  validate-synthetic-execution-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install verification dependencies
        run: python -m pip install -e '.[dev,replication]'
      - name: Verify implementation and semantic tests
        run: |
          files=(
            src/hybrid_trader/replication/okx_execution_cost_semantics.py
            scripts/validate_okx_execution_cost_semantics.py
            tests/test_okx_execution_cost_semantics.py
          )
          ruff format --check "${files[@]}"
          ruff check "${files[@]}"
          mypy \
            src/hybrid_trader/replication/okx_execution_cost_semantics.py \
            scripts/validate_okx_execution_cost_semantics.py
          pytest -q tests/test_okx_execution_cost_semantics.py
      - name: Generate safe synthetic semantics evidence
        run: |
          python scripts/validate_okx_execution_cost_semantics.py \
            --output-dir build/okx-execution-cost-semantics
      - name: Independently verify zero real execution and safe evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('build/okx-execution-cost-semantics')
          files = sorted(path.name for path in root.iterdir() if path.is_file())
          assert files == ['okx-execution-cost-semantics-safe-evidence.json'], files
          path = root / files[0]
          evidence = json.loads(path.read_text(encoding='utf-8'))

          assert evidence['gate_id'] == 'OKX_EXECUTABLE_PRICE_AND_COST_SEMANTICS_CONTRACT_V1'
          assert evidence['issue_number'] == 57
          assert evidence['validation_mode'] == 'SYNTHETIC_EXECUTION_RESPONSES_ONLY'
          assert evidence['real_order_request_performed'] is False
          assert evidence['real_private_endpoint_called'] is False
          assert evidence['owner_fee_snapshot_status'] == 'BLOCKED_OWNER_READ_ONLY_CREDENTIALS'
          assert evidence['real_execution_inputs_status'] == 'NOT_ADMITTED'
          assert evidence['price_identity_rules']['buy_executable_quote'] == 'BEST_ASK'
          assert evidence['price_identity_rules']['sell_executable_quote'] == 'BEST_BID'
          assert evidence['order_contract']['acknowledgement_is_execution'] is False
          assert evidence['order_contract']['cancel_ack_is_final_cancellation'] is False
          assert evidence['timing_contract']['fill_matching_field'] == 'fillTime'
          assert evidence['provider_cache_contract']['request_order_rewritten'] is False
          assert evidence['cost_component_contract']['trading_fee_requires_owner_snapshot'] is True
          assert evidence['cost_component_contract']['funding_requires_formula_version'] is True
          assert all(value is True for value in evidence['synthetic_rejections'].values())
          assert all(value is False for value in evidence['authorizations'].values())
          assert evidence['economic_edge_verdict'] == 'INCONCLUSIVE'

          text = path.read_text(encoding='utf-8')
          forbidden = (
              'API_KEY', 'SECRET_KEY', 'PASSPHRASE',
              'synthetic-order', 'synthetic-fill', 'synthetic-trade',
              '100.666', '99.0', '101.0',
          )
          assert not any(value in text for value in forbidden)
          assert not list(root.glob('*.csv'))
          assert not list(root.glob('*.zip'))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: okx-execution-cost-semantics-safe-evidence-${{ github.sha }}
          path: build/okx-execution-cost-semantics/okx-execution-cost-semantics-safe-evidence.json
          if-no-files-found: error
          retention-days: 90
