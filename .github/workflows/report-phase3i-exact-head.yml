name: report-phase3i-exact-head

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/report-phase3i-exact-head.yml"

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: "1e3071d457173f2f6644f3beeaa04cccc0ae53b5"
    steps:
      - name: Wait for exact Phase 3I overlap run
        shell: bash
        run: |
          set -euo pipefail
          run=""
          for attempt in $(seq 1 480); do
            run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3i-state-lineage&per_page=100" \
              --jq --arg sha "$TARGET_SHA" '[.workflow_runs[] | select(.name == "phase3i-diversified-overlap" and .head_sha == $sha)][0]')
            if [ "$(jq -r '.status // empty' <<<"$run")" = "completed" ]; then
              break
            fi
            sleep 10
          done
          test -n "$run"
          run_id=$(jq -r .id <<<"$run")
          jobs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")
          artifacts=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100")
          {
            echo '## Phase 3I exact-head overlap status'
            echo
            echo "- run: $(jq -r .html_url <<<"$run")"
            echo "- conclusion: $(jq -r .conclusion <<<"$run")"
            echo "- head: \`$(jq -r .head_sha <<<"$run")\`"
            jq -r '.jobs[] as $job | $job.steps[]? | "- \($job.name) / \(.name): \(.status) / \(.conclusion)"' <<<"$jobs"
            jq -r '.artifacts[] | "- artifact `\(.name)` — \(.size_in_bytes) bytes — `\(.digest)`"' <<<"$artifacts"
          } > /tmp/phase3i-exact-head.md
          gh pr comment 39 --repo "$GITHUB_REPOSITORY" --body-file /tmp/phase3i-exact-head.md
