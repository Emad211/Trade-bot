name: phase2c-historical

# Final fixed-cutoff evidence run for the cleaned Phase 2C branch.
on:
  workflow_dispatch:
  push:
    branches: [main, "agent/phase-2c-clean"]
    paths:
      - "configs/phase2c_*.yaml"
      - "src/hybrid_trader/phase2c*.py"
      - "src/hybrid_trader/data/**"
      - "scripts/verify_phase2c_*.py"
      - ".github/workflows/phase2c-historical.yml"

permissions:
  contents: read

jobs:
  historical:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install public-data and ML dependencies
        run: python -m pip install -e '.[exchange,ml]'
      - name: Execute fixed-cutoff public-data experiment
        run: |
          python -m hybrid_trader.phase2c \
            --spec configs/phase2c_sources_authoritative.yaml \
            --config configs/phase2c_btc_4h.yaml \
            --output artifacts/phase2c-historical
      - name: Verify integrity and non-activation
        run: python scripts/verify_phase2c_artifacts.py artifacts/phase2c-historical
      - name: Verify full-window source coverage
        run: |
          python scripts/verify_phase2c_artifacts_strict.py \
            artifacts/phase2c-historical \
            --spec configs/phase2c_sources_authoritative.yaml
      - name: Verify required market context
        run: |
          python scripts/verify_phase2c_macro_gate.py \
            artifacts/phase2c-historical \
            --spec configs/phase2c_sources_authoritative.yaml
      - name: Record workflow identity
        if: success()
        run: |
          printf '%s\n' "$GITHUB_RUN_ID" > artifacts/phase2c-historical/historical_run_id.txt
          printf '%s\n' "$GITHUB_SHA" > artifacts/phase2c-historical/source_commit_sha.txt
      - name: Build deterministic archive and checksum inventory
        if: always()
        run: |
          mkdir -p artifacts/distribution
          if [ -d artifacts/phase2c-historical ]; then
            tar --sort=name --mtime='UTC 1970-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf artifacts/distribution/phase2c-historical-${GITHUB_SHA}.tar.gz \
              -C artifacts phase2c-historical
          fi
          find artifacts -type f -not -path 'artifacts/distribution/SHA256SUMS' -print0 \
            | sort -z | xargs -0 sha256sum > artifacts/distribution/SHA256SUMS || true
      - name: Upload historical evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2c-historical-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 90
