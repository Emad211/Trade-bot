name: snapshot-phase3f-head-status

on:
  push:
    branches: ["agent/phase3c-hardening-runner"]
    paths:
      - ".github/workflows/snapshot-phase3f-head-status.yml"

permissions:
  actions: read
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 521ff5b967ac88aeb12274b4ce59ecf863e25971
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase3c-hardening-runner
      - name: Snapshot exact-head Actions state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .status
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent/phase-3f-semantic-dataset&per_page=100" \
            --jq --arg sha "$TARGET_SHA" '{runs: [.workflow_runs[] | select(.head_sha == $sha) | {id,name,status,conclusion,head_sha,html_url,created_at,updated_at}]}' \
            > .status/phase3f-head-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .status/phase3f-head-status.json
          git commit -m "snapshot Phase 3F exact-head status" || true
          git push origin HEAD:agent/phase3c-hardening-runner
