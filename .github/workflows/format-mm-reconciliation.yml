name: format-mm-reconciliation

on:
  push:
    branches:
      - agent/edge-research-reports
    paths:
      - .github/workflows/format-mm-reconciliation.yml

permissions:
  contents: write

jobs:
  format-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/edge-research-reports
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - name: Format and verify the reconciliation module
        run: |
          ruff format src/hybrid_trader/replication/moreira_muir_reconciliation.py
          ruff format --check .
          ruff check src tests scripts
          mypy src
          pytest -q tests/test_moreira_muir_reconciliation.py
      - name: Remove workflow and publish exact formatter output
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/format-mm-reconciliation.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/hybrid_trader/replication/moreira_muir_reconciliation.py .github/workflows/format-mm-reconciliation.yml
          if git diff --cached --quiet; then
            echo 'No formatting change was required.'
            exit 0
          fi
          git commit -m 'Apply exact reconciliation formatting'
          git push origin HEAD:agent/edge-research-reports

# Re-triggered after the OKX contract-probe commits to format the latest branch head.
